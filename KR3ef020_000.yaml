莖乾薑一兩附子一枚生去皮破八片上三味以水三升煮取一升去滓分溫再服白通加豬膽汁湯蔥白四莖乾薑一兩附子一枚生去皮破八片人尿五合豬膽汁一合以上三味以水三升煮取一升去滓納膽汁人尿和令相得分溫再服附子湯附子二枚去皮破八片生人參二兩白朮四兩茯苓三兩芍藥三兩酒洗上五味以水八升煮取三升去滓溫服一升日三服或問附子湯與真武湯只互換一味何真武湯主行水收陰附子湯主回陽峻補耶蓋真武湯內生薑佐熟附不過取辛熱之勢以走散經中之水飲附子湯中人參助生附純用其溫補之力以恢復渙散之真陽且附子湯中附術皆倍於真武其分兩亦自不同所以主治迥異豈可比例而觀乎真武湯有加減法見少陰上篇本條下茯苓三兩芍藥三兩酒洗白朮二兩附子一枚炮去皮破八片生薑三兩切上五味以水八升煮取三升去滓溫服七合日三服乾薑附子湯乾薑一兩附子一枚生去皮破八片上二味以水三升煮取一升去滓頓服桂枝附子湯桂枝四兩附子三枚炮去皮破八片甘草二兩炙生薑三兩切大棗十二枚擘上五味以水六升煮取二升去滓分溫三服白朮附子湯白朮四兩附子三枚炮去皮破八片甘草二兩炙生薑三兩切大棗十二枚擘上五味以水六升煮取二升去滓分溫三服甘草附子湯甘草三兩炙附子二枚炮去皮破白朮二兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙風傷衛氣濕流關節風濕相搏邪亂經中故主周身骨節諸痛風勝則衛氣不固汗出短氣惡風不欲去衣濕勝則水氣不行小便不利或身微腫故用附子除濕溫經桂枝祛風和營白朮去濕實衛甘草輔諸藥而成斂散之功也芍藥甘草附子湯芍藥三兩甘草三兩炙附子一枚炮去皮破八片上三味以水五升煮取一升五合去滓分溫再服理中丸及湯有加減法見雜篇霍亂本條下人參白朮甘草炙乾薑各三兩上四味搗篩為末蜜和丸如雞子黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服桂枝人參湯桂枝四兩人參三兩白朮三兩甘草四兩炙乾薑三兩上五味以水九升先煮四味取五升納桂更煮取三升溫服一升日再夜一服甘草乾薑湯甘草四兩炙乾薑二兩炮上㕮咀以水三升煮服一升五合去滓分溫再服此即四逆湯去附子也辛甘合用專復胸中之陽氣其夾食夾陰面赤足冷發熱喘咳腹痛便滑外內合邪難於發散或寒藥傷胃合用理中不便參朮者並宜服之真胃虛挾寒之聖劑也若夫脈沉長冷嘔吐自利雖無厥逆仍屬四逆湯證矣烏梅丸烏梅三百個黃連一斤黃柏六兩乾薑十兩附子六枚炮蜀椒四兩熬去汗桂枝六兩細辛六兩人參六兩當歸四兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相下納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物多食等按烏梅丸主胃氣虛而寒熱錯雜之邪積於胸中所以蛔不安而時時上攻故仍用寒熱錯雜之味治之方中烏梅之酸以開胃蜀椒之辛以泄滯連柏之苦以降氣蓋蛔聞酸則定見辛則伏遇苦則下也其他參歸以補中氣之虛寒姜附以溫胸中之寒飲若無飲則不嘔逆蛔亦不上矣辛桂以祛陷內之熱邪若無熱邪雖有寒飲亦不致於嘔逆若不嘔逆則胃氣總虛亦不致於蛔厥矣五苓散豬苓十八銖澤瀉一兩六銖茯苓十八銖桂半兩白朮十八銖上五味子末以白飲和服方寸匕日三服也此兩解表裡之藥故云覆取微汗茯苓豬苓味淡所以滲水滌飲用澤瀉味鹹所以泄腎止渴也白朮味甘所以燥脾逐濕也桂枝味辛所以散邪和營也欲兼汗表故用桂枝專用利水則宜肉桂妙用全在乎此則庶其辛熱而去之則何能疏肝伐腎通津利水乎此逐內外水飲之首劑金匱治心下支飲眩冒用澤瀉湯治嘔吐思水用豬苓散隨意取用二三味成方總不出是湯也祖劑云五苓散治傷寒溫熱病表裡未解頭痛發熱口燥咽乾煩渴飲水或水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利燥渴引飲並治瘦人臍下有動悸吐涎沫而嘔伺翻胃也諸如此者咸屬水飲停蓄津液固結大小便結但須增損合宜耳豬苓湯豬苓去皮茯苓澤瀉滑石碎阿膠各一兩上五味以水四升先煮四味取二升去滓納下阿膠煬消溫服七合日三服瓜蒂散瓜蒂一分熬黃赤小豆五分上二味各別搗篩為細末合治送下三錢匕以香豉一合用熱湯七合煮作稀糜粥飲取汁和散溫頓服之不吐者少少加得快吐白散桔梗三分貝母三分巴豆一分去皮心蒸黑研如脂上二味為末納巴豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下者必不利進熱粥一杯利過不止進冷粥一杯即愈梔子豉湯梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分為二服溫進一服得吐者止後服梔子湧膈上虛熱香豉散寒熱惡毒能吐能汗後汗下後虛煩不解之聖藥若嘔則加生薑以滌飲少氣則加甘草以緩中心煩腹脹則去香豉而加枳朴邪在上而不在中也丸藥傷胃則去香豉而加乾薑湧泄而兼安中之意也故欲湧虛煩必先顧慮中氣所以病人有大便溏者有不可吐之戒梔子甘草豉湯梔子十四枚擘香豉四合用綿裹定甘草二兩上三味以水四升先煮藥物得一升半納豉煮取一升半去滓分為二服溫三服得吐者止後服梔子生薑豉湯梔子十四枚擘香豉四合絲綿裹定生薑一兩上三味以水四升先煮二升去滓再煎至一升半去滓分為二服溫冷服即吐便愈梔子厚朴湯梔子十四枚擘厚朴四錢姜炙枳實四枚炙以上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服梔子乾薑湯梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分三服溫進一服得吐者止後服梔子柏皮湯梔子十五枚擘柏皮二兩甘草一兩以上三味以水四升煮取一升半去滓分溫再服太陽原有寒濕因傷寒發汗氣蒸而變熱故得發於外原非表邪發熱之謂故以梔子清肌表之熱黃柏去膀胱之濕熱甘草和其中外也枳實梔子豉湯枳實三枚梔子十四枚熬黑豉一升綿裹以上三味以清漿水七升空煮取四升納枳實梔子煮二沸下豉更煮五六沸去滓分溫再服覆令出汗黃芩湯黃芩三兩甘草二兩炙芍藥二兩酒洗大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再一服黃芩加半夏生薑湯黃芩三兩甘草二兩炙芍藥二兩酒洗半夏半升洗生薑三兩半切大棗十二枚擘上六味以水一斗煮至三升去滓溫服一升日再夜一服芍藥甘草湯白芍藥四兩酒洗甘草四兩炙上二味㕮咀以水三升煮取一升半去滓分溫再服之此即桂枝湯去桂枝薑棗也甘酸合用專治營中虛熱以其陰虛陽實至夜發熱血虛筋攣頭面赤色或汗之甚發熱不止或誤用辛熱擾其營血不受補益者並宜用之真血虛挾熱之神方也設見脈浮自汗營衛不和縱非外感仍屬桂枝湯證矣白虎湯石膏一斤碎知母六兩甘草三兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服諺云春不服白虎為瀉肺也蓋春主陽氣上升石膏知母苦寒墜下惡其瀉肺之陽而不得生髮也此特指春不可用者恐人誤以治溫病之自汗煩渴也至於秋冬感冒傷寒反可渾用以傷金水二臟之真氣乎此湯專主熱病中暍在氣虛不能蒸發者則加人參故張隱菴以為陽明宣劑其於濕溫則加蒼朮溫瘧則加桂枝一皆夏日所見之證故昔人又有秋分後不可妄用白虎之戒白虎加人參湯石膏一斤碎知母一兩甘草二兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服竹葉石膏湯竹葉二把石膏一斤碎半夏半升洗人參三兩甘草二兩炙麥門冬一升去心粳米半升上六味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服甘草湯甘草二兩上一味以水三升煮取一升半去滓溫服一合日二服桔梗湯桔梗一兩甘草一兩上二味以水三升煮取一升去滓分溫再服文蛤散文蛤五兩上一味為散以沸湯和一錢匕服湯用五合豬膚湯豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服豬屬腎而膚主肺故取治少陰經中伏邪陰火乘肺咽痛之證但當湯泡刮取皮上一層白膩者為是若以為撏豬皮外毛根薄膚則蘞劣無力且與熬香之說不符矣半夏散及湯半夏洗去涎水桂枝甘草炙各等分上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之苦酒湯半夏十四枚洗為粗末雞子一枚去衣向上苦酒著雞子和中上二味納半夏著苦酒中以雞子殼置刀鈈中安火上令三沸去滓少少含咽之不瘥更作三劑黃連阿膠湯黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓納膠煬盡小冷納雞子黃攪令相得溫服七合日三服此湯本治少陰溫熱之證以其陰邪暴虐傷犯真陰故二三日以上便見心煩不得臥所以始病之際即用芩連藥兼芍藥阿膠雞子黃以滋養陰血也然七日後熱傳少陰傷其陰血者亦可取用與實用承氣湯法雖虛實補瀉懸殊而祛熱滋陰之意則一耳白頭翁湯白頭翁黃連黃柏秦皮各二兩上四味以水取二升去滓溫服一升不愈更服厥陰熱利下欲飲水者陰虛生熱也故宜苦寒之劑治之作陽虛而用溫劑也所以用白頭翁以升水氣之下陷秦皮以堅肝腎之滑脫連柏以泄腸胃之濕熱較少陰證便膿血桃花煎之用乾薑迥乎角立也蓋少陰之水氣下奔雖為熱邪故可用從治之法厥陰之風氣摧拔木火駸駸內動是以不可復用辛溫鼓激其勢也牡蠣澤瀉散牡蠣熬澤瀉栝蔞根蜀漆洗去腥葶藶熬海藻洗去咸商陸根熬各等上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三
