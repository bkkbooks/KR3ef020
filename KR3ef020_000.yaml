body:
  text: 正方一百十三道諸方之義本條注內已經疏明者此不復贅桂枝湯桂枝三兩芍藥三兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗再服依前法又不汗後服小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物此方專主衛受風邪之證以其衛傷不能外固而自汗所以用桂枝之辛發其邪即用芍藥之酸助其陰然一散一收又須甘草以和其胃況發汗必須辛甘以行陽故復以生薑佐桂枝大棗佐甘草也但方中芍藥不言赤白聖惠與節庵俱用赤孫尚與叔微俱用白然赤白補瀉不同仲景云病發熱汗出此為營弱衛強營雖不受邪終非適平也故衛強則營弱是知必用白芍藥也營既弱而不能自固豈可以赤芍藥瀉之乎雖然不可以一律論也如太陽誤下而傳太陰因而腹滿時痛則當倍白芍補營血之虛若夫大實者必加大黃又宜赤芍以瀉實也至於濕熱素盛之人與夫酒客輩感寒之初身寒惡熱者用桂枝湯即當加黃芩以勝熱則不宜白芍以助陰貴在臨證活法也按桂枝入心血藥也而仲景用以治風傷衛之證麻黃走肺氣藥也而仲景用以治寒傷營之證皆氣病用血藥血病用氣藥故許學士有脈浮而緩風傷營浮緊兼澀寒傷衛之誤殊不知風傷衛則衛受邪衛受邪則不能內護於營故營氣不固而自汗必以桂枝血藥透達營衛又須芍藥護營固表營衛和而自汗愈矣寒傷營則營受邪營受邪則不能外通於衛故氣鬱而無汗必以麻黃氣藥開通腠理又須桂枝實營散邪汗大泄而鬱熱散矣小建中湯桂枝三兩芍藥六兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘膠飴一升上六味以水七升煮取三升去滓納膠飴更去微火消解溫服一升日三服按桂枝湯方中芍藥桂枝等分用芍藥佐桂枝以治衛氣小建中方中加倍芍藥用桂枝佐芍藥以治營氣更加膠飴以緩其脾故名之曰建中則其功用大有不同耳桂枝加葛根湯桂枝二兩芍藥三兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘葛根四兩上六味以水一斗先煮葛根減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗桂枝加桂湯桂枝五兩芍藥三兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘上五味以水七升微火煮取三升去滓適寒溫服一升若一服汗出病瘥停時服燒針發汗則損陰血驚動心氣心氣因驚而虛則觸動腎氣發為奔豚先灸核上以散寒次與桂枝加桂湯以泄奔豚之氣所加之桂當用肉桂為是桂枝加芍藥湯桂枝三兩芍藥三兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘上五味以水七升微火煮取三升去滓適寒溫服一升桂枝加大黃湯桂枝三兩芍藥三兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘大黃一兩上六味以水七升煮取三升去滓溫服一升日三服桂枝加厚朴杏仁湯桂枝三兩芍藥六兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘厚朴三兩炙杏仁五十個去皮尖上七味以水七升微火煮取三升去滓適寒溫服一升若一服汗出病瘥停後服太陽病誤下微喘脈促宜用此湯若陽明病誤下微喘胸膈不快者又屬小陷胸證矣新加湯桂枝三兩芍藥四兩酒洗甘草二兩炙生薑四兩切大棗十二枚擘人參三兩上六味以水七升微火煮取三升去滓適寒溫服一升此因發汗後津液驟傷非真陽數虧之比故宜和營藥中加人參以助津氣也桂枝去桂加茯苓白朮湯芍藥二兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘茯苓三兩白朮三兩上六味以水七升微火煮取三升去滓適寒溫服一升若小便利則愈桂枝去芍藥湯桂枝三兩甘草二兩炙生薑三兩大棗十二枚擘上四味以水七升微火煮取三升去滓適寒溫服一升桂枝去芍藥加附子湯桂枝三兩甘草二兩炙生薑三兩切大棗十二枚擘附子一枚泡去皮破八片上五味以水七升微火煮取三升去滓適寒溫服一升若一服惡寒止停後服桂枝加附子湯桂枝三兩芍藥三兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘附子一枚炮去皮破八片上六味以水七升微火煮取三升去滓適寒溫服一升若一服汗止停後服桂枝甘草湯桂枝四兩甘草二兩炙上二味以水三升煮取一升去滓頓服救逆湯桂枝三兩甘草二兩炙生薑三兩切大棗十二枚擘蜀漆三兩洗去腥白龍骨四兩熬水飛牡蠣五兩熬上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升桂枝甘草龍骨牡蠣湯桂枝一兩甘草二兩龍骨二兩熬水飛牡蠣二兩熬上為末以水五升煮取二升半去滓溫服八合日三服桂枝麻黃各半湯桂枝一兩十六銖芍藥酒洗甘草炙生薑切各一兩大棗四枚擘麻黃一兩去節杏仁二十四個湯浸去皮尖及兩仁者上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合桂枝二麻黃一湯桂枝一兩十六銖芍藥一兩六銖酒洗甘草一兩二銖炙生薑一兩六銖切大棗五枚擘麻黃十六銖去節杏仁十六個去皮尖上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再服桂枝二越婢一湯桂枝芍藥酒洗甘草炙各十八銖生薑一兩二銖大棗四枚擘麻黃十八銖去節石膏二十四銖碎錦裹上七味㕮咀以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升此湯與各半證治相類方亦相類但彼以不得小汗而面熱身癢故減小桂枝湯之制而加麻黃杏仁此以胃熱無津而不能作汗故減小大青龍之制去杏仁而加石膏以杏仁下氣走表非無津者所宜石膏辛涼化熱正胃熱者所喜爾當歸四逆湯當歸三兩桂枝三兩芍藥三兩酒洗細辛二兩甘草二兩炙通草二兩大棗二十五枚擘上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯當歸三兩桂枝三兩芍藥三兩酒洗細辛二兩甘草二兩炙通草二兩大棗二十五枚擘吳茱萸二升去閉者泡生薑半斤切上九味以水六升清酒六升和煮取五升去滓溫分五服茯苓桂枝白朮甘草湯茯苓四兩桂枝三兩白朮二兩甘草二兩炙上四味以水六升煮取三升去滓分溫三服茯苓桂枝甘草大棗湯茯苓半斤桂枝四兩甘草二兩炙大棗十五枚擘上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以勺揚之水上有珠子五六千顆相逐取用之汗後餘邪挾北方邪水為患故取桂枝湯中之二以和營五苓散中之一以利水作甘瀾水者取其流利不助腎邪也茯苓甘草湯桂枝二兩茯苓二兩甘草一兩炙生薑三兩切上四味以水四升煮取二升去滓分溫三服炙甘草湯一名復脈湯甘草四兩炙桂枝三兩人參二兩生地黃一斤麥門冬半升去心麻子仁半升研阿膠二兩生薑三兩切大棗十二枚擘上九味以清酒七升水八升先煮八味取三升去滓納膠煬消盡溫服一升日三服麻黃湯麻黃三兩去節桂枝二兩甘草一兩炙杏仁七十個泡去皮尖上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息夫寒傷營則營血受病而見骨節煩疼當矣何反腠理閉密無汗而喘耶蓋營既受傷於內必無衛氣獨和於外之理所以用麻黃髮汗必兼桂枝以和營用杏仁者所以散氣除喘用甘草者所以助陽和衛營衛流行始能作汗也按時珍云仲景治傷寒無汗用麻黃有汗用桂枝歷代名醫未有究其精微者夫津液為汗汗即血也在營即為血在衛即為汗寒傷營營血不能外通於衛衛氣閉固故無汗發熱而增寒風傷衛衛氣不能內護於營營氣不固故有汗發熱惡風是麻黃湯雖太陽發汗重劑實為發散肺經火鬱之藥桂枝湯雖太陽解肌輕劑實為理脾救肺之藥也又汪石山云辛甘發散為陽仲景發表藥中必用甘草以載住邪氣不使陷入陰分也若邪既入里則內䐜張必無復用甘草之理試觀五苓抵當承氣大柴陷胸十棗輩並不用甘草也惟調胃桃核二湯以其尚兼太陽部分之表邪故不得不用也當知發汗藥中之甘草必不可少此湯須脈證全在於表方可用之若脈微弱自汗者不可用也今人但執一二日在表並宜發汗設尺中弦數虛大為陰虛多火汗之則亢陽熱厥而死尺中遲弱足冷為陽虛夾陰汗之則亡陽厥逆而死可不慎歟大青龍湯麻黃六兩去節桂枝二兩甘草二兩炙杏仁四十個去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉粉之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也或問此方治脈浮緊頭痛惡寒身疼痛不汗出而煩躁並不見中風之脈論而疏鈔金鉀但據條首中風二字乃云本之風氣似隱標之寒化反顯釋風寒兩感者謬矣殊不知其實為風多寒少之證設果本隱標顯則治病必求其本何反倍用麻黃耶案內臺方云此一證全在不汗出三字藏機若風傷衛則自汗惡風寒傷營則無汗而喘此云不汗出而煩躁則知其證略有微汗不能透出故生煩燥於此可見其兼有風證而脈見浮緊是風見寒脈加以惡寒身疼知寒重於風故於麻桂二湯中除去芍藥倍麻黃而加石膏設不並力圖之速令外泄則風挾寒威內攻鼓動君相二火則周身皆為火化矣所以不得不倍用麻黃也其去芍藥而加石膏者以其汗既不能透出原無藉於護營熱既鬱於心包則解煩誠不可緩明乎此則不但大青龍之法可解大青龍之方可施其麻黃杏仁甘草石膏湯越婢湯桂枝二越脾一湯麻黃升麻等可隨證取用而無窒礙也小青龍湯有加減法見太陽上篇本條下麻黃三兩去節桂枝三兩芍藥三兩酒洗甘草二兩炙五味子半升乾薑三兩細辛二兩半夏半升薑製上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升葛根湯葛根四兩麻黃三兩去節桂枝二兩芍藥一兩酒洗甘草二兩炙生薑三兩切大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌葛根加半夏湯葛根四兩麻黃三兩去節湯泡去黃汁焙乾桂枝芍藥酒洗甘草炙各二兩半夏半升洗生薑三兩切大棗十二枚擘上八味以水一斗先煮葛根麻黃減二升去白沫納諸藥煮取三升去滓溫服一升覆取微似汗麻黃杏仁甘草石膏湯麻黃四兩去節杏仁五十個去皮尖甘草一兩炙石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升麻黃連軺赤小豆湯麻黃二兩去節連軺二兩即連翹根赤小豆一升即細赤豆杏仁四十個去皮尖甘草二兩炙生梓白皮一升生薑二兩切大棗十二枚擘以上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分溫三服半日服盡傷寒瘀熱在裡身必發黃者因其人素有濕熱汗出不盡則肌腠之裡為瘀熱所凝而遍身發黃故宜此湯以取微汗也麻黃髮散表邪杏仁生薑辛散走表連軺瀉經絡之積火梓皮除肌肉之濕熱小豆降火利水甘草大棗益脾和胃蓋土厚可以御水濕之蒸觀金匱治寒濕用麻黃加朮湯其義可見此湯為汗後表邪未解而濕熱發黃脈浮者取汗而設茵陳蒿湯為表邪已散而小便不利身黃脈沉者分利而設梔子柏皮湯為表裡皆熱脈來軟大不可汗下者而設若夫汗後渴而小便不利熱結津液身目皆黃者又當取用五苓加茵陳以利水為務也麻黃升麻湯麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖天門冬去心芍藥乾薑白朮茯苓甘草炙桂枝石膏碎錦裹各六銖上十四味以水一斗先煮麻黃一兩沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈麻黃附子細辛湯麻黃二兩去節細辛一兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫納藥煮取三升去滓溫服一升日三服麻黃附子甘草湯麻黃二兩去節甘草二兩炙附子一枚炮去皮上三味以水七升先煮麻黃一兩沸去上沫納諸藥煮取三升去滓溫服一升日三服小柴胡湯加減法見少陽篇本條下柴胡半斤黃芩人參甘草各三兩半夏半升洗生薑三兩切大棗十二枚擘上七味以水一斗三升煮取六升去滓再煎取二升溫服一升日三服大柴胡湯柴胡半斤黃芩三兩芍藥三兩半夏半升洗枳實四枚炙大黃二兩生薑五兩切大棗十二枚擘上八味以水一斗二升煮取六升去滓再煎溫服一升日三服此湯治少陽經邪漸入陽明之腑或誤下引邪內犯而過經不解之證故於小柴胡方中除去人參甘草助陽戀胃之味而加芍藥枳實大黃之沉降以滌除熱滯也與桂枝大黃湯同義彼以桂枝甘草兼大黃兩解太陽誤下之邪此以柴胡芩半兼大黃兩解少陽誤下之邪兩不移易之定法也柴胡桂枝湯柴胡四兩桂枝人參黃芩芍藥各一兩半甘草一兩炙半夏二合半生薑一兩半切大棗六枚擘上九味以水七升煮取三升去滓溫服一升柴胡桂枝幹薑湯柴胡半斤桂枝三兩乾薑二兩栝蔞根四兩黃芩三兩甘草二兩炙牡蠣二兩熬上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服柴胡加芒硝湯柴胡半斤黃芩人參甘草各三兩半夏半升洗生薑三兩切大棗十二枚擘芒硝六兩上八味以水一斗三升煮取六升去滓納芒硝再煎取三升溫服一升不解更服柴胡加龍骨牡蠣湯柴胡四兩半夏二合洗大黃二兩桂枝人參茯苓生薑切龍骨熬牡蠣鉛丹一兩水飛大棗六枚擘上十一味以水八升煮取四升納大黃切如棋子大更煮一二沸去滓溫服一升此湯治少陽經邪犯本之證故於本方中除去甘草黃芩行陽之味而加大黃行陰以下奪其邪兼茯苓以分利小便龍骨牡蠣鉛丹以鎮肝膽之怯桂枝以通血脈之滯也與救逆湯同義彼以桂枝龍骨牡蠣蜀漆鎮太陽經火逆之神亂此以柴胡兼龍骨牡蠣鉛丹鎮少陽經誤下之煩驚亦不易之定法也四逆散有加減法見少陰下篇本條下甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服調胃承氣湯大黃四兩清酒浸甘草二兩炙芒硝半升上三味㕮咀以水三升煮取一升去滓納芒硝更上火微煮令沸少少溫服之承氣者用以制亢極之氣使之承順而下也傷寒祕要曰王海藏論云仲景承氣湯有大小調胃之殊今人以三一承氣不分上下緩急用之豈不失仲景本意大熱大實用大承氣小熱小實用小承氣實熱尚在胃中用調胃承氣以甘草緩其下行而祛胃熱也若病大用小則邪氣不伏病小用大則過傷正氣病在上而用急下之劑則上熱不除豈可一概混治哉節庵論小承氣曰上焦受傷去芒硝恐傷下焦血分之真陰論調胃承氣曰邪在中焦不用枳實厚朴以傷上焦虛無氤氳之元氣然此湯獨可用芒硝以傷下焦乎吾未聞承氣湯有主上焦者未聞調胃承氣之證至於堅而燥也仲景調胃承氣湯證八方中並無乾燥不過曰胃氣不和曰胃實曰腹滿則知此湯專主表邪悉罷初入腑而欲結之證也故仲景以調胃承氣收入太陽陽明而大黃注曰酒浸是太陽陽明去表未遠其病在上不當攻下故宜緩劑以調和之及至正陽陽明則皆曰急下之而大承氣湯大黃注曰酒洗是洗輕於浸微升其走下之性以和其中至於少陽陽明則去正陽而逼太陰其分在下故用小承氣大黃不用酒製也大承氣湯大黃四兩酒洗厚朴半斤去皮炙枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上火微一兩沸分溫再服得下余勿服小承氣湯大黃四兩厚朴二兩去皮炙枳實三枚炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之桃核承氣湯桃仁五十個去皮尖桂枝二兩甘草二兩炙大黃四兩酒浸芒硝二兩上五味以水七升煮取二升半去滓納芒硝更上火微沸溫服五合日三服當微利抵當湯水蛭三十個豬脂熬黑虻蟲三十個熬去翅足大黃三兩酒浸桃仁二十個去皮尖上四味為末以水五升煮取三升去滓溫服一升不下再服抵當丸水蛭三十個豬脂熬黑虻蟲二十五個熬去足翅大黃三兩桃仁二十個去皮尖上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服茵陳蒿湯茵陳蒿六兩梔子十四枚擘大黃二兩上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服麻仁丸麻子仁二升蒸胭去殼芍藥半斤枳實半斤炙大黃一斤去皮厚朴一斤去皮炙杏仁一斤去皮尖熬作脂上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以利為度此治素慣脾約之人復感外邪預防燥結之法方中用麻杏二仁以潤腸燥芍藥以養陰血枳實大黃以泄實熱厚朴以破滯氣也然必因客邪加熱者用之方為合轍後世以此概治老人津枯血燥之閟結但取一時之通利不顧愈傷其真氣得不速其咎耶蜜煎導方蜜七合一味納銅器中微火煎之稍凝如飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長三寸許當熱時急作冷則硬以納穀道中以手急抵欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一