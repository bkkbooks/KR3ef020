body:
  text: 卷上太陽上篇病在三陰則有傳經直中之異在三陽則有在經在腑之分而太陽更以傷寒營風傷衛營衛俱傷為大關鑰故篇中分辨風寒營衛甚嚴不敢漫次一條即犯本壞證結胸痞滿分隸各自為篇非獨不仍叔和之舊並不若尚論之混收溫熱條例於傷寒法中至於釋義則嘉言獨開生面裁取倍於諸家讀者毋以拾唾前人為誚也病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也此條以有熱無熱證陽病陰病之大端言陽經受病則惡寒發熱陰經受病則無熱惡寒尚論以風傷衛氣為陽寒傷營血為陰亦屬偏見發於陽者七日愈陽奇數也陽常有餘故六日周遍六經餘熱不能收散至七日汗出身涼而愈陰偶數也陰常不足故六日周遍六經則陽回身暖而愈也上條統論陰陽受病之原太陽之為病脈浮頭項強痛而惡寒脈浮者邪氣並於肌表也頭項強痛者太陽經脈上至於頭也惡寒者雖發熱而猶惡寒不止非無熱也以始熱汗未泄故脈但浮不緩耳太陽病發熱汗出惡風脈緩者名為中風上條但言脈浮惡寒而未辨其風寒營衛此條即言脈浮緩發熱自汗而始識其為風傷衛也風屬陽從衛而入經雲陽者衛外而為故也今衛疏故自汗出而脈緩太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽浮陰弱即與衛強營弱同義陽浮者陽邪入衛脈必外浮陽性本熱風又善行所以發熱快捷不待鬱閉自發也陰弱者營無邪助比衛不足脈必內弱陰弱不能內守陽疏不為外固所以致汗直易不待覆蓋自出也自汗既多則營益弱矣嗇嗇惡寒內氣餒也淅淅惡風外體疏也惡風未有不惡寒者世俗相傳謂傷風惡風傷寒惡寒誤人多矣翕翕發熱乃氣蒸濕潤之熱比傷寒之乾熱不同鼻鳴者陽氣上壅也乾嘔者陽邪上逆也若外邪不解勢必傳裡鼻鳴乾嘔便是傳入陽明之候是以嘔則傳不嘔則不傳也故用桂枝湯解肌表之陽邪而與發汗驅出陰寒之法迥乎角立也太陽病頭痛發熱汗出惡風者桂枝湯主之太陽病外邪未解脈浮弱者當以汗解宜桂枝湯外邪未解曾服過發汗藥可知太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯衛得邪助而強營無邪助故為弱也病人臟無他病時發熱自汗出而不愈者此為衛氣不和也先其時發汗則愈宜桂枝湯主之里無宿病而表中風邪汗出不愈者必是衛氣不和之故設入於營則里已近災未可宴然稱無病矣時發熱者有時發熱有時不熱故先於未發熱時用解肌之法也病常自汗出者此為營氣和營氣和者外不諧以衛氣不共衛氣和諧故爾以營行脈中衛行脈外復發其外營衛和則愈宜桂枝湯此明中風病所以衛受邪風營反汗出之理見營氣本和以衛受風邪不能內與營氣和諧汗但外泄雖是汗出宜復發汗使風邪外出則衛不強而與營和矣太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈服湯反煩必服藥時不如法不啜熱粥助藥力肌竅未開徒用引動風邪漫無出路勢必內入而生煩也中風未傳變者舍桂枝解肌別無治法故刺後仍用桂枝湯則愈今雖不用刺法此義不可不講內編云服桂枝湯反煩不解者為未及其本通其督脈則愈即是刺風池風府之意內經云有病汗出而身熱者風也汗出而煩滿不解者厥也病名風厥言煩滿不解必致傳入陰經而發熱厥也太陽病頭痛至七日以上自愈者以行其經盡故也若欲厥作再經者針足陽明使經不傳則愈針足陽明言刺衝陽使邪歸併陽明不犯他界也他經則不然蓋陽明中土萬物所歸無所復傳之地也或言傷寒多有六七日尚頭痛不止者經言七日太陽病衰頭痛少愈則知其病六日猶在太陽至七日而始衰也所謂七日經盡者言邪氣雖留於一經而人之營衛流行六日周遍六經至七日復行受邪之經正氣內復邪氣得以外解也若七日不罷則邪熱勢盛必欲再經而解非必盡如一日太陽二日陽明六日傳盡六經之為準則也風家表解而不了了者十二日愈風邪雖去而陽氣之擾攘未得遽寧俟十二日再周一經則餘邪盡出必自愈矣當靜養以需不可喜功生事也太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之下之為逆不是獨指變結胸等證而言即三陰壞病多由誤下所致也太陽病先發汗不解而復下之脈浮者不愈浮為在外故反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之雖已下而脈仍浮表證未變者當急解其外也夫陽病脈浮大問病者言但便鞭耳設利之為大逆鞭為實汗出而解何以故脈浮當以汗解鞭硬同脈浮為邪在表其人大便雖數日不行不足虞也設裡實燥結必腹脹鞭滿又不得不從證下之以其證急也即如陽明例中有脈浮而大心下反鞭有熱屬臟者攻之不令發汗一條以其燥屎逆攻脾臟所以心下反鞭不可泥心下為陽分脈浮為表邪而行發汗也此則病人津液素槁大便但鞭而無所苦亦不致於結痛攻脾只宜小建中湯多加飴糖以和之表解熱除而津回大便自通矣不得已用導法可也設誤用承氣攻之則表邪內犯故為大逆與寸口脈浮大而醫反下之此為大逆同意是皆憑脈而不憑證也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也天地鬱蒸而雨作人身煩悶而汗作氣機之動也氣機一動則其脈必與證相應故脈浮而邪還於表才得有汗而外邪盡從外解設脈不以浮應則不能作汗其煩即為內入之候又在言外矣桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也寒傷營之脈證不可誤用桂枝湯以中有芍藥收斂寒邪漫無出路留連肉腠胎患無窮故為首禁凡服桂枝湯吐者其後必唾膿血也桂枝辛甘本胃所喜服之反吐其人濕熱素盛可知矣濕熱更服桂枝則熱愈淫溢上焦蒸為敗濁故必唾膿血也酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也酒為濕熱之最酒客平素濕熱搏結胸中才挾外邪必增滿逆所以辛甘之法不可用則用辛涼以撒其熱辛苦以消其滿自不待言矣後人不察每以葛根為酒客所宜殊不知又犯太陽經之大禁也上為桂枝湯三禁以上風傷衛太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒凡傷寒必惡寒發熱體痛嘔逆脈陰陽俱緊或未發熱者寒邪初入尚未鬱而為熱也仲景慮惡寒體痛嘔逆又未發熱恐誤認直中陰經之證早於辨證之先首揭此語以明之病人身大熱反欲得近衣者熱在皮膚者寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也惡寒為寒在表或身熱惡寒為熱在皮膚寒在骨髓者皆誤也而活人書以此為表裡言之詳仲景論止分皮膚骨髓而不曰表裡者蓋以皮肉脈筋骨五者主於外而克於身者也惟曰臟曰腑方可言里可見皮膚即骨髓之上外部浮淺之分骨髓即皮膚之下外部深沉之分與經絡屬表臟腑屬裡之例不同凡虛弱素寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲得近衣此所謂熱在皮膚寒在骨髓藥用辛溫汗之至於壯盛素熱之人或酒客輩感邪之初寒未變熱陰邪閉其伏熱陰凝於外熱鬱於內故內煩而不欲近衣此所謂寒在皮膚熱在骨髓藥用辛涼必矣一發之後表解正和此仲景不言之妙若以皮膚為表骨髓為里則麻黃湯證骨節疼痛其可名為有表復為有里之證耶傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒二三日陽明少陽證不見者為不傳也此條言病欲傳不傳之候以此消息蓋營起中焦以至寒邪傷營必脈緊無汗故欲傳則欲吐躁煩脈數急也若風傷衛則自汗脈緩故欲傳但有乾嘔而無吐亦無煩躁脈數急之例也太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之人身之陽既不得宣越於外則必壅塞於內故令作喘寒氣剛徑故令脈緊耳汗者血之液血為營營強則腠理閉密雖熱汗不出故以麻黃湯重劑發之內經所謂因於寒體若燔炭汗出而散是也麻黃髮汗最猛故以桂枝監之甘草和之杏仁潤下以止喘逆也方後注云不須啜粥者傷寒邪迫於里本不能食若強與食反增其劇也脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯脈浮而緊當用麻黃若浮而不緊雖有似乎中風然有汗無汗迥異故不復言病證耳至於浮數其邪變熱已極並宜麻黃髮汗無疑也傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之明系汗後表疏風邪襲入所致宜改用桂枝湯者一以邪傳衛分一以營虛不能復任麻黃也傷寒不大便六七日頭痛有熱者與承氣湯小便復清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯六七日不大便明系裡熱況有熱以證之更無可疑故須頭痛必是陽明熱蒸可與承氣湯然但言可與而不明言大小其旨原不在下不過藉此以證明裡熱耳若小便清者為里無熱邪未入里可知則不可下仍當散表以頭痛有熱寒邪怫鬱於經勢必致衄然無身疼目瞑知邪氣原不為重故不用麻黃而舉桂枝以解散營中之邪熱則寒邪亦得解散矣太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗麻黃湯主之服藥已微除其人發煩目瞑劇則必衄衄乃解所以然者陽氣重故也世本麻黃湯主之在陽氣重故也下今正之服藥已微除復發煩者餘邪未盡也目瞑煩劇者熱盛於經故迫血妄行而為衄衄則餘熱隨血而解也以汗後復衄故為陽氣重也或言汗後復衄而熱邪仍未盡重以麻黃湯散其未盡之邪非也若果邪熱不盡則衄乃解三字從何著落八九日不解則熱邪傷血已甚雖急奪其汗而營分之熱不能盡除故必致衄然後得以盡其餘熱也將衄何以目瞑以火邪載血而上故知必衄乃解內經曰陽絡傷則血外溢血外溢則衄又云陽氣盛則目瞑陰氣盛則目瞑以陽邪並於陰故為陰盛也太陽病脈浮緊發熱身無汗自衄者愈衄血成流則邪熱隨血而散奪血則無汗也設不自衄當以麻黃湯發之發之而邪解則不衄矣發之而餘邪未盡必仍衄而解傷寒脈浮緊不發汗因而衄者麻黃湯主之脈浮緊當以汗解失汗則邪鬱於經不散而致衄衄必點滴不成流此熱邪不得大泄病必不解急宜麻黃湯汗之奪汗則無血也仲景云衄家不可發汗亡血家不可發汗以久衄亡血已多故不可發汗復奪其血也此因當汗不汗熱毒蘊結而成衄故宜發其汗則熱泄而衄自止矣傷寒二三日心中悸而煩者小建中湯主之嘔家不用建中湯以其甜故也陽氣內虛而心悸陰氣內虛而心煩將來邪與虛搏必致危困急用建中養正祛邪庶免內入之患又慮心悸為水飲停蓄煩為心氣不寧故復以嘔證之蓋嘔為濕熱在上膈故禁甜味戀膈耳按小建中湯本桂枝湯風傷衛藥也中間但加飴倍芍以緩其脾使脾胃行其津液則營衛自和即命之曰建中其旨微矣脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知其然以營氣不足血少故也尺中脈遲不可用麻黃髮汗當頻與建中湯和之和之而邪解不須發汗設不解不妨多與俟尺中有力乃與麻黃汗之可也脈浮數者法當汗出而愈若下之而身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈誤下身重心悸縱脈仍浮數亦不可復發其汗設尺脈微為里陰素虛尤為戒也脈浮而數熱邪已甚將欲作汗也反誤下之致汗濕內外留著所以身重心悸當與小建中和其津液必自汗而愈傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痙身強難以屈伸薰之則發黃不得小便久則發咳唾陽虛多濕之人雖感寒邪亦必自汗發熱而嘔有似中風之狀發散藥中便須清理中氣以運痰濕則表邪方得解散設有下證則宜滲利小水為主若誤用正汗正下法治之便有如上變證也傷寒發熱頭痛微汗出發汗則不識人薰之則喘不得小便心腹滿下之短氣小便難頭痛項強加以溫針則衄陰虛多火之人才感外邪便發熱頭痛倍常即辛涼發散藥中便宜保養陰血設用辛熱正發汗藥津液立枯邪火彌熾遂致煩亂不識人也若誤薰誤下溫針寧無若是變證乎以上寒傷營寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼當發其汗也太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也以真武湯救之宗印無後六字世本作大青龍湯主之今依尚論改正天地鬱蒸得雨則和人身煩燥得汗則解大青龍正為其身中原有微汗寒邪鬱閉不能透出肌表出是而發煩躁與麻黃湯證之無汗者迥殊故用之發汗以解其煩躁也所以暴病便見煩躁信為營衛俱傷無疑此方原為不得汗者取汗若汗出之煩躁全非鬱蒸之比其不籍汗解甚明加以惡風脈微弱則是少陰無陽之證若脈浮弱汗出惡風而不煩躁即是太陽中風之證皆與此湯不相涉也誤用此湯寧不致厥逆惕瞤而速其陽之亡耶按誤服大青龍亡陽即當用四逆湯回陽乃置而不用更推重真武一湯以救之其義何居蓋真武者北方司水之神龍惟藉水可能變化設真武不與之水青龍不能奮然升天可知矣故方中用茯苓白朮芍藥附子行水收陰醒脾崇土之功多於回陽名為真武湯乃收拾分馳離絶之陰陽互鎮於少陰北方之位全在收拾其水使龍潛而不能見也設有一毫水氣上逆龍即遂升騰變化縱獨用附子乾薑以回陽其如魄汗不止何哉人身陽根於陰其亡陽之證乃少陰腎中之真陽飛越耳真陽飛越亟須鎮攝歸根陽既歸根陰必翕然從之陰從則水不逆而陽不孤矣豈更能飛越乎傷寒脈浮緩身不疼但重乍有輕時無少陰證者小青龍發之世本作大青龍湯發之從內編改正按前條脈浮緊身疼不汗出而煩躁皆寒傷營之候惟煩為風傷衛反以中風二字括其寒證處方全用麻黃湯加石膏以解內煩薑棗以和營氣也此脈浮緩身不疼皆風傷衛之證惟身重為寒傷營血然乍有輕時不似傷寒之身重而煩疼骨節腰痛亦無少陰之身重但欲寐晝夜俱重也身重者寒也乍輕者風也雖營衛並傷實風多寒少反以傷寒二字括其風證處方用桂枝加麻黃以散寒蓋營衛鬱熱必作渴引飲然始病邪熱未實水不能消必致停飲作寒故先用半夏以滌飲細辛乾薑以散結五味以收津恐生薑辛散領津液上升大棗甘溫聚水飲不散故去之發之者發散風水之結非大發汗也仲景又申明無少陰證者以太陽與少陰合為表裡其在陰精素虛之人表邪不俟傳經早從膀胱襲入腎臟者有之況兩感夾陰等證臨病猶當細察設少陰不虧表邪安能飛渡而見身重欲寐等證耶故有少陰證者不得已而行表散自有溫經散邪兩相綰照之法豈可竟用青龍立鏟孤陽之根乎傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿或喘者小青龍湯主之此即前證發遲而致水飲停蓄也水寒相摶則傷其肺人身所積之飲或上或下或熱或冷各自不同而肺為總司但有一二證見即水逆之應便宜小青龍湯散邪逐水不欲如大青龍興雲致雨之意也若微利者去麻黃加芫花如雞子大熬令赤色若渴者去半夏加栝蔞根三兩若噎者去麻黃加附子一枚炮若小便不利小腹滿去麻黃加茯苓四兩若喘者去麻黃加杏仁半升去皮尖本方主發散故用麻黃若主利水多去麻黃而加行水藥也蕘花利水水去利自止噎者水寒之氣相搏於裡故去麻黃而加附子傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也世本小青龍湯主之在寒去欲解也下錯簡也風寒挾水飲上逆津液雖有阻滯而未即傷故不渴服湯後飲與津液俱亡故反渴渴則知津液暴傷而未得復是為寒去欲解之徵所以雖渴而不必復藥但當靜俟津回可也咳而微喘為水飲泛溢今水去而渴與水逆而渴不同以上營衛俱傷咽喉乾躁者不可發汗其人胃家津液素虧所以咽中乾燥若不慎而請發其汗重奪津液而成喉痹唾膿血也此與咽中閉塞似同而實異此成發汗以奪陽明之津彼戒發汗以奪少陰之血也淋家不可發汗發汗必便血淋家膀胱素傷更汗則愈擾其血故從溺而出也瘡家雖身疼痛不可發汗發汗則痙瘡家肌表素虛營血暗耗更發其汗則外風襲虛內血不營必致痙也衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠久慣衄家清陽之氣素傷更發其汗以虛其虛則兩額之動脈必陷故眥急不能卒視不得眠蓋目與額皆陽明部分也此與傷寒脈浮緊不發汗因致衄者虛實懸殊不可不辨亡血家不可發汗發汗則寒栗而振血亡而陽氣孤而無偶汗之則陽從汗越所以不發熱而反寒栗也汗家重發汗必恍惚心亂小便已陰疼平素多汗更發其汗則心臟之血傷而心神恍惚膀胱之血亦傷而便已陰疼也咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得蜷臥不能自溫其人腎臟真陽素虧故咽中閉塞汗之則並奪其陽血無所依即吐血厥冷蜷臥非四逆湯溫經回陽可擬也咳而小便利若失小便者不可發汗汗出則四肢厥冷咳而小便失者膀胱虛熱也發汗必傳少陰而成四肢厥冷矣諸脈得數動微弱者不可發汗發汗則大便難腹中乾胃躁而煩脈雖動數而微弱者為表虛自汗汗之更竭其津必胃干煩躁也諸逆發汗病微者難差劇者言亂目眩者死差瘥同諸逆發汗言凡有宿病之人陰血本虛若誤用汗劑重奪其血則輕者必重重者轉劇劇者言亂目眩以虛熱生風風主眩暈故也咽喉乾躁不可發汗常器之云與小柴胡湯石頑曰宜小建中淋家不可發汗發汗必便血常云豬苓湯石頑曰未汗黃耆建中湯瘡家不可發汗王云小建中加歸耆常云誤汗成痙桂枝加葛根湯石頑曰漏風發痙桂枝加附子湯衄家不可發汗也許叔微云黃耆建中奪汗動血加犀角呂滄洲云小建中加蔥豉誤汗直視者不治亡血家不可發汗常云小柴胡加芍藥石頑曰黃耆建中誤汗振栗苓桂朮甘湯加當歸咽中閉塞不可發汗龎安常云甘草乾薑湯孫兆云黃耆建中加蔥豉誤汗吐血炙甘草湯厥冷當歸四逆咳而失小便者不可發汗郭白雲云甘草乾薑湯當歸四逆湯石頑曰未汗甘草乾姜加蔥豉誤汗厥冷當歸四逆汗後小便反數茯苓甘草湯諸脈得數動微弱者不可發汗郭云小建中湯王云誤汗煩躁便難者炙甘草湯汗家重發汗小便已陰疼常云一味禹餘糧散王云用禹餘糧赤石脂生梓白皮赤小豆等分搗篩蜜丸彈丸大水煮日二服以上宿病禁汗例太陽病欲解時從巳至未上凡病欲解之時必從其經氣之王太陽者盛陽也故從巳午未之王時而病解上條太陽經自解候太陽中篇中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐者名曰水逆五苓散主之多飲暖火汗出愈傷風原有汗以其有汗也延至日久不行解肌之法汗出雖多徒傷津液表終不解轉增煩渴邪入於腑飲水即吐者名曰水逆乃熱邪積挾飲上之以故外水格而不入也服五苓散後頻溉熱湯得汗則表裡俱解所以一舉兩得之也膀胱為津液之府用以通調水道則火熱自化而津液得全矣發汗後水藥不得入口為逆若更發汗必吐下不止水藥不得入口為逆言水逆也若更發汗必吐下不止者以其原有蓄積痰飲發汗徒傷胃中清陽之氣必致中滿若更與發汗則水飲土蒸而為吐逆下滲而為泄利矣凡發汗藥皆然不獨桂枝當禁所以太陽水逆之證不用表藥惟五苓散以導水服後隨溉熱湯以取汗所謂兩解表裡之法也太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之不行解肌反行發汗致津液內耗煩燥不眠求救於水若水入不解脈轉單浮則無他變而邪還於表矣脈浮本當用桂枝何以變用五苓耶蓋熱邪得水雖不全解勢必衰其大半所以邪既還表其熱亦微兼以小便不利證成消渴則腑熱全其故不單解而從兩解也發汗已脈浮數煩渴者五苓湯主之脈浮數而煩渴則津液為熱所耗而內躁里證具矣津液內耗宜用四苓以滋其內而加桂以解其外則術用蒼桂用枝從可推矣凡方中用一桂字不分桂枝肉桂者皆然非獨此也病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散此條舊與小陷胸白散合為一條殊不可解蓋表邪不從表散反灌以水劫其邪必致內伏或入少陰之經或犯太陽之本故以二湯分主按文蛤為止渴聖藥仲景取治意欲飲水而反不渴者其意何居蓋水與邪氣滲入少陰之經以其經脈上循喉嚨故意欲飲水緣邪尚在經中未入於裡故反不渴斯時不用鹹寒收陰瀉陽使邪留變熱必致大渴引飲也所以金匱云渴欲飲水不止者文蛤散主之則知文蛤專治內外水飲也服文蛤不瘥知邪不在少陰之經定犯膀胱之本當與五苓散無疑身熱皮粟不解欲引衣自覆若以水潠之洗之益令熱不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法身熱皮粟不解欲引衣自覆者此熱在皮膚寒在骨髓也法當汗出而解反潠之洗之致令客熱內伏不出雖煩而復畏寒似渴而仍不渴似乎邪客少陰之經及與文蛤散不瘥其邪定匿膀胱故與五苓兩解之法服後汗出而腹中反痛者此又因五苓里藥引陽邪內陷之故但陽邪內陷曷不用小建中而反與芍藥又云如上法何耶蓋平日陰氣內虛陽邪內陷之腹痛當與小建中和之誤用承氣下藥致陽邪內陷之腹痛則宜桂枝加芍藥和之因五苓利水而引陽邪內陷之腹痛仍用五苓加芍藥和之三法總不離乎桂枝芍藥也如上法者言即入於先前所服之藥內也傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之汗出而渴者用五苓散以邪氣犯本必小便不利也若汗出不渴而小便雖不利知邪熱駸駸欲犯膀胱而猶未全犯本也故用桂枝湯中之三五苓散中之一少示三表一里之意為合劑耳太陽病小便利者以飲水多必心下悸小便少者必苦裡急也小便利者以飲水過多水與邪爭必心下悸也小便少者必苦裡急明是邪熱足以消水故指為里證已急也觀上條不渴者茯苓甘草湯主之治法具矣以上風傷衛犯本太陽病不解熱結膀胱其人如狂血自下下者愈其外未解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯邪熱搏血結於膀胱必怫騰而侮心火故其人如狂見心雖未狂有似乎狂以血為陰類不似陽邪內結之狂越也血自下者邪熱不留故愈若小腹急結則膀胱之血雖蓄而不行須先解外乃可攻其攻法亦自不同必用桃仁增入承氣以達血所仍加桂枝分解外邪即如五苓大柴胡兩解表裡同義太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當鞭滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之此條之證較前條更重且六七日表證仍在曷為不先解其外耶又曷為攻裡藥中不兼加桂枝耶以脈微而沉反不結胸知邪不在上焦而在下焦也若小腸鞭滿小便自利則其人之發狂者為血蓄下焦無疑故下其血自愈蓋邪結於胸則用陷胸以滌餘邪結小腹則用抵當湯以逐血設非此法則小腹所結之血既不附氣而行更有何藥可破其堅壘哉太陽病身黃脈沉結少腹鞭小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之血證為重證抵當為重藥恐人當用而不敢用故重申其義言身黃脈沉結少腹滿三者本為蓄血之證然只見此尚與發黃相鄰必其人如狂小便自利為血證無疑設小便不利乃熱結膀胱無形之氣病為發黃之候也其小便自利則膀胱之氣化行然後少腹結滿者允為有形之蓄血也傷寒有熱少腹滿應小便不利今反利之為有血也當下之不可余藥宜抵當丸變湯為丸者恐滌蕩之不盡也煮而連滓服之與大陷胸丸同意以上傷寒營犯本太陽下篇太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之相傳傷寒過經日久其證不解謂之壞病遂與過經不解之病無辨仲景止言三日未嘗言過經日久不痊也所謂壞病者言誤汗吐下溫針病仍不解表證已罷邪氣入里不可復用桂枝也設桂枝證尚在不得謂之壞病矣至於過經不解不但七日傳之不盡即十餘日十三日尚有傳之不盡者其邪猶在三陽留戀故仲景主以大柴胡柴胡芒硝調胃承氣隨證虛實而解其熱也經云七日太陽病衰頭痛少愈可見太陽一經有行之七日日上者太陽既可羈留多日則陽明少陽亦可羈留過經漫無解期矣若謂六經傳盡復傳太陽必無是理惟病有傳過三陰而脈續浮發熱者此正氣內復迫邪出外而解必不復傳也豈有厥陰兩陰交盡於裡復從皮毛再入太陽之事耶太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之此本誤用大青龍因而致變者立法也汗出雖多而熱不退則邪未盡而正大傷況裡虛為悸上虛為眩經虛為瞤身振振搖無往而非亡陽之象所以行真武把關坐鎮之法也太陽病發汗遂漏不止其人惡風小便難四肢微急難屈伸者桂枝加附子湯主之大發其汗致陽氣不能衛外而汗漏不止即如水流漓之互辭也惡風者腠理大開為風所襲也小便難者津液外泄而不下滲兼衛氣外脫而膀胱之氣化不行也四肢微急難以屈伸者過汗亡陽筋脈失養兼襲虛風而增其徑也故加附子於桂枝湯內溫經散寒用桂枝湯者和在表之營衛加附子者壯在表之元陽本非陽虛是不用四逆也發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之此本桂枝證誤用麻黃反傷營血陽氣暴虛故脈反沉遲而身痛也此脈沉遲與尺遲大異尺遲乃元氣素虛此六部皆沉遲為發汗新虛故仍用桂枝和營加芍藥收陰生薑散邪人參輔正名曰新加湯非桂枝舊法也發汗後腹脹滿者生薑厚朴甘草半夏人參湯主之吐下腹脹為實以邪氣乘虛入里也此本桂枝證誤用麻黃髮汗津液外泄脾胃氣虛陰氣內結壅而為滿故以益脾和胃降氣滌飲為治也發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之汗本心之液發汗後臍下悸者脾氣虛而腎氣發動也明系陰邪留著欲作奔豚之證腎邪欲上凌心故臍下先悸取用茯苓桂枝直趨腎界預伐其邪則中宮始得寧靜矣發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之發汗過多誤用麻黃也誤汗傷陽胸中陽氣暴虛故叉手冒心虛而欲得按也本桂枝證故仍用桂枝甘草湯以芍藥助陰薑棗行津汗後陽虛故去之未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此此示人推測陽虛之一端也陽虛耳聾與少陽傳經耳聾迥別亟宜固陽為要耳叉手冒心加之耳聾陽虛極矣嘗見汗後陽虛耳聾諸醫施治不出小柴胡加減屢服愈甚必大劑參附庶可挽回也太陽病多惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之故也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食令食朝食暮吐以醫吐之所致也此為小逆解肌之法解散肌表風邪全不傷動脾胃若舍此而妄行吐法吐中亦有發散之義所以不惡寒發熱反見胃痛也一二日病在太陽吐之則腹中飢口不能食三四日病在陽明吐之則不喜食糜粥欲食冷食皆胃氣受傷之故也然朝食暮吐脾中之真陽亦傷而不能消穀故為小逆關上脈細數者明系吐傷陽氣所致嘗見外感之脈人迎細弱而氣口連寸反滑數大於人迎者以其曾經湧吐傷胃胃氣上乘於肺故也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也此以吐而傷胃中之陰故內煩不欲近衣雖顯虛煩之證較關上脈細而成虛熱朝食暮吐脾胃兩傷者稍輕雖不致逆醫者能無過乎太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之誤下而陽邪內陷然無他變但仍上衝陽位則可從表裡兩解之法故以桂枝湯加於前所誤用之藥內則表邪外出里邪內出即用桂枝加大黃湯之互辭也若不上衝則里已受邪不可與桂枝明矣太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之誤下脈促胸滿無下利不止汗出等證但滿而不痛未成結胸故仍用桂枝散邪去芍藥者恐其復領陽邪下入腹中也脈促雖表邪未盡然胸但滿而不結則以誤下而損其胸中之陽也加以微惡寒則並腎中之真陽亦損而濁陰用事矣故去芍藥之陰加附子以回陽也設微見汗出惡寒則陽虛已著非陽邪土盛之比是雖不言汗出然出微汗惡寒合上條胸滿觀之則必有汗出暗伏亡陽之機故於去芍藥方中加附子庶免陽脫之變可見陽虛則惡寒矣又可見汗不出之惡寒即非陽虛矣至若桂枝證誤下遂利不止喘而汗出不惡寒者則又邪並陽明之腑矣太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之喘家作桂枝湯加厚朴杏子仁表邪因誤下上逆而見微喘故仍用桂枝解表加厚朴杏仁以下其氣若下利不止而加上氣喘急者乃是上爭下奪傾危之象非桂枝所宜也按寒傷營則喘風傷衛則咳此本風傷衛證因誤下而引風邪入犯營分故微喘也其寒傷營無汗證亦有咳者乃發熱引飲水蓄之故否則營衛俱傷之證耳太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血脈促為陽邪上盛反不結聚於胸則陽邪未陷可勃勃從表出矣故為欲解也脈浮者必結胸即指促脈而申之見促脈而加之以浮故必結胸也浮字貫下四句浮而緊必咽痛浮而弦兩脅拘急浮而細數必頭痛未止皆太陽之脈故主病亦在太陽之本位設脈見沉緊則陽邪已入陰分但入而未深仍欲上衝作嘔其無結胸咽痛等證從可知矣只因論中省用一個促字三個浮字後之讀者遂眩或謂緊者必咽痛屬少陰惑之甚矣沉滑為陽邪入陰而主下利浮滑則陽邪正在營分擾其血而主下血也夫太陽誤下之脈主病皆在陽在表即有沉緊沉滑亦不得以里陰名之也按脈促不結胸者為欲解可知里不受邪矣若脈促胸滿者桂枝去芍藥微惡寒者加附子及後並病例中葛根黃芩黃連湯證亦是太陽之邪因誤下而陷於陽明所致又厥陰例中脈促手足厥逆用灸一法乃陽邪陷於陰分則知脈促為陽邪鬱伏不與正氣和諧之故不當與結代渾斟也王日休云太陽病下之以下八證其脈促不結胸者為欲解不必藥脈浮者必結胸桂枝去芍藥湯脈緊者必咽痛甘草湯脈弦者兩脅拘急小柴胡加桂枝脈細數者頭痛未止當歸四逆湯脈沉緊者必欲嘔甘草乾薑湯加黃連脈沉滑者協熱相白頭翁湯脈浮滑者必下血芍藥甘草湯加秦皮太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後復下之冒者神識不清似有物矇蔽其外所以必須得汗自解未嘗言藥也得里未和視其二便和與否再分解其邪若論用藥表無過建中里無過大柴胡五苓矣或云叉手自冒心曰冒冒為發汗過多胃中清陽氣傷故叉手自冒必補氣以助其作汗宜小建中加參耆頻服乃瘥若尺中遲弱者更加熟附子三五分可見昏冒耳聾非大劑溫補不能取效也太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之病久不解不過入陰入陽之二途脈既陰陽兩傳初無偏勝可以解矣猶必先振栗始得汗出而解虛可知也設不振栗則邪不能傳之於表而無從得汗可知也然既云陰陽兩停則在先脈浮沉俱緊盛今則浮沉俱不緊盛也脈既陰陽兩停其傳表傳裡未可預定所以惟陽脈微者方是邪不能傳表當從汗之而解惟陰脈微者方是邪不能傳裡當從下之而解此其故甚可思也若非邪住不傳之候則陽脈微者當補其陽陰脈微者當補其陰矣豈有反汗之而傷其陽下之而傷其陰哉太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也二三日不能臥但欲起陽邪熾盛逼處心胸擾亂不寧所以知其心下必結然但顯欲結之象尚未至於結也若其人脈微弱者此平素有寒飲積於心膈之分適與外邪相召外邪方熾其不可下明矣反下之若利止則邪熱乘虛入膈必與寒痰上結若利未止因復下之使陽邪不復上結亦將差就錯因勢利導之法但邪熱從表解極易從里解極難協熱下利熱不盡其利漫無止期亦危道也大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈凡病若發汗若吐若下若亡血亡津液陰陽自和者必自愈其人已亡津液復強責其小便究令膀胱之氣化不行轉增滿硬脹喘者甚多故宜以不治治之以上風傷衛壞證發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之發汗後飲水多者必喘以水灌之亦喘本寒傷營麻黃湯證乃誤用桂枝湯固衛寒不得泄氣逆變喘然有大熱者恐兼里證若無大熱為表邪實盛可知乃與麻黃湯除去桂枝而加石膏去桂枝者恐復助營熱已誤不可再誤也加石膏者用以泄營中之熱也至於內飲水多外行水灌皆足以斂邪閉汗而成喘不獨誤行桂枝湯為然也下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯易桂枝以石膏少變麻黃之法以治誤汗而喘當矣誤下而喘亦以桂枝為戒而不越此方者何耶蓋中風傷寒一從桂枝一從麻黃分途異治由中風之誤下而喘者用厚朴杏仁加入桂枝湯中則傷寒之誤下而喘者用石膏加入麻黃湯中兩不移易之定法也傷寒五六日大下之後身熱不去心下結痛者未欲解也梔子豉湯主之發汗若下之而煩熱胸中窒者梔子豉湯主之發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之憹惱同胸中窒塞窒比結痛則較輕也虛煩不得眠即下條臥起不安之互辭也反覆顛倒心中懊憹乃邪退正虛而餘邪阻滯不能傳散無可奈何之狀也此時將汗之乎下之乎和之乎溫之乎仲景巧用梔子豉湯湧載其餘邪於上使一吐而盡傳無餘然惟無形之虛煩用此無疑若湧吐實煩仲景別有瓜蒂散則非梔子所能也乃因汗吐下後胸中陽氣不足最虛之處便是客邪之處若正氣暴虛餘邪不盡則仲景原有炙甘草一法寧敢妄湧以犯虛邪之戒也傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之滿而不煩即里證已具之實滿煩而不滿即表證未罷之虛煩合而有之且臥起不安明是邪奏胸表腹裡之間故取梔子以快湧其胸中之邪而合厚朴枳實以泄腹中之滿也傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之丸藥大下之徒傷其中而不能湯滌其邪故梔子合乾薑用之亦溫中散邪之法也凡用梔子豉湯病人舊有微溏者不可與服之舊有微溏則大腸易動服此不惟不能上湧反為下泄也傷寒脈結伐心動悸者炙甘草湯主之或問炙甘草湯一證但言脈結代心動悸並不言從前所見何證曾服何藥所致細繹其方不出乎滋養真陰回枯潤燥兼和營散邪之劑必緣其人胃氣素虛所以汗下不解胃氣轉傷真陰枯竭遂致心悸脈代與水停心悸之脈似是而非水則緊而虛則代加之以結則知正氣雖虧尚有陽邪伏結凌爍真陰陰陽相搏是以動悸不寧耳邪留不解陰已大虧計惟潤燥養陰和營散邪乃為合法方中人參甘草補益胃氣桂枝甘草調和營衛麥冬生地阿膠麻仁潤經益血復脈通心尚恐藥力不及更須清酒以協助成功蓋津液枯槁之人預方二便祕澀之虞其麥冬生地溥滋膀胱之化源麻仁阿膠專主大腸之枯約免致陰虛泉竭火燥血枯此仲景救陰退陽之特識也傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之傷寒發汗已熱邪解矣何由反蒸身目為黃所以然者寒濕搏聚適在軀殼之裡故爾發黃也里者在內之通稱非謂寒濕深入在裡蓋身目正屬軀殼與臟腑無關也於寒濕中求之即下文三法也傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之而傷寒之邪得濕而不行所以熱瘀身中而發黃故用外解之法設泥里字豈有邪在裡而反治其表之理哉傷寒身黃髮熱者梔子柏皮湯主之熱已發出於外自與內瘀不同正當隨熱勢清解其黃使不留於肌表之間前條熱瘀在裡故用麻黃髮之此條發熱在表反不用麻黃者蓋寒濕之證難於得熱熱則其勢外出而不內入矣所謂於寒濕中求之不可泥傷寒之定法也傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之小便當利尿如皂角汁狀色正赤一宿腹減黃從小便出也色黃鮮明其為三陽之熱無疑小便不利腹微滿乃濕家之本證不得因此指為傷寒之裡證也方中用大黃者取佐茵陳梔子建驅濕除邪之功以利小便非用下也然二便有兼阻者有因前竅不利而後竅併為不通者如陽明證不更衣十日無苦渴者與五苓散一條非濕熱挾津液下滲膀胱而致大便枯燥不通耶此因濕熱搏聚小便不利致腹微滿故少與大黃同水道藥開泄下竅則二便俱得通利而濕熱勢殺得以分解矣或問仲景既云寒濕而用藥又忌祛濕熱之味其故何耶蓋始本寒濕襲入軀殼久之陽氣漸復則鬱發而為熱矣若泥寒字全失移寒化熱之義下之後復發汗必振寒脈微細所以然者以內外俱虛故也誤汗亡陽誤下亡陰故內外俱虛雖不出方其用附子回陽人參益陰已有成法不必贅也下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑甘草湯主之日煩躁擾夜間安靜則陰不病而陽病可知矣無表證而脈沉微則太陽之邪已盡以下後復發汗復擾其虛陽故用附子乾薑以溫補其陽不用四逆者恐甘草戀胃故也即自汗小便數咽乾煩躁吐逆用乾薑甘草以溫胃復陽不用四逆者恐附子峻下故也發汗病不解反惡寒者虛故也芍藥甘草附子湯主之未汗而惡寒邪盛而表實已汗而惡寒邪退而表虛陽虛則惡寒宜用附子固矣然既發汗不解可知其熱猶在也熱在而別無他證自是陰虛之熱又當用芍藥以收陰此營胃陰虛之救法也發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯惡寒者汗出營衛新虛故用法以收陰固陽而和其營衛不惡寒者汗出表氣未虛反加惡熱則津干胃實可知故用法以泄實而和平然曰與似大有酌量其不當徑行攻下重虛津液從可知矣傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯下利清穀陽氣內微也身體疼痛表邪外盛也法當急救其在裡之微陽俟其清便調和則在裡之陽已復而身痛不止明是營衛不和所致又當急救其表使外邪仍從外解矣救里與攻裡天淵若攻裡必須先表后里惟在裡之陰寒極盛恐陽氣暴脫不得不急救其里也厥陰篇下利腹脹身體疼痛者先溫其里乃攻其表是互此意病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯病發熱頭痛者太陽傷寒脈反沉者其人本虛或病後陽氣弱也雖脈沉體虛以其有頭痛表證而用解肌藥病不瘥反加身疼者此陽虛陰盛可知宜與四逆湯回陽散寒不解表而表解矣蓋太陽膀胱為腎之腑腎中陽虛陰盛勢必傳出於腑故宜四逆以消陰復陽倘服四逆後脈變浮數仍身疼頭痛熱不止者此里得藥助驅邪外散之候仍少用桂枝湯佐其作汗更不待言以上寒傷營壞證太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯太陽病得之八九日如瘧狀發熱惡寒熱多寒少為自初至今之證下文乃是以後擬病防變之辭分作一節看其人不嘔清便欲自可一日二三度發脈微緩者為欲愈此一節乃表和無病而脈微者邪氣微緩也陰陽相等脈證皆同向安之兆可不待汗而欲愈若脈微而惡寒者此陰陽俱虛不可更汗更下更吐也此一節宜溫之面上反有赤色者未欲解也以不能得小汗出其身必癢桂枝麻黃各半湯此一節必待汗而解也首節頗似小柴胡證故以不嘔清便自調證之次節雖脈微惡寒止宜小建中加黃耆以溫分肉司開闔原非溫經之謂後節面色反有熱色言表邪未盡故宜各半不可與面合赤色比類而觀也太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可復發汗宜桂枝二越脾一湯無陽乃無津液之通稱蓋津為陽血為陰也無陽為脾胃衰故不可更發汗非汗則風寒終不解惟取桂枝之二以治風邪越脾之一以治鬱熱越脾者石膏之辛涼以化胃之鬱熱則熱化津生而脾氣發越得以行其胃液也世本作越婢言脾為小姑比之女婢若此則越字何義二字便不貫矣今從外臺方正之服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯此風多寒少之證服桂枝湯治風而遺其寒汗又大出脈反洪大似乎風邪再襲故重以桂枝湯探之若果風邪之故立解矣若形如瘧日再發此邪本欲解終為微寒所持故略兼治寒而汗出必愈也此條前半與溫熱病篇白虎證第七條但少大煩渴一句蓋大煩渴明熱能消水故為伏氣非略欲飲一二口即止也詳此方與各半藥品不殊惟鐵分稍異而證治攸分可見仲景於差多差少之間分毫不苟也服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之治風而遺其寒所以不解而證變則在表之風寒未除而在裡之水飲上逆故變五苓而用白朮茯苓為主治去桂枝者已誤不可復用也張卿子曰逐飲何不用橘皮半夏可見此停飲而胃虛故無汗耳此條頗似結胸所以辨為太陽之表證尚在全重在翕翕發熱上發汗若下之病仍不解煩躁者茯苓四逆湯主之此大青龍證誤施汗下而轉增煩躁也誤汗則亡陽而表虛誤下則亡陰而裡虛陰陽俱虛邪獨不解故生煩躁用此湯以救之蓋煩為心煩躁為腎躁故用乾薑附子入腎以解躁茯苓人參入心以解煩也夫不汗出之煩躁與發汗後之煩躁毫釐千里不汗出之煩躁不辨脈而投大青龍尚有亡陽之變是則發汗後之煩躁即不誤用藥已誤在汗矣傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之此小青龍證誤施吐下而成也心下逆滿氣上衝胸風邪搏飲壅塞於膈所以起其頭眩因吐下後邪氣乘虛入內連動其飲也脈見沉緊明系寒邪留結於中若但發汗以強解其外外雖解而津液盡竭反足傷動經脈有身為振搖之患矣遇此等證必兼滌飲散邪乃克有濟小青龍本證全是此意但始病重在風寒兩受不得不重在表此吐下後復汗外邪已散止存飲中之邪故以桂枝加入制飲藥內使飲中之邪盡散津液得以四布而滋養其經脈也至若吐下後重發汗太過亡陽厥逆煩躁或仍發熱心悸頭眩身瞤動振振欲劈地者又屬真武湯證非此湯可能治也傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此即上條之證而明其增重者必致廢也曰虛煩曰脈甚微則津液內亡求上條之脈沉緊為不可得矣曰心下痞硬曰脅下痛較上條之心下逆滿更甚矣曰氣上衝咽喉較上條之沖胸更高矣此皆痰飲上逆之故逆而不已上衝頭目因而眩冒日加則不但身為振搖其頸項間且陽虛而陰湊之矣陰氣上入高巔則愈重而益振搖矣上盛下虛兩足必先痿廢此仲景於心下逆滿氣上衝胸之日茯苓桂枝白朮甘草湯早已用力矣傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者與桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之即白朮附子湯風濕相搏止是流入關節身疼極重而無頭疼嘔渴等證見卑濕之邪難犯高巔臟腑之界也不嘔者上無表邪也不渴者內無熱熾也加以脈浮虛而澀則為風濕搏於軀殼無疑故用桂枝附子疾馳經絡水道以桂枝散表之風附子逐經之濕迅掃而分竭之也其小便利大便堅為津液不足故去桂枝之辛散而加白朮以助津液也風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之風則上先受之濕則下先受之逮至兩相搏聚注經絡流關節滲骨體軀殼之間無處不到則無處不痛矣於中短氣一證乃汗多亡陽陽氣大傷之徵故用甘草附子白朮桂枝為劑以復陽而分解內外之邪也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之此陽虛營衛俱傷誤用桂枝治風遺寒治表遺里之變證也脈浮自汗固為在表之風邪而小便數心煩則邪又在裡加以微惡寒則在裡為寒邪更加腳攣急則寒邪頗重矣乃用桂枝獨治其表則陽愈虛陰愈無制故得之便厥也桂枝誤矣麻黃青龍更可知也陰寒內凝總無攻表之理甘草乾薑湯復其陽者即所以散其寒也厥愈足溫不但不必治寒且慮前之辛熱有傷其陰而足攣轉錮故隨用芍藥甘草以和陰而伸其腳設胃氣不和而譫語則胃中津液為熱所耗故少與調胃承氣湯以和胃而止其譫語多與則為下而非和矣若不知此證之不可汗而重發其汗復加燒針則陽之虛者必造於亡陰之無制者必致犯上無等此則用四逆湯以回其陽尚恐不勝況可兼陰為治乎此證始終只是夾陰雖脈浮自汗為陽證而腳攣急不溫乃屬平素下虛至於心煩小便數不獨真陽素虛而真陰亦虧所以才用陽且遂變厥逆也問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩燥陽明內結譫語煩亂更飲乾薑甘草湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以乘氣湯微溏則止其譫語故知病可愈陽旦者桂枝加黃芩之制本治冬溫之的方也以其心煩小便數有似冬溫而誤與之因其人陽氣素衰所以得湯便厥也若重發汗或燒針者誤上加誤非四逆湯不能回其陽矣此證既象陽旦又云按法治之即是按冬溫之法也所以病人得之便厥明明誤在黃芩助其陰寒若單服桂枝何致是耶故仲景即行陰旦之法以救其失觀增桂令汗出一語豈不昭昭耶陰旦不足更加附子溫經即咽中干陽明內結譫語煩亂渾不為意且重飲甘草乾薑湯以俟夜半陽回足熱後果如言豈非先有所試乎為黃芩入口而便厥未幾即以桂附乾薑尾其後固知其厥必不久所以可斷夜半手足當溫況譫語咽乾熱證相錯其非重陰沍寒可知故才得足溫即便以和陰為務何其審哉以上營衛俱傷壞證太陽中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相薰灼其身發黃陽盛則欲衄陰虛則小便難陰陽相虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣抹床小便利者其人可治風陽也火亦陽也邪風更被火熱助之則血氣沸騰所以失其常度蒸身為黃然陽邪盛於陽位者尚或可以從衄解可從汗解至於陽邪深入陰分勢必劫盡津液所以劑頸以下不能得汗口乾咽爛肺焦喘促身體枯燥小便難大便祕手足擾動譫妄噦逆乃火邪內熾真陰立盡之象非藥力所能勝者必其人小便尚利陰未盡傷肺氣不逆膀胱氣化腎水不枯始得行驅陽救陰之法注家泥於陰陽俱虛竭一語遂謂小便利者陰未盡虛則陽猶可回是認可治為回陽大失經旨不知此證急救其陽以存陰之一線尚恐不得況可回陽以更劫其陰乎且頭汗乃陽邪上壅不下通於陰所以劑頸以下不能得汗設見衄血則邪從衄解頭間且無汗矣設有汗則從汗解又不衄矣後條火邪深入必圊血一證亦謂身體枯燥而不得汗必致圊血設有汗更不圊血矣豈有得汗而反加衄血圊血之理哉又豈有偏身無汗而頭汗為亡陽之理哉太陽病二日煩躁反尉其背而大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也火邪入胃十餘日不解忽振栗自下利者火邪從大腸下奔其候本為欲解然而不得解者以從腰以下不得汗邪雖下走終不外走故不解也上條從頭以下不得汗其勢重此條從腰以下不得汗其勢較輕足下惡風者見陽邪在下也小便不得見陽邪閉拒陰竅也與不得汗正同所以大便亦硬益見前之下利為火勢急奔火勢衰滅則利止也反嘔者邪欲從上越也欲失泄者邪欲從陰出也皆餘邪未散之徵胃火既滅小便當數復不數則津液可回及至津回腸潤則久積之大便必盡出大便出多則小便之當數者始數矣腸胃之間邪熱既散而不持則腰以下之得汗並可知矣得汗則陰分之陽邪盡從汗解然後身半以下之陰氣得上而反頭痛身半以上之陽氣得下而反足心熱欲解之候尚且如此火邪明虐為何如哉太陽病以火薰之不得汗其人必躁到經不解必清血名為火邪清圊同火邪入胃胃中多水液者必速迫下利若胃中少津液之人復受火邪則必加悶亂不寧由是深入血室而為圊血也蓋陽邪不解得以襲入陰中動其陰血倘陽邪不盡其圊血必無止期故申之曰火邪示人以治火邪而不治其血也微數之脈慎不可灸因火為邪則為煩逆迫虛逐實血散脈中火氣雖微內攻有力焦骨陽筋血難復也脈微而數陰虛多熱之徵也此而灸之則虛者益虛熱者益熱不至傷殘不止耳燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩奔豚者腎邪也北方腎邪惟桂能伐所以用桂三倍加入桂枝湯中以外解風邪能泄陰氣也形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈形作傷寒東垣所謂勞力感寒是也以其人本虛故脈不弦緊而弱渴者津液本少不能勝邪也被火者譫語火氣傷陰陽神悖亂也弱者發熱更傷陰血也被火後脈不數疾而反浮知邪未入里猶宜汗解以和表則火邪亦得外散矣設見數疾當兼分利滲泄具見言外太陽傷寒者加溫針必驚也溫針攻寒營血得之更增其熱營氣通於心引熱邪上逼神明必致驚惶神亂也脈浮宜以汗解用火炙之邪無從出因火而盛病從腰以下重而痹名火逆也外邪挾火勢上逆而不下通陰分故重而痹也脈浮熱甚反炙之此為實實以虛治因火而動必咽燥唾血熱甚為表實反以火助其熱熱劇迫血上行故咽燥唾血也傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之火迫驚狂起臥不安者火邪於心神明散亂也夫神散正欲其收何桂枝方中反去芍藥而增蜀漆龍骨牡蠣耶蓋陽邪散亂當求之於陽桂枝湯陽藥也然必去芍藥之陰重始得疾達陽位加蜀漆之性最急者以迅掃其陰中之邪更加龍骨牡蠣以鎮固陰中之怯也火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之此證誤而又誤雖無驚狂等證然煩躁則外盡之候也亦真陽欲亡之機故用桂枝以解其外龍骨牡蠣以安其內不用蜀漆者陰中火邪未至逆亂無取急迫以滋擾害也營氣微者加燒針則血流不行更發熱而躁煩也營虛之人即有寒傷營營衛俱傷證並宜小建中和之慎不用麻黃青龍發汗汗劑尚不可用況燒針乎設誤用燒針劫汗則血得火邪必隨外至衛分故曰加燒針則血流少頃熱並於節不能內榮故曰不行所以衛愈旺而營愈衰更加發熱躁煩勢所必至也或問火逆何不分營衛以火為陽邪必傷陰血治此者但當救陰為主不必問其風寒營衛也以上火逆證陽明上篇陽明大意在經腑之別而在經者當屬表證雖有中風能食傷寒不能食之分然邪既犯中焦則又不必辨其風寒營衛但須以太陽證未盡自汗脈緩者可用桂枝湯無汗脈浮者可用麻黃湯少陽證漸見潮熱脈弦浮大而短氣腹滿者可用大小柴胡分提表裡之邪必頭項強𠘧元脈長而大者可用葛根湯大開肌肉以汗之故以經證另自為篇其腑證雖有三陽明之辨而所重尤在能食為胃強不能食為胃衰大都能食者皆可攻下但有緩急之殊惟是胃弱不能食者乃有挾虛寒挾熱結之不同虛寒則自利發黃嘔噦而脈遲當用理中四逆熱結則腹滿譫語不大便而脈澀當用蜜煎膽導不可拘於腑病為陽概用寒下而禁用溫劑也陽明病若能食名中風不能食名中寒風為陽陽能消穀故能食寒為陰陰不能消穀故不能食並邪入陽明已至中焦營衛交會之處渾然一氣似難分辨惟能食不能食差有據耳傷寒三日陽明脈大陽明氣血俱多故其脈長而大脈浮大應發汗醫反下之此為大逆陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘發汗則愈宜麻黃湯此二條言太陽之邪初入陽明未離太陽故仍用桂枝湯解肌則風邪仍從衛分而出用麻黃湯發汗則寒邪仍從營分而出矣陽明營衛難辨辨之全藉於脈證風邪之脈傳至陽明自汗已多則緩去而遲在寒邪之脈傳至陽明發熱已甚則緊去而浮在此皆邪氣在經之徵若傳入於腑則遲者必數浮者必實矣設不數不實定為胃虛不勝攻下之證也陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛此胃熱協風邪上攻之證以風主運動故也風邪攻胃胃氣上逆則咳咽門者胃之系咳甚則咽傷故必咽痛宜茯苓桂枝白朮甘草湯以散風邪祛胃濕若胃氣不逆則不咳咽亦不痛也陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也此胃熱協寒邪鬱於皮膚之證也言久虛者明所以不能透出冊表之故宜用桂枝二越脾一湯主之非謂當用補也陽明病反無汗小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明無汗嘔咳手足厥者得之營衛俱傷而邪熱入深也然小便利則邪熱不在內而在外不在下而在上故知必苦頭痛仍宜小青龍主之若不嘔不咳不厥而小便利者邪熱必順水道而出豈有逆攻巔頂之理哉陽明病口燥但欲漱水不欲咽者此必衄也漱水不欲咽知邪入血分血為陰故不能消水也陽明之脈起於鼻血得熱而妄行必由清道出也脈浮發熱口乾鼻燥能食者則衄能食者知邪不在裡而在經故必衄陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出脈浮緊而潮熱者太陽寒邪欲入陽明之腑而未入也邪雖未入而潮熱之證預形矣脈但浮而盜汗出者太陽風邪將傳少陽之經而未傳也經雖未傳而盜汗之證先見矣蓋少陽氣血俱少本不主汗以其邪熱在裡薰蒸陽明而陽明肉腠自固故不得出乘合目時脾氣不運肉腠疏豁則邪熱得以透出所以盜汗雖為少陽證而實不外乎陽明也陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治此條陽明中風之證居七八而中寒之證亦居二三觀本文不得汗及用麻黃湯其義自見也然此一證為陽明第一重證以太陽之脈證既未罷而少陽之脈證亦兼見是陽明所主之位前後皆邪不能傳散故也夫傷寒之訣起先惟恐傳經經傳則變生表邪傳裡消爍津氣也其後惟恐不傳經不傳經則勢篤虛不能傳邪無從泄也仲景於此段中特挈不傳之妙理千古無人看出總不識其所言者為何事詎知脈弦浮大而氣反短連腹都滿者邪不傳也脅下及心痛乃至久按之氣不通者邪不傳也鼻乾不得汗嗜臥表裡俱困乃至一身及面目悉黃者邪不傳也小便難有潮熱時時噦胃熱熾盛上下道窮邪不傳也耳前後腫刺之小瘥者內邪不傳乃致外挾其血亦不散但其腫小瘥也外不解過經十日留連極矣所謂萬物所歸無所復傳者原為美事孰知病邪歸之而不傳反成如此危候耶要知陽明之邪來自太陽去自少陽所以脈續浮者與小柴胡湯推其邪使速往少陽去路也脈但浮無餘證者與麻黃湯推其邪使速還太陽來路也若不尿腹滿則胃邪內壅不下行矣而更加噦胃氣將竭愈逆上矣再在何法可以驅其邪而使之傳耶不然豈有十餘日後無故張皇反用麻黃之理哉食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也此條辨嘔有太陽亦有陽明本自不同若食谷欲嘔則屬胃寒與太陽惡寒嘔逆之熱證相反正恐誤以寒藥治嘔也然服吳茱萸湯轉劇者仍屬太陽熱邪而非胃寒明矣傷寒嘔多雖有陽明證不可攻也嘔多為邪在上焦總有陽明證戒不可攻攻之必邪氣乘虛內犯也設有少陽證兼見亦當從和解例斷不可行攻下法也夫病陽多者熱下之則硬陽熱證多則有陽明證見亦屬經證不可下也不當下而誤下之則陽邪乘虛內陷也不作結胸則為痞硬也無陽陰強大便硬者下之必清穀腹滿無陽陰強言其人津液內亡胃中陽氣空虛陰邪上逆所以痞滿不食此與誤下成痞同意若因其痞而復下之必致便利清穀而腹滿也少陰中風腹滿不食誤下亦有此證然陽明無陽陰強誤下而清穀腹滿可用瀉心湯例治若少陰中風誤下而清穀腹滿者即用四逆湯恐亦不能挽回也以上俱陽明經證陽明病欲解時從申至戌上上條陽明經證自解候陽明下篇問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也脾約者其人津液素槁邪熱在太陽時大便即難是也太陽陽明者太陽經邪熱不俟入陽明經而便入胃腑也正陽陽明者經邪傳腑表邪並里故云胃家實也少陽陽明者發汗利小便已胃中燥煩實大便難津液耗竭也尚論以陽明經傳少陽經即為少陽陽明非也若經邪傳經則胃中未必便燥而大便難如果陽明經傳少陽證即當言陽明少陽不得謂之少陽陽明矣陽明之為病胃家實也問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也問曰病有得之一日不惡寒而發熱者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也本太陽初得病時發其汗汗先出不徹因轉屬陽明也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也傷寒轉系陽明者其人濈然微汗出也既濈然汗出則熱除嘔止可知脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也中風之脈輕微而緩者為風邪本微汗出少而不為過也傷寒之脈已至於實即將去太陽而成可下之證也況過發其汗寧無亡津液大便因鞭致傳陽明之證乎以上統論陽明腑證傳受陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也此雖曰陽明中風而證俱見傷寒太陽未除之候但以腹滿一端知認為熱入陽明然終與大實大滿不同若誤下則邪愈陷而腹愈滿矣小便難者亡津液也陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也脈遲則表證將除然得食而微煩仍是外邪助其內熱也頭眩者風邪上攻也小便難者濕鬱水道也水穀之濕得熱蒸而遍身發黃下之腹滿如故蓋腹滿已是邪陷脈遲則胃不實徒下其糟粕病既不除而反害之耳夫陽明證本當下陽明而至腹痛尤當急下獨此一證下之腹腔滿必如故者緣脈遲則胃氣空虛津液不充其滿不過虛熱內壅非結熱當下之比也可見脈遲胃虛下之無益則發汗利小便之法用之無益惟當用和法如甘草乾薑湯先溫其中然後少與調胃微和胃氣是也陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也溏泄久而不止則曰固瘕言如癥瘕固結不散也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解也此本不勝穀氣與汗共並脈緊則愈其人骨節疼濕勝也翕然如有熱狀熱勝也濕熱相交乃忽然發狂濈然汗出解也以其人能食胃氣有權能驅陽明之水與熱故水熱不能勝與汗共並而出也脈緊則愈者以先前失汗所以脈緊未去今幸胃氣強盛所以得肌腠開濈然大汗而解則脈之緊亦自和也陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦噦於月切脈浮而遲表熱裡寒下利清穀者四逆湯主之若胃中虛冷不能食者飲水則噦表熱裡寒法當先救其里太陽經中已用四逆湯其在陽明更可知矣此條比前條虛寒更甚故不但攻其熱必噦即飲水亦噦矣此五條一云食難用飽一云欲食似乎指中風而言一雲中寒不能食及後二條又明指中寒而言所以後人拘執其說而誤為注釋也不知此五條辨胃氣之強弱非辨外邪也故五證中惟水不勝穀氣脈緊則愈一證為胃氣勝其四條俱是脈遲胃冷反為水熱所勝之證夫傷寒皆熱證也而其人胃中虛冷者又未可一例而推蓋胃既虛冷則水穀混然無別熱邪傳入必不能遽變為實也胃不實則不可下即下之而水熱不去徒令胃氣垂絶而噦也仲景一一挈出而於下利清穀一證主以四逆湯其有較輕者宜主以溫胃更不待言矣胃氣素虛之人外邪入之必轉增其熱胃熱故膀胱亦熱氣化不行小便因之不行則盡注太陽而為洞泄下利清穀也小便不利乘胃熱而滲於脾則四肢先見色黃乃至遍身發黃而成谷疸也手足濈然得汗則脾中之濕熱行而色黃谷疸可免但汗從手足而出水穀之氣未得遍泄於周身不過少分大腸奔迫之勢故不為洞泄而為瘕泄耳無病之人小便不行尚漬為他病況傷寒極赤極熱之小便停蓄不行能無此三種之變乎傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也傷寒噦而腹滿視其前後知何部不利利之則愈一為胃氣虛寒一為胃中實熱不可不辨虛寒者溫之四逆理中是也實熱者利之承氣五苓是也二條舊在厥陰末今入此得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦六七日無大熱手足溫邪氣將入於裡也以脈遲浮弱故尚留連肌表惡風未除反二三下之致太陽之邪內陷胃氣虛寒不能食脅下滿痛似痞非痞面目及身黃頸項強小便難者上下寒飲停結也止宜五苓散解利若認少陽又與柴胡寒劑必下重嘔噦皆亡津液胃寒之徵也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈內虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也凡脈見陽盛則數陰盛則遲其人陽氣既微何得脈反數脈既數可得胃反冷此不可不求其故也蓋脈之數由於誤用辛溫發散而遺其客熱胃之冷由於陽氣不足而生其內寒也醫見其脈數反以寒劑瀉其無過必致上下之陽俱損其後脈從陰而變為弦胃氣無餘變為反胃也陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸面還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之瘀熱在裡而用茵陳蒿湯與太陽寒濕身黃如橘者同意然彼因腹微滿此因渴飲水漿所以用大黃佐茵陳驅熱利濕也陽明病面合赤色不可攻之攻之必發熱色黃小便不利也下虛之人才感外邪則挾虛火而面色通紅在太陽時即不可妄用發汗況在陽明可妄下乎總由真陽素虛無根之火隨表藥之性上升即咽乾煩躁足冷隨里藥之性下降則發熱色黃小便不利也陽明病無汗小便不利心中懊憹者身必發黃外不得汗下不得溺而熱鬱胸中不得泄熱必蒸身為黃也陽明病被火額上微汗出小便不利者必發黃合四條觀之陽明病濕停熱鬱而煩渴有加勢必發黃然汗出熱從外越則黃可免小便多熱從下泄則黃可免若誤下之則熱邪愈陷津液愈傷而汗與小便愈不可得矣誤火之則熱邪愈熾津液上奔額雖微汗而周身之汗與小便愈不得矣發黃之變安能免乎發黃與前谷疸本同一證但彼因脈遲胃冷而得則與固瘕及噦同源異派陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈婦人經水適來適斷則邪熱乘之而入於血室男子陽明經下血而譫語者亦為熱入血室總是邪熱乘虛而入也嘗見大吐血後停食感寒發熱至夜譫語者亦以熱入血室治之而愈明理論曰沖是血室婦人則隨經而入男子由陽明而入也陽明病其人善忘者必有蓄血所以然者本有久瘀血故令善忘屎雖硬大便反易其色必黑宜抵當湯主之太陽熱結膀胱輕者如狂桃核承氣湯重則發狂用抵當湯此陽明善忘之證本差減於如狂乃用用抵當湯峻攻之者以陽明多血陽明之血結則較太陽為難動故也按大便色黑雖曰瘀血而熱邪燥結之色未嘗不黑也但瘀血則黏黑如漆燥結則晦黑如煤此為明辨也病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱便膿血也病雖七八日尚發熱脈浮數仍屬太陽表證因誤下引邪入內所以脈數不解內外合邪而見消穀善食谷入既多反至六七日不大便且不煩淐是知其證非氣結而為血結以其表證誤下尚兼太陽隨經之熱未盡故以抵當為至當也若脈數不解而下利不止乃對假令已下脈數不解五句之文見已下脈數不解六七日不大便則宜抵當若下利不止又當隨其下血不下血而異治倘血分之熱邪不除必協熱而便膿血也詳此條系仲景揣度庸工之設辭意謂治病無問表裡證但發熱至七八日雖脈浮數意謂皆可下之謂其日數即久邪氣已入於腑可下而已非實謂此證有可下也仲景立法之至聖斷無脈浮發熱表證表脈而教人可下之理尚論以為七八日為時既久勢不得不用下法殊覺昧昧太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其未下者病人不惡寒而渴此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散寸緩關浮尺弱發熱汗出復惡寒純是太陽中風未罷之證設非誤下何得心下痞結耶如不誤下則心下亦不痞而太陽證必漸傳經乃至不惡寒而渴邪入陽明審矣然陽明津液既隨濕熱偏滲於小便則大腸失其潤而大便之硬與腸中結熱自是不同所以旬日不更衣亦無所苦也以法救之去其濕熱救其津液言與水及用五苓法也今世用五苓但知水穀偏注於大腸用之利水而止泄至於津液偏滲於小便用之消渴而回津者非仲景不能也更衣言易衣而如廁也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與承氣湯發汗宜桂枝湯病人得汗後煩熱解以太陽經之邪將盡未盡其人復如瘧狀日晡時發熱則邪入陽明審矣發熱即潮熱乃陽明之本候也然雖入陽明尚恐未離太陽故必重辨其脈脈實者方為陽明腑證宜下之若脈浮虛者仍是陽明而兼太陽經證更宜汗而不宜下矣陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈心下硬滿邪聚陽明氣分證兼太陽也故不可攻攻之利不止則邪氣未盡真氣先脫故死利止則邪氣去而正氣猶存故愈也脈浮而大心下反硬有熱屬臟者攻之不令發汗傷寒以脈浮為表證胸滿為陽邪此脈浮為熱氣內蒸達表必五六日後脈反浮大要非初病表證脈浮之比心下硬為燥結逆攻必先腹脹而後變心下硬亦非初病陽邪上結之比故仲景特申之曰有熱屬臟言內有實熱燥屎逆攻脾臟也且戒之曰不令發汗急當攻之此所謂憑證不憑脈也屬腑者不入溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻邪入陽明之腑必自汗小便多以其實熱內結津液滂滲也是以仲景有陽明病汗多禁利小便之戒此熱邪雖入陽明而未作裡實猶宜和解如小柴胡熱服亦能出汗汗多則邪從汗解而熱愈汗少則邪熱內結而便難若脈遲為熱尚少結水定硬須俟脈數結定然後攻之二條舊在脈法篇中今歸此太陽病二日而發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之本太陽中風誤用麻黃髮汗汗出過多反傷胃中津液所以不解熱邪乘虛內入而為表裡之證也蒸蒸者熱則有內勝達於外也惟熱在胃故用承氣以調其胃胃調則病渙然除矣傷寒吐後腹脹滿者與調胃承氣湯吐後腹滿則邪不在胸其為裡實可知但腹滿而不痛終屬表邪入里未實故不宜峻下少與調胃承氣和之可也陽明病不吐不下心煩者可與調胃承氣湯胃氣及津液既不由吐下而傷則心煩明系胃中熱熾故可與調胃承氣以安胃而全津液也可與者欲人臨病裁酌不可竟行攻擊也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證而嘔故知極吐下也太陽病過經十餘日心下溫溫欲吐而不吐其人胸中痛大便反溏腹微滿鬱郁微煩者此有二辨若曾經大吐大下是胃氣受傷邪乘虛入故用調胃承氣之法若未極吐下但欲嘔不嘔胸中痛微溏者是痛非吐所傷溏非攻所致調胃之法不可用矣豈但調胃不可用即柴胡亦不可用矣以邪尚在太陽高位徒治陽明少陽而邪不服耳解太陽之邪仲景言之已悉故此但示其意也若其人欲嘔則是為吐下所傷而致又不在太陽矣傷寒十三日不解過經譫語者已有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之此條原無表證雖丸藥誤下其脈仍和即為內實也按仲景下法屢以用丸藥為戒惟治脾約之麻仁丸一條因其人平素津枯腸結故雖邪在太陽即用丸之緩下潤其腸使外邪不因峻攻而內陷若俟陽明腑實而下恐無救於津液也陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之此濕熱上攻之證下之而外有熱手足溫不結胸則外邪原不甚重若其人頭汗出者亦是胸中鬱熱上攻所致宜因其高而揚之用梔子豉湯以撤其熱則陽得以下通於陰而周身濈然汗出解矣趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之成注謂胃強脾弱脾不為胃行其津液大謬若果脾弱即當補矣何為麻仁丸中反加大黃厚朴枳實乎仲景言胃強原未言脾弱況其所謂胃強正是因脾之強而強蓋約者省約也脾氣過強將三五日胃中所受之谷省約為一二彈丸而出全是脾土過燥至令胃中之津液日漸枯乾所以大便為難也設脾氣弱即當便泄矣豈有反難之理乎相傳謂脾約不能約束脾中之水何以反能約束胃中之救耶在陽明胃中凡宜攻下者惟恐邪未入胃大便弗硬又便初硬後溏不可妄攻若欲攻之先與小承氣湯試其轉失氣者方可攻皆是慮夫脾氣之弱故爾躊蹰也若夫脾約一證在太陽已當下矣更何用陽明耶脈浮而芤汗為陽芤為陰浮芤相搏胃氣生熱其陽則絶此言脾約當下不下則浮澀轉為浮芤津液竭而難下矣其陽則絶即陽絶於里亡津液之互辭趙以德云胃中陽熱亢甚脾無陰氣以和之孤陽無偶不至燔灼竭絶不止耳以上太陽陽明腑證陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯蕩人腹中轉失氣者此有燥屎乃可攻之若不用承氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便不硬宜少也以小承氣湯和之不轉失氣者慎不可攻也腹中之氣得攻藥不為轉動則屬虛寒所以誤攻而證變脹滿不能食及噦也攻後重復發熱大便因可得硬但為時未久必不多耳仍用小承氣湯和之若腹中氣仍不轉則不但大承氣大差即小承氣亦小差也陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下仲景既言脈遲尚未可攻而此證首言脈遲復言可攻者何也夫所謂脈遲尚未可攻者以腹中熱尚未甚燥結未定故尚未宜攻下攻之必脹滿不食而變結胸痞滿等證須俟脈實結定後方可攻之此條雖云脈遲而按之必實且其證一一盡顯胃實故當攻下無疑若以脈遲方宜一切下證則大陷胸之下證最急者亦將因循締手待斃乎陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也前條雖脈遲以有腹滿短氣所以不得不下且不容緩此條脈滑而疾即有譫語潮熱而無喘滿實證止宜小承氣下之下之而脈反微澀證變虛寒故為難治得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯無太陽少陽證則煩燥心下硬屬正陽陽明之可下無疑矣但其人脈弱雖是能食亦止宜小承氣微和之和之而當已覺小安俟隔日再與小承氣稍稍多進總由脈弱故爾躊蹰也至六七日竟不大便似乎胃實乃小便復少正恐胃弱而膀胱氣化之源室轉滲大腸初硬後溏耳所以小便利屎定硬乃可攻之此段之能食不能食全與辨風寒無涉言能食者不可以胃強而輕下不能食者不可以胃中有燥屎而輕下也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服按少陽陽明譫語脈短者死蓋陽明之脈本長而反短者為陰陽不附故死也此言脈弦者生澀者死蓋弦為少陽之脈雖木勝土而土氣未至於敗極猶能生養木氣故尚可生澀則津液耗竭血氣盡亡故死也又土衰下奔木邪難任故弦為失此便硬土實故弦為生汗出譫語者以有燥屎在胃中此為風也須下之過輕乃可下下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯此條之文似淺而實深仲景懼人不解已自為注腳不識後人何故茫然胃有燥屎本當用下以譫語而兼汗出知其風邪在胸必俟過經下之始不增擾所以然者風性善行數變下之若早徒引之走空竅亂神明耳然胃有燥屎下之不為大誤其小誤止在未辨證兼乎風若此者必再一大下庶大腸空而風邪得以並出故自愈此通因通用之法亦將差就錯之法也陽明譫語有潮熱反不能食者胃中必有燥屎五六故也宜大承氣湯下之若能食者但硬爾宜大承氣湯下之舊在但硬爾下今正之此以能食不能食辨燥結之微甚也詳仲景言病人潮熱譫語皆胃中熱盛所致胃熱則能消穀今反不能食此必熱傷胃中津液氣化不能下行燥屎逆攻於胃之故故宜大承氣湯急祛亢極之陽以救垂絶之陰若能食者胃中氣化自行熱邪原不為盛津液不致大傷大便雖硬而不久自行不必用藥反傷其氣也若以能食便硬而用承氣殊失仲景平昔顧慮津液之旨陽明病發熱汗出多者急下之宜大承氣湯汗多則津液外滲加以發熱則津液盡隨熱勢蒸騰於外更無他法以止其汗惟有急下引熱勢從大腸而出庶津液不敢盡越於外耳陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯以小承氣湯試其可下而用大承氣湯下之矣若下後心中懊憹而煩為病在氣分不解當察其所下多少或結或溏然後方可定其可下不可下設先後所下初硬後溏雖腹微滿為表邪乘虛入里之徵不可便下須俟結定乃可攻之若先前所不純是燥屎為下未盡即當再與大承氣湯以挾濟前藥急驅熱邪則煩滿立解矣病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也發作有時者邪熱攻擊燥屎上衝也急宜大承氣湯下之無疑大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯大下後六七日重不大便反加煩滿腹痛此先前所傷胃中宿食因下後始得下歸大腸而復結也當再攻之則熱邪與燥屎盡去方得解散耳病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯時有微熱喘促昏冒不能臥胃腑熱邪內實也以其人膀胱素有蓄熱才病即小便不利所以大便乍難乍易津既滲入大腸則膀胱愈涸熱邪愈固故宜急下以救陰為務也發汗不解腹滿痛者急下之宜大承氣湯發汗不解反腹中滿痛則邪不在表而在裡惟有急下一法庶滿去而病自解也腹滿不減減不足言當下之宜大承氣湯腹滿時減復如故為虛滿當用溫藥今雖稍減而實未嘗不滿故為減不足言言滿至十分即減去一二分不足殺其勢也當下無疑傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯此一條辨證最微細大便難則非久祕里證不急也身微熱則非大熱表證不急也故曰無表裡證即此可驗其熱邪在中耳熱邪在中亦不為急但其人目中不了了睛不和則急矣以陽明之深絡於目陽明熱甚則土邪淩水計惟急下以救陰為務也以上正陽陽明腑證陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也此因過汗傷津雖微煩不大便而無所苦終非熱邪固結之比內故無熱水穀之餘仍隨胃氣上蒸營衛一和津液自溉況大腸小腸皆屬於胃燥則腸胃皆燥潤則源流俱潤所以小便今反數少河為津液還入胃中大便不久自行無疑太陽病若吐若下若發汗微煩小便數大便難硬者與小承氣湯和之愈本太陽病以吐下傷陰故令微煩小便數大便因硬皆邪漸入里之機故少與小承氣微和胃氣即愈傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語傷寒四五日正熱邪傳裡之時況見脈沉喘滿里證已具而反汗之必致燥結譫語矣蓋燥結譫語頗似大承氣證此以過汗傷津而不致大實大滿腹痛止宜小承氣為允當耳陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服多汗譫語下證急矣以其人汗出既多津液外耗故不宜大下但當略與小承氣湯和其胃氣止其譫語而止若過服反傷津液後必復結也發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死此言太陽經得病時發汗不解及傳陽明重發其汗亡陽譫語之一證也亡陽之人神魂無主而妄見妄聞與熱邪傳心之候不同況汗多則太邪必從汗解正慮陽神飛越難返故脈短則陰陽不附脈和則陰陽未離其死生但從脈定耳其脈既短安問藥之所長哉夫實由譫語虛則鄭聲鄭聲重語也重語者字語重疊不能轉出下語真氣奪之故也直視譫語喘滿者死下利者亦死譫語者心火亢極加以直視則腎水垂絶心火無制故主死喘滿者邪乘陽位而上爭氣從上脫故主死下利者邪聚陰位而下奪氣從下脫亦死也設譫語內實下旁流清水者又不可誤認死證也傷寒後脈沉沉者內實也下解之宜大柴胡湯詳此條既曰傷寒後必是傳過三陽因汗不太過傷其津液所以脈沉而見內實證然必其人脈雖沉實而兼見弦緊或大熱雖去時有微熱不除故主此湯以盡少陽陽明內伏之餘邪設見沉實滑數表證絶無者又屬承氣證矣脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可以下之宜大柴胡湯前條脈沉者宜下則以大柴胡解之此條上言脈雙弦而遲為寒飲內結次言脈大而緊為寒邪留伏皆陽中伏有陰邪並可以下合用大柴胡無疑不言當下而曰可以下之不言主之而曰宜者以雙弦而遲似夫寒證至大而緊又與浮緊不殊以其心下硬故云可下與脈浮而大心下反硬有熱屬臟者攻之同例世本俱作宜大承氣湯傳寫之誤也大柴胡方中有半夏生薑之辛溫以滌飲散寒故可以治陽中伏匿之陰邪若大承氣純屬苦寒徒伐中土之沖和則痞結下利之變殆所必至也陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汗皆可為導凡系多汗傷津及屢經汗下不解或尺中脈遲弱元氣素虛人當攻下而不可攻者並宜導法但須分津液枯有用蜜導熱邪盛者用膽導溫熱痰飲固結薑汁麻泔浸栝蔞根導惟下旁流水者導之無益非大小氣峻攻不效以實結在內而不在下也至於陰經便祕者宜於蜜導中加薑汁生附子末或削陳醬真導之此實補仲景之未逮也以上皆屬陽明腑證咽中閉寒不可下下之則上輕下重水漿不下臥則欲蜷身急痛下利日數十行言初病便咽乾閉塞以其人少陰之真陽素虧故汗下俱禁下之則顯少陰虛寒諸證蜂起也諸外實者不可下下之則發微熱亡脈厥者當臍握熱諸外實者為表熱裡寒下之則表邪內陷客於下焦故脈伏不至四肢厥逆但當臍一片掣引而煩熱不寧也諸虛者不可下下之則大渴求水者易愈惡水者劇諸虛下之為重虛內竭津液故令大渴求水者陽氣未竭故易愈也脈數者不可下下之則必煩利不出陽明之脈必浮大若兼之以數為邪氣方熾下之則熱邪乘虛入里故內煩而協熱利也以上宿病禁下少陽篇少陽證統而言之邪居表裡之半析而言之亦有在經在腑之分然其治總不越小柴胡隨證加減為權衡謂其能於本經中鼓舞胃氣上載其邪於上也蓋少陽為樞職司開闔而轉運其樞者全賴胃氣充滿則開闔有權其邪不敢內犯胃氣不振則關鑰廢弛邪得出入無禁矣是少陽所主寧不重在胃氣乎少陽之為病口苦咽乾目眩也少陽熱熾故口苦咽乾熱聚於胸也目眩者木盛生風也傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽傷寒禁發汗少陽中風禁吐下二義互舉其旨益嚴蓋傷寒之頭痛發熱宜於發汗者尚不可汗則中風之不可汗不待言矣傷寒之胸滿而煩痰飲上逆似可吐下者尚不可吐下則傷寒之不可吐下更不待言矣頭痛發熱為太陽傷寒之候以其脈不浮緊而弦細故知邪入少陽之界矣脈弦細者邪欲入里其在胃中之津液必為熱耗重復發汗而驅其津液外出安得不譫語乎胃和者邪散而津回也不和者津枯而飲結所以煩而悸也胸滿而煩無形之風與有質之飲結於胸際故非吐下所能出徒取煩悸而已少陽上治全重在陽明故云此屬胃胃和則愈乃少陽一經之要領也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也傷寒三日少陽脈小者欲已也能食不嘔與胃和則愈互義脈不弦大邪微欲解之先徵傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之身熱惡風太陽證也頸項強太陽兼陽明證也脅下滿少陽證也本當從三陽合併病之例而用表法但其手足溫而加渴外邪輻湊於小陽而向里之機已著倘更用辛甘發散之法是重增其熱而大耗其津也故從小柴胡之和法則陽邪自罷而陰津不傷一舉而兩得之矣傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯主之陽脈澀陰脈弦渾似在裡之陰寒所以腹中急痛腹中急痛則陰陽乖於中而脾氣不建矣故以小建中之緩而和其急腹痛止而脈不弦澀矣若不瘥則弦為少陽之本脈而澀乃汗出不徹腹痛乃邪傳太陰之候則用小柴胡以和陰陽而升舉其陰分之邪為的當無疑矣傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之少陽主半表半裡之間其邪入而並於陰則寒出而並於陽則熱往來寒熱無常期也風寒之外邪挾身中有形之痰結聚於少陽之本位所以胸脅滿也胸脅既滿胃中之水穀亦不消所以默默不欲食即昏昏之意非靜默也心煩者邪在胸脅逼處心間也或嘔或不嘔或渴或不渴諸多見證各隨人之氣體不盡同也然總以小柴胡和法為主治而各隨見證以加減之耳本方以柴胡為少陽一經之嚮導專主往來寒熱謂其能升提風木之氣也黃芩苦而不沉黃中帶青有去風熱之專功謂其能解風木之邪也半夏力能滌飲膽為清淨之府病則不能行清淨之令致寒飲沃於內熱邪淫於外非此迅掃涎沫則膽終不溫表終不解也其用人參甘草補中者以少陽氣血皆薄全賴上膏資養則水氣始得發榮即是胃和則愈之意用薑棗和胃者不得使半表之邪仍從肌表而散也獨怪後世用小柴胡一概除去人參加入耗氣之藥此豈仲景立方本意哉傷寒中風有柴胡證但見一證便是不必悉具若胸中煩而不嘔去人參半夏加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩胸為陽分煩為陽邪以陽邪留薄於胸中故去半夏人參之助陽而加栝蔞實以滌飲除煩也渴為津液受傷故去半夏之辛燥而用栝蔞根之清潤加用人參之甘以益津也腹中痛者為陽邪攻陰以黃芩能傷胃中清陽之氣故去之芍藥專主陽邪傳陰為陰中伐木之要藥故滯下亦咸用之設陰寒腹痛自利又為切禁也脅下痞硬為飲結少陽部分故去大棗之甘壅而加牡蠣以軟堅逐邪為務也心下悸而小便不利為水停心下故去黃芩之苦寒助陰而加茯苓以淡滲利水也故不渴外有微熱者知熱邪未入於裡故去人參而加桂枝溫覆取微汗以解表也若咳者為肺氣受邪故用大棗之益氣生薑之上氣而加乾薑之辛散兼五味之酸辛以散邪斂肺也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解下之而證不罷復與柴胡以升舉之使邪不致陷入陰分也設見腹痛煩燥等證必當從去黃芩加芍藥法矣本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆本表證而用表藥汗不透故未愈當再與輕表則立解矣醫見熱不除疑為前藥不當反與下藥則誤矣然雖誤下以其先曾用過表劑邪勢已殺矣故不為逆但未盡表邪因下藥引入半里所以從少陽例治也邪氣已入於腑與里藥下之矣其下未盡故熱不去當更與里藥則已醫見下之不愈疑前藥未當反與表藥則誤矣以其先前曾用過下藥里邪少殺故不為逆但未盡餘熱因表藥提出半表所以亦從少陽治例也傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便難脈細者此為陽微結必有表復有里也脈沉亦有里也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解陽微結者陽分之邪微微結聚不能傳出於表也注作陽氣衰微故陽氣結聚大差果爾則頭汗出為亡陽之證非半表半裡之證矣果爾則陰結又是陰氣衰微矣既本文假令純陰結等語謂陽邪若不微結純是陰邪內結則不得復有外證其義甚明得屎而解即前證過經十餘日用大柴胡分提使傳之法也婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿而結胸狀譫語者此為熱入血室當刺期門隨其實而瀉之中風七八日熱邪傳裡之時因經水適來邪氣乘虛而入血室卻不入於胃腑也經水適來而即止必有瘀結此為實證故宜刺期門以瀉之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之中風七八日表證已罷經水不應斷而適斷復見寒熱如瘧必經行未盡而有結血然經既行而適斷此為虛證故不可瀉宜小柴胡和之婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈傷寒熱邪在表故經水來而不斷雖為熱入血室以氣分不受邪故晝日明瞭但夜則譫語候經盡熱隨血散自愈不可刺期門妄犯胃氣及用柴胡犯上二焦也血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪相爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必然邪高痛下故使嘔也小柴胡湯主之申明上二焦熱入血室之由尚恐如結胸狀四字邪有不盡故以臟腑相連邪高痛下暢發病情蓋血室者衝任也下居腹內厥陰肝之所主也而少陽之膽與肝相連腑邪在上臟邪在下胃口逼處二邪之間所以默默不欲食而但喜嘔也太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽病十日已去脈浮細嗜臥外證已去其證有兩一為邪入少陰陽邪傳裡之候一為表邪解散不傳之候故見胸滿脅痛證屬少陽當用小柴胡無疑倘脈尚見浮緊雖證顯少陽仍當用麻黃湯開發腠理使太陽之邪仍從營分而散也以上少陽經證本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之尚未吐下雖脈沉緊者猶當與小柴胡湯言表邪初陷於裡未變為實猶可提其邪氣外出而解若已吐下發汗溫針是為壞病邪氣已全入里正氣內傷不可用小柴胡也然必柴胡證罷乃為少陽里病不可與太陽壞病例世也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之此係少陽之裡證諸家注作心經病誤也蓋少陽有三禁不可妄犯雖八九日過經下之尚且邪氣內犯胃土受傷膽木夫榮痰聚膈土故胸滿煩驚驚者膽不寧非心虛也小便不利譫語者胃中津液竭也一身盡重者邪氣結聚痰飲於脅中故令不可轉側主以小柴胡和解內外逐飲通津加龍骨牡蠣以鎮肝膽之驚即是虛勞失精之人感冒用桂枝湯加龍骨牡蠣同意太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止者心下急鬱郁微煩為未解也與大柴胡湯下之則愈過經十餘日不知少陽證未罷反二三下之因而致變多矣後四五日柴胡證仍在未有他變本當兩解表裡但其人之邪屢因誤下而深入不能傳散故必先用小柴胡提其邪出半表然後用大柴胡為合法也傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之過經不解者言三陽俱已傳過故其法在半表半裡之間胸脅滿而嘔邪在少陽也發潮熱里可攻也微下利便不硬也以大柴胡不解表邪蕩滌裡熱則邪去而微利亦自止也若誤用丸藥則徒引熱邪內陷而下利表裡俱不解也故先用小柴胡分提以解外邪加芒硝以蕩滌胃中之虛熱也以上少陽腑證服柴胡湯已渴者屬陽明也此法治之風寒之邪從陽明而傳少陽起先不渴里證未具及服小柴胡湯已重加口渴則邪還陽明當調胃以存津液矣然不曰攻下而曰以法治之其意無窮蓋少陽之寒熱往來明有渴證倘少陽未罷而恣言攻下不自犯少陽之禁乎所以少陽重解陽明之證但云以法治之上條少陽轉陽明證傷寒七八日無大熱其人躁煩者此為陽去入陰故也邪氣傳裡則躁煩不傳裡則安靜也上條少陽經將傳太陰證少陽病欲解時從寅至辰上上條少陽經證自解候太陰篇太陰居三陽二陰之間本無外中之寒即有中風亦必緣飲食後腠理疏而入故太陰但有桂枝而無麻黃證也尚論以為但舉桂枝而麻黃不待言者亦未達此義或言太陰既無中寒何得有四逆湯證曰此蓋脾胃素虛之人內傷飲食得之故太陰寒證但曰臟寒不曰中寒其他傳經之證或緣先傷飲食或緣攻下所致故太陰傳經之邪無大熱證非少陰厥陰之比惟桂枝大黃湯一證乃緣誤下陽邪內陷而腹痛用以泄陷內之陽邪非太陰有可下之例也即先傷飲食致傳者亦必邪傳胃腑乃可攻下太率當下當溫以腹之或滿或痛辨其虛實治之為當也若循經從少陽傳次太陰不過往來寒熱等少陽證罷而見煩躁不寧腹滿時痛手足自溫肌肉重按則熱肌表卻不熱脈沉細或微畏寒足冷當從傳經例隨證分解之太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬腹滿自利太陰之本證也吐而食不下則邪迫於上利甚而腹滿則邪迫於下上下交亂胃中空虛此但可行溫散設不知而誤下之其在下之邪可去而在上之邪陷矣故胸中結硬與結胸之變頗同胃中津液上結胸中陽氣不布卒難開滌也自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩自利不渴者屬太陰太陰主水穀故病自利內有真寒故不渴注謂自利不渴濕勝也故用四逆輩以燠土燥濕非也仲景大意以自利不渴者屬太陰以自利而渴者屬少陰分經辨證所關甚巨蓋太陰屬濕土邪熱入而蒸動其濕則顯有餘故不渴而多發黃少陰屬腎水熱邪入而消耗其水則顯不足故口渴而多煩躁也今自利不渴知太陰臟寒故當溫之宜用四逆輩則理中等可不言而喻也太陰濕土之臟有寒不用理中而用四逆者水土同出一源冬月水暖則土亦暖夏月水寒則土亦寒所以土寒即陰內陽外故用四逆以溫土也以上太陰臟寒證本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之太陽之誤下其病皆在胸脅以上陽邪傷陽分也此因誤下而腹滿時痛無胸脅等證則其邪已入陰位所以屬太陰也腹滿者太陰裡氣不足也時痛者有時而痛非大實大滿之痛也故仍用桂枝解肌之法以升舉陽邪但倍白芍藥以收太陰之逆氣本方不增一藥斯為神耳大實痛者桂枝加大黃湯主之大實痛則非有時而痛者可例矣故前方但倍芍藥而此則加大黃加大黃者取其苦寒能蕩實熱也以其大實大滿宜從急下然陽分之邪初陷太陰未可峻攻但於桂枝湯中少加大黃七表三里以分殺其邪可也太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也此段叮嚀與陽明篇中互發陽明曰不轉失氣曰先硬後溏曰未定成硬皆是恐傷太陰脾氣此太陰證而脈弱便利減用大黃芍藥又是恐傷陽明胃氣也傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自利以脾家實腐穢易去故也太陰脈本緩故浮緩雖煩太陽之中風手足自溫則不似太陽之發熱更不似少陰之四逆與厥所以系在太陰允為恰當也太陰脈見浮緩其濕熱交盛勢必蒸身為黃若小便自利者濕熱從水道而泄不能發黃也至七八日暴煩下利日數十行其證又與少陰無別而利盡腐穢當自止則不似少陰之煩躁有加下利漫無止期也況少陰之煩而下利手足反溫脈緊反去者仍為欲愈之候若不辨晰而誤以四逆之法治之幾何不反增危困耶雖陽明與太陰腑臟相連其便硬與下利自有陽分陰分之別而下利中又有溫裡實脾之別溫里宜四逆湯實脾宜五苓散利水即所以實脾脾實則腐穢不攻而去也以上誤下熱傳太陰證傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也此太陰轉屬胃腑證也脈浮而緩本為表證然無發熱惡寒外候而手足自溫者是邪已去表而入里其脈之浮緩又是邪在太陰以脾脈主緩故也邪入太陰勢必蒸濕為黃若小便自利則濕行而發黃之患可免但脾濕既行胃益乾燥胃燥則大便必硬因復轉為陽明內實而成可下之證也下之宜桂枝大黃湯傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治若欲似大便而反失氣仍不利者屬陽明也便必硬十三日愈其所以然者經盡故也霍亂為胃中鬱滯寒物故其脈當微澀今復寒是外邪脈當浮盛而不當微澀也四五日為轉入陰經之時忽然自利嘔逆而脈微澀者恐是陽氣頓逆陰氣暴逆其勢叵測故不可妄治非不治也若欲似大便而反失氣仍不利也此太陰轉屬陽明必便硬可攻至十三日過經而愈也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也此言下利止後必能食而便硬陽明胃氣有權也若利雖止而不能食邪熱去而胃氣空虛也俟過一經胃氣漸復自能食矣設日久不能食將成脾胃虛寒嘔逆變證也或能食而久不愈此熱氣有餘必發癰膿也以上太陰轉陽明證太陰病脈浮者可發汗宜桂枝湯太陰脈尺寸俱沉細今脈浮里邪還於表可知矣故仍用桂枝擊其邪而隋之歸也太陰中風四肢煩疼陽微陰澀而長者為欲愈四肢煩疼者脾主四肢亦風淫末疾之驗也陽脈微陰脈澀則風邪已去而顯不足之象但脈見不足正恐元氣已離暗伏危機故必微澀之中更加其脈之長而不短知元氣未衰其病為自愈也注家未審來意謂澀為血凝氣滯大謬豈有血凝氣滯反為欲愈之理耶以上太陰轉陽明經證太陰病欲解時從亥至醜上上條太陰經證自解候少陰上篇傷寒邪在三陽太陽為首邪在三陰少陰為先少陰雖居太陰厥陰之中而實為陰經之表以其與太陽表裡又與陰維相附且人腎氣多虛受病最易況原委不一人但知少陰有傳經直中兩岐救陰回陽之法不知直中雖當回陽而有兼汗兼溫之殊傳經雖宜救陰復有補正攻邪之別豈有一概混淆能令讀者無眩耶蓋傳經熱邪先傷經中之陰甚者邪未除而陰已竭獨是傳入少陰其急下之證反十之三急溫之證反十之七而宜溫之中復有次第不同毫釐千里粗工不解必於曾犯房室之證始敢用溫及用一切當溫之證反不能用詎知未病先勞其腎水者不可因是遂認為當溫也必其人腎中之真陽素虧復因汗下後擾之外出而不能內返勢必藉溫藥以回其陽方可得生所以傷寒門中亡陽之證最多即在太陽已有種種危候至傳少陰其證辨之際仲景多少遲徊顧慮不得從正治之法清熱奪邪以存陰為先務也今將直傷陰經之證與夫汗下太過元氣受傷從權用溫經之法者疏為上篇正治存陰之法疏為下篇其溫熱病之發於少陰者另自為篇庶涇渭條分根蔓不亂耳少陰之為病脈微細但欲寐也此言少陰之總脈總證也蓋少陰屬水主靜即使熱邪傳至此經其在先之脈雖滑大亦必變為微細故先之證雖煩熱不寧亦必變為昏沉嗜臥但仍不得安臥為異耳況夫少陰經自感之寒證耶但須以先見表證至五六日後變出脈細沉數口燥不得臥者為熱證始病便脈微細口中中利但欲臥者為寒證以此明辨萬無差誤耳其所以但欲寐者以衛氣行陽則寤行陰則寐也少陰病始得之反發熱脈沉者麻黃附子細辛湯主之脈沉發熱乃少陰兼太陽之表邪當行表散非少陰病四五日後陰盛格陽真陽發露之比但三陰之表法與三陽迥異三陰必以溫經之藥為表而少陰尢為縈關故麻黃與附子合用使外邪出而真陽不出才是少陰表法之證也少陰得病之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也得病才二三日無吐利躁煩口渴里證其當從外解無疑然少陰絶無發汗之法汗之必至亡陽惟此一證其外發熱無汗甘內不吐利躁煩嘔渴乃可溫經散寒取其微似之汗此義甚微在太陽經但有桂枝加附子之法並無麻黃加附子之方蓋太陽病無脈微惡寒之證即當不用附子及見脈微惡寒吐利躁煩等證亡陽已在頃刻又不當用麻黃即此推之凡治陰寒厥病而用麻黃者其殺人不轉睫矣少陰病得之一二日口中和其背惡寒者當炙之附子湯主之口中和者不渴不躁全無表熱可知況背為督脈統諸陽上行之地他處不到獨覺其背惡寒者則陽微陰盛之機已露一班故炙之以火助陽而消陰主之以附子湯溫經而散寒也不知者謂傷寒才一二日外證且輕何反張皇若此詎識仲景正以一二日即顯陽虛陰盛之證早從暴病施治若待三四日勢必極盛難返不可救藥矣按少陰自感之寒有始得之反發熱脈沉者有初入太陽不作鬱熱便入少陰者二證似不甚相遠若詳察病情大相懸絶一則陰經獨困而太陽不至於失守故脈雖沉尚能發熱即延至二三日熱猶在表而無吐利厥逆里證可見尚有太陽經外垣可恃也一則太陽表氣大虛邪氣即得入犯少陰故得之二三日尚肯惡寒不發熱此陰陽兩虧較之兩感更自不同兩感表裡皆熱熱邪猶堪發表攻裡此則內外皆屬虛寒無邪熱可以攻擊急當溫經補陽溫補不足更炙關元以協助之其證雖似緩於發熱脈沉而危殆尤甚若稍延緩或遇庸工不敢用大熱峻補多致不救也少陰病身體痛手足寒骨節痛脈沉者附子湯主之一身骨節俱痛者太陽經病也若手足寒而脈沉則腎中真陽之虛審矣可見身體骨節之痛皆陽虛所致而與外感不相涉也故用附子湯以助陽而勝腎寒斯骨節之痛盡除也若以其痛為外感之邪寧不殺人耶少陰病脈沉者急溫之宜四逆湯外邪入少陰宜與腎氣兩相搏擊乃脈見沉而不鼓即內經所謂腎氣獨沉之義其人陽氣衰弱可知故當急溫以助其陽也少陰病下利白通湯主之下利無陽證者純陰之象恐陰盛而隔絶其陽最急之兆也故於四逆湯中去甘草之緩而加蔥白於姜附之中以通其陽而消其陰遂名其方為白通取蔥白通陽之義也少陰病下利脈微者與白通利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生與白通湯反至厥逆無脈乾嘔而煩此非藥之不能勝病也而無嚮導之力宜其不入耳故復加人屎豬膽汁之陰以引陽藥深入然服湯藥脈必微續者生暴出反死甚哉虛陽之易出難回也亦危矣故上條才見下利早用白通圖功於未著真良法也少陰病二三日不已至四五日腹滿小便不利四肢沉重疼痛自不利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之陰寒盛而水泛濫由陽虛不難攝水復不能生土以制水以故腹痛小便不利四肢沉重疼痛自下利或小便亦利或咳或嘔水性泛濫無所不之非刺真武坐鎮北方之水寧有底哉太陽篇中厥逆筋惕肉瞤而亡陽者用真武湯之法以表明之矣茲少陰之水濕上逆仍用真武一法以鎮攝之可見太陽膀胱與少陰腎一臟一腑同居北方寒水之位腑邪為陽邪藉用麻黃為青龍臟邪為陰邪藉用附子為真武得此二湯以滌痰導水消陰攝陽其神功妙濟真有不可思議者按真武湯方本治少陰病水飲內結所以首推朮附兼茯苓生薑之運脾滲水為務此人所易明也至用芍藥之微旨非聖人不能蓋此證雖曰少陰本病而實緣水飲內結所以腹痛自利四肢疼重而小便反不利也若極虛極寒則小便必清白無禁矣安有反不利之理哉則知其人不但真陽不足真陰亦已素虧或陰中伏有陽邪所致若不用芍藥固護其陰豈能勝附子之雄烈乎即如附子湯桂枝加附子湯芍藥甘草附子湯皆芍藥與附子並用其溫經護營之法與保陰回陽不殊後世用藥能獲仲景心法者幾人哉若咳者加附子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤嘔加生薑宜矣乃水寒上逆為嘔正當用附子者何以反去之耶蓋真武中除去附子外更用無熱藥乃為肺胃素有積熱留飲慣嘔而去之又法外之法也觀後通脈四逆湯嘔者但加生薑不去附子豈不甚明所以暴病之嘔即用真武尚不相當也少陰病下利清穀裡寒外熱手足厥冷脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈下利裡寒種種危殆其外反熱其面反赤其身反不惡寒而手足厥逆脈微欲絶明系群陰格陽於外不能內反也故於四逆湯中倍用乾薑大溫其里以勝外邪更效白通之法加蔥白以入陰微陽而復其脈也前條云脈暴出者死此條云脈即出者愈其辨最細蓋暴出則脈已離根即出其脈已返舍由是外反發熱而不惡寒真陽尚在軀殼然必通其脈其脈即出始為休徵設脈出艱遲其陽已隨熱勢外散又主死矣面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩面赤色者陽格於上加蔥以通陽氣故名通脈也腹中痛真陰不足也去蔥惡順其陽加芍藥以收陰也咽痛陰氣上結也去芍藥惡其斂陰加桔梗以利咽也利止脈不出陽氣未復兼陰血未充故加人參以補其氣血去桔梗者惡其上載而不四通也少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之是少陰兼厥陰之候也吐利厥冷而至於煩躁欲死腎肝之陰氣上逆將成危候故用吳茱萸以下其逆氣人參薑棗以厚其脾土乃溫經而兼溫中則陰氣不復上干矣少陰病吐利躁煩四逆者死上吐下利因致躁煩則陰陽擾亂而竭絶可虞更加四肢逆冷中州之土先敗上下交徵中氣立斷故主死也使早用溫中之法寧至此乎上條言吐利手足厥冷煩躁欲死者用吳茱萸湯此吐利躁煩厥逆與上條不殊何彼可治而此不可治耶故此證用溫中轉加躁煩故為死耳少陰病飲食入口即吐心下溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯飲食入口即吐猶曰胃中不能納穀也若不飲食之時復欲吐而不能吐明系陰邪上逆此等處必加細察若始得之便手足寒而脈弦遲即非傳經邪熱可擬然陰邪固有是證而痰飲亦有其脈設思胃中痰實當行吐發提之今見欲吐不吐專為陰氣上逆無疑即使膈上有寒飲乾嘔亦屬陰邪用事非尋常祛痰之藥可施設誤用吐法必致轉增其劇計惟急溫之法以助陽勝陰則寒飲亦得開散一舉而兩得之也少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐心煩腎氣上逆之徵也自利而渴加以口燥舌乾引水自救似乎熱證之形然腎熱則水道黃赤若小便色白又非腎熱乃下焦虛寒不能制水仍當從事溫法不可誤認為熱而輕投寒下也自此條而下凡十餘例皆是傳次少陰虛寒壞證仲景俱不立方者以其陰陽兩傷血氣並竭多死少生故也病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利陰陽俱緊傷寒之脈也傷寒無汗反汗出者無陽以固其外所以邪不出而汗先出也少陰之邪不出則咽痛吐利即當用少陰溫經散寒之法不言可知也少陰病脈微不可發汗亡陽故也陽已虛尺脈澀者不可下之亡陽不可發汗與上條互發亡與無同無陽則其邪為陰邪陰邪本宜下然其人陽已虛尺脈弱澀者復不可下其當急行溫法又可見矣厥而脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前少陰之絡入肺中循喉嚨系舌本肺為之標本虛則標弱故聲亂咽嘶舌萎語不得前也前四條皆少陰經虛寒壞證也仲景雖不出方然猶可治詳少陰病欲吐不吐一條宜真武湯救之病人脈陰陽俱緊一條宜附子湯加桔梗赤石脂少陰病脈微不可發汗一條宜白通加人尿豬膽汁此條厥而脈緊則當用四逆湯溫之反誤發汗致聲亂咽嘶舌萎不可救矣少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死脈微細沉欲臥少陰之本證也汗出不煩則陽證悉罷而當顧慮其陰矣乃於中間帶欲吐一證欲吐明系陰邪上逆正當急溫之時失此不圖至五六日自利有加復煩躁不得臥寐非外邪至此轉增正少陰腎中之真陽擾亂頃刻奔散即溫之亦無及矣況始先不煩今更煩躁始先欲寐今更不得臥寐所存一線之陽擾亂若此可復收乎少陰病惡寒身蜷而利手足厥冷者不治陰盛無陽即用四逆等法回陽氣於無何有之鄉其不能回者多矣故曰不治少陰病四逆惡寒而身熱脈不至不煩而躁者死脈不至陽已先絶不煩而躁孤陰頃刻自盡矣少陰病下利止而頭眩時時自冒者死下利既止其人似可得生乃頭眩時時自冒者復護也少陰病吐利手足不逆冷反發熱者不死脈不至者炙少陰七壯少陰病手足不逆冷而反發熱似乎陰盡復陽之兆但吐利未止而脈不至又似真陽發外故於少陰本穴用炙法以引其陽內返斯脈至而吐利亦得自止耳前條皆惡寒之證炙後用附子湯者陰寒內凝定非一炙所能勝此條手足反熱止是陰內陽外故炙本經以招之內入不必更用溫藥也以上少陰虛寒證少陰病惡寒而蜷時時自煩欲去衣被者可治自煩欲去衣被真陽擾亂不寧尚未至出亡在外故可用溫法然必微煩即止神氣不亂手足漸溫脈來沉微不絶方為可治設見躁逆閟亂擾攘不寧手足厥冷脈反躁急或散大無倫皆死證也少陰病下利若利自止惡寒而蜷臥手足溫者可治惡寒蜷臥證本虛寒利止手足溫則陽氣漸復其陰寒亦易散故可用溫以助其陽之復也少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰病脈本緊至七八日自利則陰寒得以下走故脈反和而手足溫暖陽氣將復也雖煩而利必自愈三條互見此則邪解寒回可勿藥自愈之證即醫去人安之互辭也少陰中風脈陽微陰浮者為欲愈風邪傳入少陰仍見陽浮陰弱之脈則其勢方熾必陽脈反微陰脈反浮乃為欲愈蓋陽微則外邪不復內入陰浮則內邪盡從外出故欲愈也少陰負趺陽者為順也少陰水也趺陽土也諸病惡土剋水而傷寒少陰見證惟恐土不能制水其水反得以泛濫則嘔吐下利無所不至究令中州土敗而真陽外越神丹莫救矣此脈法中消息病情之奧旨也以上少陰回陽證少陰病欲解時從子至寅上各經皆解於所王之時而少陰獨解於陽生之時陽進則陰退陽長則陰消正所謂陰得陽則解也即是推之而少陰所重在真陽不可識乎上條少陰經自解候為死候蓋人身陰陽相為依附者也陰亡於下諸陽於上聚於頭者紛紛然而動所以頭眩時自冒陽脫於上而主死也可見回陽利止則生陰盡利止則死矣少陰病六七日息高者死諸陽主氣息高則真陽上逆於胸中本實先撥而不能復歸於氣海故主死也六七日三字辨證最細少陰病喘而息高至六七日真氣上脫殆盡不死何待與太陽病二三日作喘之表證迥殊也況少陰腎氣上乘於肺之間脈必虛微無力若太陽邪氣上壅於肺之喘脈必浮緊有力自是不侔耳少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上炙之下利而脈見陽微陰澀為真陰真陽兩傷之候嘔者陰邪上逆也汗出者陽虛不能外固陰弱不能內守也數更衣反少者陽虛則氣下墜陰弱則動努責也是證陽虛本當用溫然陰弱復不宜於溫一藥之中既欲救陽又欲護陰漫難區別故於頂上之百會穴灸之以溫其上而升其陽庶陽不致下留以逼迫其陰然後陰得安靜不擾而下利自止耳此證設用藥以溫其下必逼迫轉加下利不止而陰立亡故不用溫藥但用灸法有如此之回少陰下篇少陰病脈細沉數病在裡不可發汗沉細中加之以數正邪熱入里之徵邪熱入里即不可發汗發汗則動其經而有奪血亡陽之變故示戒也少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四肢為諸陽之本陽邪傳至少陰陷下於里而不能交通陽分乃至四逆下利其中土之陽氣亦傷所以亟用柴胡升陷內之陽邪枳實破內滯之結熱甘草助脾胃之陽運芍藥收失位之陰津允為利解少陰陰陽痞膈之定法慎不可以其陽熱結內而用下法也蓋傷寒以陽為主四逆有陰進之象若復用苦寒攻之則陽益虧所以有諸四逆者不可下之之戒咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚泡令折泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服此證雖屬少陰而實脾胃不和故爾清陽之氣不能通於四末是用四逆散清理脾胃而散陰分之熱滯乃正治也至於腹中痛者加附子於此不能無疑蓋陽邪內陷之腹痛只宜小建中和之而此竟用附子者以其證雖屬陽邪必其人內有沉寒結滯不散更兼形體素豐可受陽藥方可加熱藥於清理脾胃劑中仍是用和之法而非溫經助陽之義觀下文即云泄利下重者加薤白則知熱滯雖得下利究竟不能速通所以急行滌垢為務即咳加五味子乾薑總是從治之法慎勿以其用熱治熱而致感也少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也少陰之脈從足入腹上循喉嚨縈繞舌本故多咽痛之證則支別出肺故間有咳證今以火氣強迫其汗則熱邪挾火力上攻必為咳以肺金惡火故也下攻必為利以火勢逼迫而走空竅故也內攻必譫語以火勢燔灼而亂神識故也小便必難者見三證皆妨小便蓋肺為火熱所傷則膀胱氣化不行大腸奔迫無度則水穀並趨一路心包燔灼不已則小腸枯涸必至耳少陰可強責其汗乎少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治強責少陰汗而動其血勢必逆行而上出陽竅以發汗皆陽藥故也或口鼻或耳目較之從陰竅出者則倍危矣下厥者少陰居中不得汗而熱深也上竭者少陰之血盡從上而越竭矣少陰本少血且從上逆故為難治然則熱在膀胱必便血者豈非以多血且從便出為順乎少陰病咽中痛半夏散及湯主之少陰病咽中傷生瘡不能言語聲不出者苦酒湯主之太陽之熱邪薄於少陰則陰火挾痰攻咽所以作痛當用半夏以滌飲兼桂枝以散邪甘草以緩急也若劇者則咽傷生瘡音聲不出為陰邪上結復與寒下不宜故用半夏以開結雞子以潤咽更藉苦酒消腫斂瘡以勝陰熱也勝陰熱者正所以存陰也飲散則熱解即內經流濕潤燥之意與厥陰喉痹麻黃升麻湯證例同少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之腹痛小便不利少陰熱邪也而下利不止便膿血則下焦滑脫矣滑脫即不可用寒藥故取乾薑石脂之辛澀以散邪固脫而加粳米之甘以益中虛蓋治下必先固中中氣不下墜則滑脫無源而自止此從治之法也故注及內臺方謂其用乾薑而曰裡寒謬矣少陰病下利便膿血者桃花湯主之少陰病便膿血者可刺先下利而後便膿血則用桃花湯若不下利而但便膿血則可刺經穴以散其熱今不用刺法當從事白頭翁湯設更兼咽乾心煩不得臥又須黃連阿膠湯為合法耳少陰病自利清水色純清心下必痛口乾燥者急下宜大承氣湯熱邪傳入少陰逼迫津水注為自利質清而無滓穢相雜色青而無黃赤相間可見陽邪暴虐之極反與陰邪無異但陽邪傳自上焦其人心下必痛口必乾燥設系陰邪則心下滿而不痛口中和而不渴必無此枯槁之象故宜急下以救其陰也以上少陰傳經熱證少陰病六七日腹脹不大便者急下之宜大承氣湯少陰之症自利者最多虛寒則下利清穀滑脫則下利膿血故多用溫藥傳經陽邪內結則自利純清水溫熱病則自利作渴並宜下奪清熱此以六七日不大便而腹脹可見邪熱轉歸陽明而為胃實之證所以宜急下也然六七日腹脹不大便何得目之少陰必在先曾見咽痛自利煩渴至五六日無邊際是熱則少陰必無此證當是藏庶學者易於膀胱之候以膀胱主表故一身厥陰之為病消渴氣之血為少陰之熱所逼其趨必出二陰之竅以陰主降故也宜當歸四逆和營透表兼疏利膀胱為合法也上條少陰熱邪轉膀胱腑證厥陰篇厥陰篇中次第不一有純陽無陰之證有純陰無陽之證有陰陽差多差少之證有陽進欲愈之證有陰進未愈之症大率陽脈陽證當從三陽經治法陰脈陰證合用少陰經治法厥陰見陽為逆愈見陰為難愈其陰陽錯雜不分有必先溫其里後解其表設見咽喉不利咳唾膿血則溫法不可用仍當先解其表矣世醫遇厥陰諸證如涉大洋茫無邊際是以動手即錯耳茲以類相聚分為五截庶學者易於入室也厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止蛔蛔同消渴者飲水多而小便少也厥陰邪熱盛則腎水為之消故消而且渴其渴不為水止也氣上撞心心中疼熱者肝火上乘肝氣通於心也飢不欲食者木邪橫肆胃土受制也食則吐蛔者胃中飢蛔臭食則出也下之利不止者邪在厥陰下之徒傷陽明木益乘其所勝是以食則吐蛔下之利不止耳按厥陰原無下法故首先示戒云下之利不止蓋厥多主下利下利中伏有死證中間雖有小承氣一法因胃有燥屎微攻其下非攻厥陰之邪也厥陰與少陽表裡邪在少陽已有三禁豈厥陰反宜下乎雖有厥應下之一語乃對發汗而言謂厥應內解其熱不當外發其汗豈可泥應下二字遂犯厥陰之大戒耶今人每謂傷寒六七日當下此特指陽邪入腑而言未嘗言邪傳厥陰可下也張卿子曰嘗見厥陰消渴數症舌盡紅赤厥冷脈微渴甚服白虎黃連等湯皆不救蓋厥陰消渴皆是寒熱錯雜之邪非純陽亢熱之證豈白虎黃連等藥所能治乎傷寒脈微而厥至七八日膚冷其入躁無暫安時者此為臟厥非蛔厥也蛔厥者其人嘗吐蛔今病者靜而復時煩此為胃寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅主之又主久利臟厥者其人陽氣素虛腎臟之真陽衰極蛔厥者始本寒邪因發汗吐下太過或寒飲蓄積胃中寒熱在胃蛔不能安而上膈也脈微而厥則陽氣衰微可知然未定其臟厥蛔厥也惟膚冷而躁無暫安時加以趺陽脈不出乃為臟厥臟厥用附子理中湯及灸法其厥不回者死若是蛔厥則時煩時止未為死候但因此而馴至胃中無陽則死也烏梅丸中酸苦辛溫互用以治陰陽錯亂之邪胃中之寒熱和而蛔自安矣厥陰多主下利厥逆所以久利而變膿血亦不出此主治也病人有寒復發汗胃中冷必吐蛔病人素有寒飲復發其汗則大損胸中陽氣胃中寒飲愈逆致蛔不安而上出也後人以理中丸加烏梅治之仍不出仲景之成則耳傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之傷寒本自寒下其人下虛也醫復吐下之損其胸中陽氣內為格拒則陰陽不通食入即吐也寒格更逆吐下言醫不知又復吐下是為重虛故用乾薑散逆氣而調其陽辛以散之也芩連通寒格而調其陰苦以泄之也人參益胃氣而調其中甘以緩之也傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也腹證多屬虛寒與實滿不同若更轉氣下趨少腹必因痛而致下利明眼見此自當圖功於未著也按腹痛亦有屬火者其痛必自下逆攻而上若痛自上而下趨者定屬寒痛無疑下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也太陽陽明並病面色緣緣正赤者為陽氣怫鬱宜解其表此下利脈沉遲而面見少赤身見微熱者陰寒格陽於外則身微熱格陽於上則面少赤仲景以為陽虛者謂下無其陽而反在外在上故云虛也虛陽虛於外越上出危候已彰或其人陽尚有根或用溫藥以勝陰助陽陽得復返而與陰爭差可恃以無恐蓋陽返雖陰不能格然陰尚盛亦未肯降必鬱冒少頃然後陽勝而陰出為汗邪從外解自不下利矣下利清穀裡寒外熱汗出而厥者通脈四逆湯主之上條辨證此條用藥兩相互發然不但此也少陰病下利清穀面色赤者已用其法矣要之通之正所以收之也不然豈有汗出而反加蔥之理哉下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯此與太陽篇中下利身疼先里後表之法無異彼因誤下而致下利此因下利而致腹脹總之溫里為急也身疼痛有表有里必清便已調其痛仍不減方屬於表太陽條中已悉故此不贅下利清穀不可攻表汗出必脹滿此條重舉下利清穀不可攻表以示戒正互明上條所以必先溫里然後攻表之義見誤表其汗則陽出而陰氣彌塞胸腹必致脹滿而釀變耳合用厚朴生薑半夏甘草人參湯以溫胃消脹為務也乾嘔吐涎沫頭痛者吳茱萸湯主之凡用吳茱萸湯有三證一為陽明食谷欲嘔一為少陰吐利手足厥冷煩燥欲死此則乾嘔吐涎沫頭痛經絡證候各殊而治則一者總之下焦濁陰之氣上乘於胸中清陽之界真氣反郁在下不得安其本位有時欲上不能但衝動濁氣所以乾嘔吐涎沫也頭痛者厥陰之經與督脈會於巔也食谷欲嘔者濁氣在上也吐利者清氣在下也手足厥冷者陰寒內盛也煩燥欲死者虛陽擾亂也故主吳茱萸湯以茱萸專主開豁胸中逆氣兼人參薑棗以助胃中之清陽共襄祛濁之功由是清陽得以上升而濁陰自必下降矣嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔與微熱似有表也脈弱則表邪必不盛小便利則里邪必不盛可見其嘔為陰邪主幹之嘔熱為陽邪外散之熱見厥則陽遭陰掩其勢駸危故為難治非用四逆湯莫可救也以上陰進未愈證大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗出而熱反不去正恐陽氣越出若內拘急四肢疼更加下利厥逆惡寒則在裡先是陰寒急用四逆湯以回其陽而陰邪自散耳大汗若大下利而厥冷者四逆湯主之此證較上條無外熱相錯其為陰寒易明然既云大汗大下利則陰津亦亡但此際不得不以救陽為急俟陽回尚可徐救其陰所以不當牽制也傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也六七日不利忽發熱而利渾是內陰外陽之象蓋發熱而利裡虛而外邪內入也故曰有陰汗出不止表虛而內陽外出也故曰外陽此中伏有危機所以仲景早為回護用溫用炙以安其陽若俟汗出不止乃始圖之則無及矣可見邪亂厥陰其死生全關乎少陰也不然厥陰之熱深厥深何反謂之有陰無陽哉吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之吐利汗出發熱惡寒者陽氣外脫也四肢拘急手足厥冷者亡陽不能溫養經脈也故主四逆湯以溫之且吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之吐利不止而且下利清穀加之小便復利津液四脫里之虛寒極矣況外熱而汗大出為陽復外脫脈微欲絶者陽氣衰微可知急宜四逆湯復陽為要也設四逆不足以殺其勢其用通脈四逆具見言外矣可已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之可已下止當漸向安不得復有汗出厥而四肢拘急也今脈微欲絶者則其吐下已斷又為真陽垂絶矣急宜通脈四逆和復元陽更加豬膽為陰嚮導也惡寒脈微而復利利止亡血也四逆加人參湯主之亡血本不宜用姜附以損陰陽虛又不當用歸芍以助陰此以利後惡寒不止陽氣下脫已甚故用四逆以復陽為急也其所以加人參者不特護持津液兼陽藥得之愈加得力耳設誤用陰藥必致腹滿不食或重加泄利嘔逆轉成下脫矣傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒五六日邪入厥陰其熱深矣乃陽邪不上結於胸陰邪不下結於腹其脈虛而復厥乃非熱深當下之比以其亡血傷津大便枯澀恐人誤認五六日熱入陽明之燥結故有不可下之之戒蓋脈虛腹濡知內外無熱厥則陰氣用事即當同上條亡血例治設其人陰血更虧於陽或陰中稍挾陽邪不能勝辛熱者又屬當歸四逆證矣病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也陽邪必結於陽陰邪必結於陰故手足厥冷小腹滿按之痛者邪不上結於胸其非陽邪可知其為陰邪下結可知則其當用溫用灸更可知矣傷寒六七日脈微手足厥冷煩燥灸厥陰厥不還者死脈微而厥冷加煩燥則是陽微陰盛灸毛際以通其陽而陽不回則死灸所以通陽也厥不還則陽不回可知矣下利手足厥冷無脈者灸之不溫若脈不還反微喘者死灸之不溫脈不還已為死證然或根柢未絶亦未可知設陽氣隨陰火上逆胸有微喘則孤陽上脫而必死矣與少陰病六七日息高者死正同下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死脈絶不惟無陽而陰亦無矣陽氣破散豈有陰氣不消亡者乎晬時脈還乃脈之伏者復出耳仲景用灸法正所以通陽氣而觀其脈之絶與伏耳故其方即名通脈四逆湯服後利止脈出則加人參以補其亡血若服藥晬時脈仍不出是藥已不應其為脈絶可知傷寒發熱下利厥逆躁不得臥者死躁不得臥腎中陽氣越絶之象也大抵下利而手中厥冷者皆為危候以四肢為諸陽之本故也加以發熱躁不得臥不但虛陽發露而真陰亦已爍盡無餘矣安得不死乎傷寒發熱下利至甚厥不止者死厥證但發熱則不死以發熱則邪出於表而里證自除下利自止也若反下利厥逆煩躁有加則其發熱又為真陽外散之候陰陽兩絶故主死也發熱而厥七日下利者為難治厥利而熱不兩存之勢也發熱而厥七日是熱者自熱厥利者自厥利陰陽兩造其偏漫無相協之期故雖未見煩躁已為難治蓋治其熱則愈厥愈利治其厥利則愈熱不至陰陽兩絶不止耳傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死脈遲為寒寒則胃中之陽氣已薄不可更用寒藥矣腹中即胃中今胃冷而反能食則是胃氣發露無餘其陽亦必漸去不能久存故為必死較後條之食以索餅不發熱者自是天淵以上純陰無陽證下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯主之下利脈大為虛陽下陷設脈浮革為風邪乘虛襲肝風邪結聚則水飲停留因爾腸鳴者宜當歸四逆以散風利水也手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加茱萸生薑湯主之手足厥寒脈細欲絶似乎陰寒之極蓋緣陽邪流入厥陰營分以水虛不能作熱故脈細欲絶也此為陰郁陽邪所以仲景處方仍用桂枝湯和其中外加當歸以和厥陰之營血通草以通太陽之本細辛以淨少陰之源使陽邪得從外解本非治陰寒四逆之藥也蓋脈細欲絶為陰氣衰於內不能鼓動其脈而肌表之陽亦虛非真陽內虧之比故藥中宜歸芍以濟陰不宜姜附以劫其陰即其人素有久寒者但增吳茱萸生薑由是觀之則乾薑附子寧不在所禁乎久寒者陳久之寒非時下直中之寒也明矣前條下利脈大亦用此湯者以下多傷陰陰傷則陽不歸附故脈雖浮大而證仍屬血虛也傷寒脈促手足厥逆者可灸之手足厥逆本當用四逆湯以其脈促知為陽氣內陷而非陽虛故但用灸以通其陽不可用溫經藥以助陽也諸四逆厥者不可下之虛家亦然凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也厥有寒熱之異治雖霄壤而不可下則一總由脾胃之陰陽不相順接所以不能溫順四末耳傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血熱少厥微指頭微寒其候原不為重然默默不欲食煩躁數日胃中津液傷而困矣若小便利色白則邪熱暗除胃氣漸復故欲得食若厥而嘔胸脅滿不去則邪聚中焦故嘔而煩滿其後陰邪必走下竅而便血以厥陰主血故也下利寸脈反浮數尺中自澀者必清膿血下利為陰邪浮數為陽脈若陰盡復陽則尺脈自和今尺中自澀乃熱邪搏結於陰分雖寸口得陽脈究竟陰邪必走下竅而便膿血也此條與上條厥嘔胸脅煩滿者雖有輕重之殊而治法不異並宜白頭翁湯膿血止芍藥甘草湯傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也太陽以惡寒發熱為病進恐其邪氣傳裡也厥陰以厥少熱多為病退喜其陰盡復陽也然熱氣有餘又為內外癰膿便血之兆矣傷寒發熱始六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也少陰經中內藏真陽最患四逆故云吐利手足不逆冷反發熱者不死厥陰經中內無真陽不患其厥但患不能發熱與夫熱少厥多耳然厥證多兼下利其陽熱變為陰寒者十常六七也論中恐暴熱來出而復去後三日脈之其熱尚在形容厥證重熱之脈證如睹然得熱與厥相應尤無後患若熱氣有餘病勢雖退其後必發癰膿以厥陰主血熱與久持不散必致壅敗也傷寒厥而心下悸者宜先治水當與茯苓甘草湯卻治其厥不爾水漬入胃必作利也傷寒厥而心下悸以邪熱內深飲水過多水氣乘心所致也水者心火所畏故乘之則動悸不寧飲之為患甚於他邪所以乘其未漬入胃先用茯苓甘草湯以清下利之源後乃始厥庶不致厥與利相因耳下利後更煩按之心下濡者為虛煩也宜梔子豉湯已下利而更煩似乎邪未盡解然必心下濡而不滿則為虛煩與陽明誤下胃虛膈熱之證頗同故俱用湧法也傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄痢不止者為難治麻黃升麻湯主之此表裡錯雜之邪雖為難治非死證也夫下後寸脈沉而遲明是陽邪陷陰之故非陽氣衰微可擬手足厥逆者胃氣不布也下部脈不至者因泄利不止而陰津下脫也咽喉不利唾膿血者陽邪搏陰上逆也所以仲景特於陰中提出其陽得汗出而錯雜之邪盡解也或問傷寒三陽證宜汗而厥陰證中有麻黃升麻湯之例其故何也詳此證之始原系冬溫以其有咽痛下痢故誤認傷寒襲證而下之致泄利不止脈變沉遲證變厥逆皆熱邪內陷種種危殆賴真陰未漓猶能驅邪外行而見咽喉不利唾膿血明系熱邪返出遊溢少陰經脈之候亦為木槁土燔凌爍肺金之候方中用麻黃升麻所以升陷內之熱邪桂枝芍藥甘草當歸調其營衛緣太陽少陰之邪既以並歸厥陰故於桂枝湯三味中必加當歸以和陰血葳蕤天冬下通腎氣以滋上源且葳蕤為治風溫咽痛熱咳之專藥本文雖不曰咳而云咽喉不利唾膿血可知其必然大咳而膿血始應也黃芩芍藥甘草治邪並於內之自利知母石膏甘草治熱伏少陰之厥逆其邪既伏於少陰非知母則鬱熱不除且熱必由陽明而解非石膏則腠理不開其所以用乾薑白朮茯苓者以其既經大下非此不能保護中州耳朱奉議以此湯裁去升知冬芍薑朮桂苓加入葛根羌活川芎杏仁白薇青木香以治風溫總不出此範圍也傷寒先厥後發熱而利者必自止見厥復利傷寒先厥後發熱而利言傷寒表證罷先見厥利而後發熱非陰證始病便見厥利也先厥後發熱而利必自止乃厥陰之常候下文見厥復利乃預為防變之辭設厥利止而熱不已反見咽痛喉痹或便膿血又為陽熱有餘之證矣以上陰陽錯雜證傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹先厥後熱下利止其病為欲愈矣乃反汗出咽中痛是邪熱扶痰濕上攻而為喉痹也然既發熱以無汗而邪亦外出所以利必自止若不止則無汗明系邪不外出仍在於里必至便膿血也便膿血者其喉不痹見熱邪在裡即不復在表在下即不復在上也喉痹者桔梗湯便膿血者白頭翁湯傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒初起一二日間所見皆惡寒惡熱之陽證至四五日傳進陰經而始厥也前云諸四逆厥者不可下矣此云應下之其辨甚微蓋先四逆與先發熱而行厥者其來回異故彼云不可下此云應下之者以其熱深厥深嘗用苦寒之藥清解其在裡之熱庶有生理小陷胸湯合小承氣可也即下利譫語但用小承氣湯止耳從未聞有峻下之法也若不用苦寒反用辛甘發汗寧不忍熱勢上攻乎口傷爛赤與喉痹互意嘔家有癰膿者不可治嘔膿儘自愈嘔有胃中虛寒而嘔有肝氣逆上而嘔皆當辛溫治其逆氣此則熱聚於胃結成癰膿而嘔即內經所謂熱聚於胃口不行胃脘為癰之候恐人誤用辛熱止嘔之藥所以特申不可治嘔但俟膿儘自愈言熱邪既有出路不必用藥以伐其胃氣也傷寒下利日十餘行脈反實者死傷寒在三陽邪熱全盛之時其脈當實今傳次厥陰為邪氣向衰之際況復下利日十餘行而反見實脈是正衰邪盛故主死也熱利下重者白頭翁湯主之熱利而至下重濕熱交併之象也下利欲飲水者以有熱故也白頭翁湯主之下利欲飲水者與臟寒利而不渴自殊乃熱邪內耗津液縱未顯下重之候亦當以前藥勝其熱也以上純陽無陰證嘔而發熱者小柴胡湯主之厥陰之邪欲散則逆上而還少陽必發熱而嘔以肝膽臟腑相連故用小柴胡以升提厥陰之邪從少陽而散也上條厥陰轉出少陽經證下利後身疼痛清便自調者急當救表宜桂枝湯發汗厥陰病自利止後清便自調知裡寒已退但身痛者邪氣已還於表故用桂枝以和營衛而愈也上條厥陰回陽熱從外解證厥陰病欲解時從醜至卯上上條厥陰經證自解候
