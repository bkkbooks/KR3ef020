body:
  text: 卷下臟結結胸痞痛問曰病有結胸有之痛浮關脈沉名曰結胸曰如結胸食如故時時下利細沉緊舌上白胎滑者難結胸者陽邪結胸也臟結者陰邪結胸位高臟位其中脈之寸浮關沉兩俱無問結之關脈更小細而緊者以關脈居上下之界外邪由下結積氣由此上於實往來之沖所以病在而脈反困於中也若見舌白胎滑則外邪固結於裡其勞最重以表裡兩解之法不可用故為難治其不出方者正欲入深究其氣而施治非不可治也治之務在分解表裡錯雜之邪使陰氣漸下而內消客邪漸上而外散庶可圖功於萬一也臟結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也臟結之所以不可攻者從來置之不講以為仲景未嘗明言後人無從知之不知仲景言之甚明人第不參討耳夫所謂不可攻者乃垂戒之辭正欲人詳審其攻之之次第也試思臟已結矣匪攻而結何由開耶所謂其外不解者尚未可攻又謂下利嘔逆不可攻又謂表解乃可攻痞言之已悉於此特出一訣謂臟結無陽證不往來寒熱其人反靜則證不在六經之表裡而在上焦下焦之兩途欲知其候但觀舌上有無苔滑有之則外感之陽熱挾痞氣而反在下素痞之陰寒挾熱勢而反在上此與里證已具表證未除者相去不遠但其陰陽悖逆格拒不入證轉凶危耳豈結胸腹內拒痛而臟結腹內不拒痛耶此而攻之是速其痛引陰筋而死不攻則病不除所以以攻為戒是則調其陰陽使之相入而滑苔既退然後攻之則邪熱外散陽氣內消此持危扶顛之真手眼也病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死按病人素有動氣在當臍上下左右則不可發汗素有痞氣在脅下連臍旁則不可攻下醫不細詢病家不明告因而貽禍者多矣以上臟結例病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也病發於陽者太陽表證誤下邪結於胸也病發於陰者皆是內挾痰飲外感風寒中氣先傷所以汗下不解而心下痞也凡結胸正在胸中此正太陽全盛之邪因誤下乘虛而入故曰熱入因作結胸是處方名為陷胸若痞則多偏胸脅而無正中結痛之候故但言因作痞而不用熱入二字其邪之盛衰可知是處方名為瀉心觀其主治則虛實迥然不侔則知表邪為陽里邪為陰也明矣或言中風為陽邪傷寒為陰邪安有風傷衛氣氣受傷而反變為結胸寒傷營血血受傷而反成痞之理復有誤認直中陰寒之陰下早變成痞者則陰寒本無實熱何得有下早之變設陰結陰躁而誤下之立變危逆恐不至於成痞停曰待變而死也太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也脈浮而動數雖主風熱亦主正虛虛故邪持日久頭痛發熱惡寒表終不解醫不知其邪持太陽未傳他經反誤下之於是動數之脈變遲而在表之證變結胸矣動數變遲三十六字形容結胸之狀殆盡蓋動數為欲傳之脈變遲則力綿勢緩而不能傳曰有結而難開之象膈中之氣與外實之邪兩相格鬥故為拒痛胃中水穀所生之精悍因誤下而致空虛則不能藉之以衝開外邪反為外邪衝動其膈於是正氣往返邪逼之界覺短氣不足以息更煩燥有加遂至神明不安無端而生懊憹凡此皆陽邪內陷所致也結胸者項亦強如柔痙狀下之則和宜大陷胸丸結胸而至頸項亦強證愈篤矣蓋胸間邪結緊實項勢常昂有似柔痙之狀然痙病身首俱張此但項強原非痙也藉此以驗胸即六分緊逼以大陷胸湯下之恐過而不留即以大陷胸丸下之又恐滯而不行故煮而連滓服之然後與邪相當觀方中用大黃芒硝甘遂可謂峻矣而更加葶藶杏仁以射肺邪而上行其急煮時又倍加白蜜以留戀潤導之而下行其緩必識此意始得用法之妙結胸證其脈浮大者不可下下之則死胸既結矣本當下以開其結然脈浮大則表邪未盡下之是令結而又結也所以致死此見一誤不堪再誤也結胸證悉具煩躁者亦死亦字承上見結胸證全具更加煩躁即不下亦主死也煩躁曷為主死耶蓋邪結於胸雖籍藥力以開之而所以載藥力上行者胃氣也胃氣充溢於津液之內汗之津液一傷下之津液再傷至熱邪摶飲結於當胸而津液又急奔以應上正有不盡不已之勢胃氣垂絕能無敗乎此結胸諸法見幾於早競競以滌飲為先務飲滌則津液自安矣傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之熱實二字形容結胸之狀其明見邪熱填實於膈間也前條言寸脈浮關脈沉此言脈沉緊更明蓋緊脈有浮沉之別浮緊主傷寒無汗沉緊主傷寒結胸則知結胸非中風下早而成也傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無寒熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之治結胸證所用陷胸之法者以外邪挾內飲摶結胸間未全入於裡也若十餘日熱結在裡則是無形之邪熱蘊結必不定在胸上而非結胸明矣加以往來寒熱仍兼半表當用大柴胡湯兩解表裡之熱庶其陷胸之義無取也無大熱與上文熱實互意內陷之邪但結胸間而表裡之熱反不熾盛是為水飲結在胸脅其人頭有微汗乃邪在高而陽氣不得下達之明徵此則主用大陷胸湯允為的對也太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之不大便燥渴日晡潮熱少腹硬滿證與陽明頗同但小有潮熱則不似陽明之大熱從心下至少腹手不可近則陽明又不似此大痛因是辨其為太陽結胸脈陽明內實也緣誤汗誤下重傷津液不大便而燥渴潮熱更加痰飲內結必用陷胸湯由胸脅以及胃腸始得盪滌無餘若但下腸胃結熱反遺膈上痰飲則非法矣太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩此條雖系並病以其反下之而成結胸當隨見所變之證而歸重於結胸也誤下之變乃致結胸下利上下交徵而陽明之居中者水漿不入心煩待斃傷寒顧可易言哉小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之小結胸病正在心下則不似大結胸之高在心上也按之則痛比手不可近則較輕也而脈之浮又淺於沉滑又緩於緊可見其人外邪陷入原微但痰飲素盛挾熱邪而內結所以脈見浮滑也黃連半夏栝蔞實藥味雖平而泄熱散結亦是突圍而入所以名為小陷胸也寒實結胸無熱證者與三物小陷胸湯白散亦可服寒實結胸乃寒飲結聚而無大熱也意開小陷胸半夏栝蔞實足以去其痰飲又慮黃連難祛寒實故又主白散取巴豆之辛熱破結貝母之苦寒開鬱桔梗載之上湧為的當耳以上結胸例傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之汗後外邪雖解是必胃氣安和始得脫然無恙以胃主津液故也若有因邪入而內結因發汗而外亡兩相告匱其人心下必痞硬以伏飲搏聚胃氣不足以開之也胃病故乾噫食臭食入而噯餿酸也胃病故水入而旁滲脅肋也胃中水穀不行腹中必雷鳴而搏擊有聲下利而清濁不分也雖不由誤下而且成痞設誤下之其痞結又當何似耶傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之此條痞證傷寒與中風互言大意具見可見病發於陰下之而成痞者非指傷寒為陰也下利完穀腹鳴嘔煩皆誤下而胃中空虛之互辭也設不知此義以為結熱而復下之其痞必益甚故重以胃中虛客氣上逆昭揭病因方用甘草瀉心湯者即生薑瀉心湯除去生薑人參而倍甘草乾姜也客邪乘虛結於心下本當用人參以誤而再誤其痞已極人參仁柔無剛決之方故不宜用生薑辛溫最宜用者然以氣並主散恐其領津液上升客邪從之犯上故倍用萸姜代之以開痞而用甘草為君坐鎮中州庶心下興腹中漸至寧泰耳今人但知以生薑代乾薑之僭孰知以乾薑代生薑之散哉但知甘草能增滿孰知甘草能去滿哉傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯五六日嘔而發熱為太陽之本證蓋嘔多屬陽明然有太陽邪氣未罷欲傳陽明之候有少陽邪氣在裡逆攻陽明之候所以陽明致戒云嘔多雖有陽明證不可攻之恐傷太陽少陽也此本柴胡證誤用下藥則邪熱乘虛入胃而膽卻受寒故於生薑瀉心湯中去生薑之走表君半夏以溫膽兼芩連以除胃中邪熱也瀉心諸方原為瀉心下痞塞之痰飲水氣而設此證起於嘔故推半夏為君耳傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯大下之後復發汗先里後表顛倒差誤究竟已陷之邪痞結心下證兼惡寒表邪不為汗衰即不可更攻其痞當先行解肌之法以治外外解已後乃用大黃黃連攻其濕熱凝聚之痞方為合法耳脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之心下痞而復惡寒汗出者附子瀉心湯主之傷寒脈浮而緊即不可下誤下而緊反入里則寒邪轉入轉深矣外邪與飲搏結故心下滿硬若按之自濡而不滿硬乃是濁氣挾濕熱痞聚於心下則與小邪無預也濁氣上逆惟苦寒可瀉之上條大黃黃連瀉心之法即為定藥若惡寒汗出雖有濕熱痞聚於心下而挾陽虛陰盛之證故於大黃黃連瀉心湯內另煎附子汁和服以各行其事共成傾痞之功即一瀉心湯方中法度森森若此傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之傷寒邪氣傳裡而為下寒上熱也胃中有邪氣使陰陽不交陰不得升而獨滯於下為下寒腹中痛陽不得降而獨菀於上為胸中熱欲嘔吐故於半夏瀉心湯中除去黃芩而加桂枝去黃芩者為其有下寒腹痛也加桂枝者用以散胸中之熱邪而治嘔吐也經曰上熱者瀉之以苦下寒者散之以辛故用黃連以瀉上熱乾薑桂枝半夏以散下寒人參甘草大棗以益胃而緩其中此分理陰陽和解上下之正法也常因此而推及臟結之舌上苔滑濕家之舌上如苔者皆不出是方也太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之此證與結胸頗同但結胸者邪結於胸其位高此在心下及胸其位卑然必表解乃可攻之亦與攻結胸之戒不殊也其人漐漐汗出發作有時而非晝夜俱篤即此便是表解之徵雖有頭痛心下痞硬滿引脅下痛乾嘔短氣諸證乃熱邪搏飲之本證不得以表證名之見汗出不惡寒便是表解可攻之候設外邪不解何緣而得汗乎攻藥取十棗湯者正與陷胸相仿傷寒種種下法咸為胃實而設今證在胸脅而不在胃則盪滌腸胃之藥無所取矣故取芫花之辛以逐飲甘遂大戟之苦以泄水並賴大棗之甘以運脾助諸藥祛水飲於胸脅之間乃下劑中之變法也傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之汗吐下法備而後表解則中氣必虛虛則濁氣不降而痰飲上逆故作痞硬逆氣上衝而正氣不續故噫氣不除所以用代赭領人參下行以鎮安其逆氣微加解邪滌飲而開其痞則噫氣自除耳傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之複利不止者當利其小便誤下而下利不止心下痞硬服瀉心湯為合法矣乃服以他藥下之他藥則皆盪滌下焦之藥與心下之痞全不相涉縱痞硬微除而關閘盡撒利無休止反取危困用理中以開痞止利原不為過其利益甚者明是以鄰國為壑徒重其奔迫也故用赤石脂禹餘糧固下焦之脫而重修其關閘倘更不止復通支河水道以殺急奔之熱庶水穀分而下利自止耳本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之瀉心諸方開結蕩熱益虛可謂具備乃服之而痞不解更加渴而口燥煩小便不利者五苓兩解之法正當主用蓋其功擅潤津滋燥導飲蕩熱所以亦得為消痞滿之良法也太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之誤下而致裡虛則外熱乘之變為利下不止者裡虛不守也痞硬者正虛邪實中成滯礙痞塞而堅滿也以表未除故用桂枝以解之以里適虛故用理中以和之即理中加桂枝而易其名為治虛痞下利之聖法也傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之外邪不解轉入於裡心中痞硬嘔吐下利攻之則礙表不攻則里證已迫計惟有大柴胡一湯合表裡而兩解之也太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈凡表裡錯誤證變危篤有陰已亡而陽邪尚不盡者有陽邪盡而陽氣亦隨亡者有外邪將盡未盡而陰陽未至全虧者此可患不可愈所由分也大率心下痞與胸間結雖有上下之分究竟皆是陽邪所聚之位觀無陽則陰獨一語正見所以成痞之故雖曰陰陽並竭實由心下無陽故陰獨痞塞也無陽陰獨早已括盡誤下成痞大義無陽亦與亡陽有別無陽不過陽氣不治復加燒針以逼劫其陰乃成危候其用藥差誤即可同推以上痞證例合病並病篇太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之𠘧殳同太陽病項背強𠘧𠘧無汗惡風葛根湯主之二條以有汗無汗定傷風傷寒仲景以所顯證全似太陽其間略兼項背強𠘧𠘧為陽明之候未至兩經各半故不用合病二字然雖不名合病其實乃合病之初證也𠘧𠘧頸不舒也項屬太陽而頸屬陽明二經合病則頸項皆不和矣太陽風傷衛證中才見陽明一證即於桂枝湯中加葛根一藥太陽寒傷營證中才見陽明一證即於麻黃湯中加葛根一藥此大匠天然不易之彀率也然第二條不用麻黃湯加葛根反用桂枝全方加麻黃葛根者以頸項背俱是陽位易於得汗之處設以麻黃本湯加葛根大發其汗將毋項背強𠘧𠘧者變為經脈振搖動惕乎此仲景之所以精義入神也太陽與陽明合病不下利但嘔者葛根加半夏湯主之太陽與陽明合病者必自下利葛根湯主之二條又以下利不下利辨別合病主風主寒之不同也風者陽也陽性上行故合陽明胃中之水飲而上逆寒者陰也陰性下行故合陽明胃中之水穀而下奔然上逆則必加半夏入葛根湯以滌飲止嘔若自下利則但用葛根湯以解兩經之邪下利里證也而仲景以此湯主之蓋以邪氣並於陽則陽實而陰虛陰虛故下利也與此湯以散經中之邪則陽不實而陰氣平不治利而利自止耳太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之兩經合病當合用兩經之藥何獨偏用麻黃耶此見仲景析義之精蓋太陽邪在胸陽明邪在胃兩邪相合必上攻其肺所以喘而胸滿麻黃杏仁治肺氣喘逆之專藥也用之恰當正所謂內舉不避親也何偏之有按太陽與陽明合病所重全在於表故主以葛根麻黃二湯若太陽與少陽合病則邪漸迫里合用小柴胡柴胡桂枝二湯若混病之太陽少陽合病當用黃芩湯黃芩加半夏生薑湯其下陽明少陽合病以邪入腑脈來滑數即用大承氣下之與二陽並病太陽證罷不殊也設經證未罷脈不滑數又當從大柴胡兩解表裡無疑其太陽與少陽合病本條見溫熱病篇中宜參看陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯木土之邪交動則水穀不停而急奔故下可必也陽明脈大少陽脈弦兩無相負乃為順候然兩經合病陽明之氣衰則弦獨見少陽勝而陽明負矣下之固是通因通用之法而上受克賊之邪勢必藉大力之藥急從下奪乃為解圍之善著然亦必其脈洪而數有宿食者始為當下無疑設脈不滑數而遲覆方慮上敗垂亡尚敢下乎以上合病例二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之薰之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發其汗則愈何以知汗出不徹以脈澀故知也二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯二陽並病二條皆是太陽與陽明並病上條證初入陽明而太陽仍未罷則宜小汗此條證已入陽明而太陽亦隨罷故宜大下也按上條太陽初症寒傷營之病因汗出不徹故傳陽明續自微汗出不惡寒陽明熱熾似平當用下法以太陽之邪未徹故下之為逆謂其必成結胸等證也如此者可小發汗然後下之設面色緣緣正赤者寒邪深重陽氣怫鬱在表必始先未用麻黃湯或已用麻黃湯而未得汗所以重當解之熏之又非小汗所能勝矣若是發汗不徹不當言陽氣怫鬱不得越也畢竟當汗不汗其人躁煩不知痛處乍寒乍熱病在四肢按之不可得方是陽氣不得越耳陽不越因汗不徹而邪氣未盡氣受傷也脈澀者以其邪留於肌腠而營氣不能條達血受病也汗後短氣脈澀但當斷之以汗出不徹者用桂枝二越脾一湯小發其汗則愈太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之太陽病原無下法但當用桂枝解外若當用不用而反下之利遂不止則熱邪之在太陽者未傳陽明之經已入陽明之裡所以其脈促急其汗外越其氣上奔則喘下奔則泄故舍桂枝而用葛根專主陽明之表加芩連以清裡熱則不治喘而喘自亡不治利而利自止又太陽陽明兩解表裡之變法與治痞之意不殊也太陽與少陽並病頭項強痛或眩冒寒如結胸心下痞硬者當刺大椎第一間肺俞肝俞斷不可發汗發汗則譫語脈弦五六日譫語不止當刺期門刺大椎者瀉三陽督脈也刺肺俞者使肺氣下行而膀胱氣化也刺肝俞者所以瀉膽也刺期門者瀉肝膽之實也太陽少陽並病心下硬頸項強而眩者當利大椎肺俞肝俞慎勿下之重申不可下之禁與上條不可汗互發傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門肝木直乘脾土為縱此本太陽少陽並病以其人平素肝盛脾衰故其證腹滿譫語盡顯肝邪乘脾之候蓋少陽雖主風水仍賴衛氣榮養所以仲景云此屬胃胃不和所以腹滿譫語也其脈寸口浮緊為太陽寒傷營之脈寸口即氣口乃脾胃之所主肝木挾邪過盛所以脾胃之土益受其制也刺期門以泄肝邪則中此攸寧矣傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門肝木反乘肺金為橫此亦太陽少陽並病以其人素常肝盛肺虛故其證雖發熱惡寒為太陽表證未除而大渴飲水則少陽裡熱已著蓋木盛則火易燔金虛則水不生所以求水為潤木得水助其勢益橫水勢泛溢其腹必滿亦當刺期門以泄肝邪則肺自安矣然但腹滿而不譫語其邪稍輕以肺金較肝木雖虛原無他病能暗為運布或自汗而水得外滲或小便利而水得下行是以病欲自解不必刺也讀者毋以刺期門在欲解下而以辭害義也按縱橫之證不同而皆刺期門者以賊土侮金總由木盛腹滿譫語證涉危疑故急以瀉木為主也十四條俱用刺法今傷寒家不諳此理若論用藥無過柴胡桂枝湯加減觀下條發汗多亡陽譫語治法可類推矣發汗多亡陽譫語者不可下與柴胡桂枝湯和其營衛以通津液後自愈太陽與少陽並病不可發汗發汗則譫語誤汗亡陽譫語者復不可下宜桂枝柴胡以和二經營衛也傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之支結者支飲聚結於心下之偏旁非中正也傷寒至六七日宜傳經已遍乃發熱微惡寒肢節煩疼微嘔其邪尚在少陽之界未入於裡雖心下支結而外證未除終非結胸可擬故但用柴胡桂枝使太陽之邪仍從太陽而解邪去而支飲自開矣傷寒五六日已發汗而復下之胸脅滿微結不便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之初服微煩復服汗出便愈五六日已發汗邪雖未解而勢已微因誤下之微邪凝聚於上焦則肺氣壅遏所以渴而不嘔頭汗出往來寒熱心煩知邪氣已入少陽之界故為不解因與柴胡桂枝解太陽少陽之邪黃芩甘草以內外之熱乾薑主胃中寒飲栝蔞根治膈上熱渴牡蠣以開脅下之微結也服湯後反加微煩者近世謂之藥煩以汗後津液受傷胃氣虛熱不能勝藥力也必須復服藥勝病邪方得汗出而解三二條皆太陽少陽並病因本文中有支結微結所以後世遂認結胸致節庵又以小柴胡加桔梗治痞結亦不過治表邪初犯中焦者方克有效若真結胸則邪已因誤下引入內結非大小陷胸湯丸峻攻必不能解散也陽明病發潮熱大便瀉小便自可胸脅滿不去者小柴胡湯主之此陽明少陽並病也潮熱者陽明胃熱之候若大便瀉小便自可則胃全不實更加胸脅滿不去則證已兼見少陽矣才兼少曰即有汗下二禁惟小柴胡一湯合表裡而總和之乃少陽一經之正治故陽明少陽亦取用之無別法也陽明病脅痛硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解也此亦陽明少陽並病不但大便瀉為胃未實即使不大便而見脅下硬滿嘔與舌苔之證則少陽為多亦當從小柴胡湯分解陰陽則上下通和濈然汗出而舌苔嘔逆脅滿之外證不時俱解矣既云津液得下則大便自行亦可知矣此一時表裡俱徹所以為當也上焦得通津液得下八字關係病機最切風寒之邪脅津液而上聚膈中為喘為嘔為水逆為結胸常十居六七是風寒不解則津液必不得下倘誤行發散不惟津液不下且轉增上逆之勢愈無退息之期矣以上並病例溫熱病篇仲景溫病熱病諸例向來混入傷寒六經例中致使後世有以黃芩白虎湯誤治傷寒者有以黃芩白虎證誤呼傷寒者良由混次不分以致矇昧千古自長沙迄今惟守真一人獨得其秘則又晦其明目不曰溫熱而曰傷寒何怪當世名家動輒錯誤耶今將溫熱諸條另析此篇學者洗心讀之如琅函一展火輪劍樹頃化清涼大地也太陽病發熱而渴不惡寒者為溫病發熱而渴不惡寒提挈溫病自內而發之大綱凡初病不惡寒便發熱煩渴三四日間或腹滿或下利者此溫病也若先惡寒發熱三四日後表邪傳裡變煩渴者此又傷寒熱邪傳裡而顯內實也若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火薰之一逆尚引目再逆促命期此條緊接上條其下即云若發汗已身灼熱者名曰風溫見風溫之由誤發溫病汗而致者與更感於風而成者自是兩般風溫之證兼太陽少陰其脈尺寸俱浮蓋腎水本當沉也風溫載之從太陽上入根本撥而枝葉紊矣伏邪久郁身中時當二月其脈先見露矣發則表熱太陽裡熱少陰將同用事恣汗無忌灼熱反倍是謂風溫風溫表裡俱見浮脈其證自汗身重腎水病也多眠睡鼻息鼾語言難腎本病也腎中之候同時薦至危且殆矣古律垂戒云風溫治在少陰不可發汗發汗死者醫殺之也詎意發熱之初不及脈理輕易發汗早已犯此大戒乎既腎中風邪外出以陽從陽熱無休止矣被下者小便不利傷其膀胱氣化直視失溲太陽臟腑同時絕矣被火者微則熱傷營氣而瘀熱發黃劇則熱甚生風而如驚癇時瘛瘲火熱亂其神明擾其經脈也傷寒燔針灼艾仲景屢戒至溫證尤當戒之被火微發黃色一叚亂其神明擾其經脈重證莫重於此稍輕誤火少陰脈系咽喉咽喉干痛乃至唾血亦多死者一逆發汗已是引日待斃再逆則神聖莫挽矣故治溫病全在未發汗前辨其脈證補救備至防危可也發汗以後凶咎卒至亦何措其手足哉內經刺熱論溫榮交以後其病內連腎評熱論溫專論穀氣腎中精勝乃汗則生腎中虛甚更熱則死其旨至矣盡矣仲景復出不盡之藏論腎更視膀胱以緯之小便傷膀胱氣化甚則直視失溲命門腎藏之精不能照物神水絕矣瞳子高者太陽不足戴眼者太陽已絕太陽氣絕者其足小可屈伸是以中風暴證也絕膀胱人不識者故風溫扼要膀胱若腎藏將絕寧不膀胱先絕乎太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之此言太陽少陽合病明非傳次少陽之證洵為溫病之合病無疑以其人中氣本虛熱邪不能外泄故內攻而自下利也與黃芩湯解散表裡之熱較之傷寒治法迥殊按黃芩湯乃溫病之主方即桂枝湯以黃芩易桂枝而去生薑也蓋桂枝主在表風寒黃芩主在裡風熱不易之定法也其生薑辛散非溫熱所宜故去之至於痰飲結聚膈上又不得不用姜半此又不越傷寒治法耳按溫病始發即當用黃芩湯去熱為主傷寒傳至少陽熱邪漸次入里方可用黃芩佐柴胡和解之此表裡寒熱之次第也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之此伏氣因感客邪而發故脈見浮緊也然浮緊之脈而見發熱汗出不惡寒反惡熱之證雖是溫病卻與傷寒之陽明不異加以咽燥口苦腹滿而喘身重明系溫熱之候所以汗下燒針俱不可用宜其黃芩白虎主治也更兼風寒客氣在膈故舌上苔滑而黃芩輩又禁用則當湧以梔子豉湯此治太陽而無礙陽明矣若前證更加口乾舌燥則宜白虎湯以解熱生津若更加發熱煩渴小便不利者又為熱耗陽明津液更宜豬苓湯以導熱滋干總由客邪寒氣在胃難用黃芩白虎輩寒藥故則尋旁竇以散寒邪耳傷寒小便不利以脈浮者屬氣分五苓散脈沉者屬血分豬苓湯而溫熱病之小便不利脈浮者屬表證豬苓湯脈沉者屬裡證承氣湯傷寒自氣分而傳入血分溫熱由血分而發出氣分不可以此而礙彼也陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利其小便故也太陽傷寒犯本有五苓散兩解一法而陽明溫熱復有豬苓湯導熱滋幹一法然汗出多而渴者不可服蓋陽明胃主津液津液充則不渴津液少則渴矣故陽明熱甚必先耗其津液加以汗多而奪之於外複利其小便而奪之於下則津液立亡而已其脈浮發熱渴欲飲水小便不利而汗出少者方可用豬苓湯脈浮發熱渴欲飲水口乾舌燥而汗出多者則宜白虎加人參其法已具上條若脈沉熱蒸多作渴欲飲水而小便黃赤不利者又當從承氣下之以救陰為急也三陽合病脈浮大上關上但欲眠睡目合則汗溫熱之氣自內達表故三陽合病最多此條言溫病故但目合則汗其非熱病之時時大汗可知矣以其表裡俱熱六合俱邪故關上之脈浮大但欲眠睡其為陽明之熱又可知矣而目合則汗又屬少陽治當從小柴胡加減或黃芩湯加柴胡尤受設熱病見脈浮大但欲眠睡而盜汗者為正氣本虛故熱勢反不甚劇又當用白虎加人參湯也三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之此言熱病兼暍之合病也夏月天令炎熱伏郁之邪多乘暑氣一齊發出三陽中州之擾亂可知矣此時發汗則津液倍竭故譫語益甚下之則陽邪內陷故手足逆冷熱不得越故額上生汗也既不宜於汗下惟有白虎一湯主解熱而不礙表裡在所急用若疑手足厥冷為陽虛則殺人矣傷寒脈浮滑此表有寒里有熱白虎湯主之世本作表有熱里有寒必系傳寫之誤千載無人揭出今特表明一齊眾楚在所不辭夫白虎湯本治熱病暑病之藥其性大寒安有里有寒者可服之理詳本文脈浮滑而滑脈無不實之理明系伏邪發出於表之徵以其熱邪初乘肌表表氣不能勝邪其外反顯假寒故言表有寒而伏邪始發未盡裡熱猶盛故言里有熱以其非有燥結實熱乃用白虎解散郁發之邪或言當是表有熱里有實寒字與實字形類其說近是若果里有實則當用承氣又不當用白虎矣按此本言熱病何仲景不曰熱病而曰傷寒者其藏機全在乎此欲人深求而自得也蓋熱病乃冬不藏精陽氣發泄驟傷寒冷致邪氣伏藏於骨髓至夏大汗出而熱邪始發故仍以傷寒目之以伏即從骨髓發出由心包而薄陽明處方乃以石膏救陽明之熱知母淨少陰之源甘草粳米護心包而保肺氣是以氣弱者必加人參也後人不審每以白虎湯治冬月傷寒發熱今特昭揭此義以為冬月擅用白虎之戒傷寒脈滑而厥者里有熱也白虎湯主之滑陽脈也故其厥為陽厥裡熱郁熾所以其外反惡寒厥逆往往有唇面爪甲俱青者故宜白虎或竹葉石膏解其鬱熱則愈也此條明言里有熱益見前條之表有熱里有寒為誤也叔和因脈滑而厥遂以此例混入厥陰篇中今歸此傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之白虎但解熱而不能解表故熱病稍帶暴寒客邪惡寒頭痛身疼之表證皆不可用須脈洪大或數煩熱燥渴始可與服若先前微帶非時表邪二三日後客邪先從表散俱顯熱病脈證煩渴欲飲水者為津液大耗又非白虎所能治必加人參以助津氣則熱邪始得解散耳傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之伏熱內盛故口燥心煩以真陽不能勝勝故昔微惡寒而外無大熱宜白虎解內熱毒加人參以助真氣也傷寒病若吐若下後七八日不解熱結在裡表裡與熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之詳此條表證比前較重何以亦用白虎加人參耶本文熱結在裡表裡俱熱二句已自酌重惟熱結在裡所以表熱不除邪火內伏所以惡風大渴舌燥而煩欲飲水不止安得不以生津解熱為急耶服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之此本溫熱病誤認寒疫而服桂枝湯也若是寒疫則服湯後汗出必解矣不知此本溫熱誤服桂枝遂至脈洪大大汗煩渴不解若誤用麻黃必變風溫灼熱自汗等證矣此以大汗傷津故加人參以救津液也按桂枝治自外而入傷之風邪石膏治自內而發外之熱邪故白虎湯為熱邪中暍之的方雖為陽明解利藥亦解內蒸之熱非治在經之熱也昔人以石膏辛涼能解利陽明風熱此證似是而實非即如大青龍湯越脾湯麻黃杏仁甘草石膏湯麻黃升麻湯等方並與表藥同用殊不知邪熱傷胃所以必需若在經之邪縱使大熱煩渴自有葛根湯桂枝加葛根湯等治法並無藉於石膏也所以傷寒誤用白虎黃芩溫熱誤用桂枝麻黃輕者必重重者必死耳以上三陽發溫熱例師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利冬月感寒伏藏於經至春當發故曰以意候之今月之內言春分候也若脈微弱者其人真元素虧必不發於陽而發於陰以少陰之脈循喉嚨伏邪始發熱必上升故先喉中痛似傷腎司開闔陰經之熱邪不能外發勢必不攻其後必下利也少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯邪熱客於少陰之經故咽痛用甘草湯者和緩其勢也用桔梗湯者開提其邪也此在二三日間熱邪發於經中他證未具故可用之若五六日則少陰之下利嘔逆諸證蜂起此法又不可用矣陰邪為病其發必暴所以伏氣發於少陰必咽痛仲景遂以緩法治之甘草味甘其性最緩因取以治少陰伏氣發溫之最急者蓋甘先入脾脾緩則陰火之勢亦緩且生用力能瀉火故不兼別味獨用以取專功也設不瘥必是伏邪所發勢盛緩不足以濟急更加桔梗升載其邪使發於陽分之陰邪盡從陽分而散不致仍復下陷入於陰分也倘治稍失宜陰津為熱邪所耗即用祛熱救陰藥恐無及也按咽痛多是陰邪搏陽之候以陰邪為患無有不挾龍火之勢者所以屬少陰者多惟陽明經病有但頭眩不惡寒能食而咳其人必咽痛一條乃風熱挾飲上攻之證又不當與陰邪比例而觀也至於溫病風溫多有此證以陰中伏有陽邪也即直中少陰之咽痛雖陰邪結於清陽是少陰之經故仲景特設通脈四逆湯以通陰中郁沒之微陽更加桔梗以清咽利膈也少陰病下利咽痛胸滿心煩者豬膚湯主之下利咽痛胸滿心煩少陰之伏邪雖發陰經實為熱證邪熱充斥上下中間無所不到寒下之藥不可用矣又立豬膚湯以潤少陰之燥與用黑驢皮之意頗同陽微者用附子溫經陰竭者用豬膚潤燥同具散邪之義比而觀之思過半矣少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之少陰病二三日以上心煩知非傳經邪熱必是伏氣發溫故二三日間便心煩不得臥然但煩而無燥則與真陽發動迥別蓋真陽發動必先陰氣四布為嘔為下利為四逆乃致煩而且燥魄汗不止耳今但心煩不得臥而無嘔利四逆等證是為陽煩乃真陰為邪熱煎熬故以救熱存陰為急也少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之下利六七日本熱去寒起之時其人嘔渴心煩不眠不獨熱邪煎迫真陰兼有水飲搏陽以故覊留不去用豬苓湯以利水潤燥不治利而利自止耳少陰病得之二三日口燥咽乾者急下之宜大承氣湯伏氣之發於少陰其勢最急與傷寒之傳經熱證不同得病才二三日即口燥咽乾延至五六日始下必枯槁難為矣故宜急下以救腎水之燔灼也按少陰急下二證一屬傳經熱邪亢極一屬熱邪轉入胃腑一屬溫熱發自少陰皆刻不容緩之證故當急救欲絕之腎水與陽明急下三法同源異派以上少陰發溫熱例雜篇傷寒所致太陽痙濕暍三種宜應別論以為與傷寒相似故此見之痙俗作痓太陽病發熱無汗反惡寒者名曰剛痙本寒傷寒故發熱無汗病至痙邪入深矣而猶惡寒者經中故也寒傷營血則經脈不利故身強直而為剛痙也金匱又有太陽病無汗而小便反少氣上衝胸口噤不能言欲作剛痙葛根湯主之一條即是申明此條之義而補其治法也無汗而小便少者以太陽陽明二經之熱聚於胸中延傷肺金清肅之氣內外不能宣通故也太陽病發熱汗出不惡寒者名曰柔痙本風傷衛故發熱汗出不惡寒以風傷衛氣腠理疏故汗出身柔但汗出太過則經脈空虛雖似稍緩而較之剛痙尤甚以其本虛故也蓋剛痙屬陽為邪勝柔痙屬陰為血虛故治法有不同耳金匱又有太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之即桂枝湯加栝蔞根二兩其證備則發熱汗出等證不必贅矣傷寒方中用桂枝加葛根湯矣此以脈之沉遲知在表之邪為內濕所持不解即系濕熱二邪交合不當從風寒之表法起見故不用葛根而改用栝蔞根變表法為利法也太陽病發熱脈沉而細者名曰痙脈沉細者濕勝而致痙也病發熱脈當浮數而反沉細知邪風為濕氣所著所以身雖發熱而脈不能浮數是陽證見陰脈故金匱指為難治也治此者急宜麻黃附子細辛湯溫經祛濕勿以沉細為濕證之本脈而忽之也太陽病發汗太多因致痙發汗太多則經虛風襲雖曰屬風而實經虛邪盛之候非真武湯必難救療也病身熱足寒頸項強忽惡寒時頭熱無汗目脈赤獨頭面搖卒口噤背反張者痙病也身熱足寒者傷濕而中風也其下病證皆風虛濕搏之候蓋風主動搖濕主拘急風主陽本乎天者親上是以獨頭面搖濕主陰本乎地者親下是以足脛寒逆也金匱此條下又多若發汗者寒濕由搏其表益虛即惡寒甚發其汗已其脈如蛇六句發汗反惡寒者以但用表藥而不加朮故也汗後其脈如蛇者汗出之時陽氣發外其脈必洪盛汗後氣門乃閉陽氣退潛寒濕之邪得汗藥引之於外所以其脈復見浮素而指下遲滯不前有似蛇行之狀耳按金匱此後復有五條其一云夫風病下之則痙發汗必拘急蓋風病而熱者其邪已應於筋脈若更下之則傷其營血筋無養而成痙汗之則傷其衛氣脈無養而拘急矣其一云暴腹脹大為欲愈脈如故反伏弦者痙蓋脾土得木火而為暴脹知火之鬱於肝者已出之脾木火氣行則脈當浮大今不浮大而如故知風猶郁在肝則筋病而成痙矣然此必暴脹之先已見欲解之證故云其一云夫痙脈緊如弦直上下行蓋緊直如弦肝脈也而直上下行則又屬督脈為病所以皆強而厥也與脈經痙家其脈伏堅直上下同義其一云痙病有灸瘡者難治蓋痙病風熱燥急不當復灸以火深入助陽風熱得之愈固而不散也其一云痙為病胸滿口噤臥不有席腳攣急必齘齒可與大承氣湯蓋熱傳陽明風熱極深所以有如上諸證非苦寒大下不足以除其熱救其陰也夫傷寒病瘛瘲以熱生風而搐尚為難治況此甚於搐者至若齒齘足攣而無內實下證大便自行者必不可治靈樞云熱而痙者死腰折瘛瘲齒齘也以上痙病例太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當利其小便關節疼痛而煩者言濕氣留著筋骨絆結之間而發熱煩疼也脈沉而細明系濕證雖疼處煩熱必非風寒是當利水為要也大抵此證當利小便以通陽氣今為濕氣內勝故小便不利利之則陽氣行雖在關節之濕亦得宣泄矣設小便利已而關節之痹不去又當從表治之濕家之為病一身盡疼發熱身色如以熏黃濕證發黃須分寒熱表裡濕熱在裡茵陳蒿湯在表梔子柏皮湯寒濕在裡白朮附子湯在表麻黃加朮湯此寒濕在表而發黃也金匱有云濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之蓋濕與寒合故令身疼以濕著在表表間陽氣不盛故不可大發其汗是以用麻黃湯必加白朮以助脾祛濕也麻黃得術則汗不致於驟發術得麻黃而濕滯得以宣通然濕邪在表惟可汗之不可火攻火攻則增其熱必有發黃之變故戒之濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也此寒濕相搏也太陽寒氣在經故令人慾得被覆向火皆強頭汗若認作里有實熱上蒸頭汗而誤下之必致於噦而胸滿小便不利也下後陽氣下陷故丹田有熱而胸中反有寒飲結聚妨礙津液是以口燥煩渴不能飲也何以見其胸中有寒以舌上如苔白滑故知之治宜黃連湯和其上下寒熱之邪則諸證逸然分解矣濕家病之額上汗出微喘小便利者死若下利不止者亦死此本濕家身煩痛可與麻黃加朮湯發其汗之例因誤下之致有此逆額上汗出微喘者陽之越也小便利與下利不止者陰之脫也陰陽離決必死之兆自此而推之雖額上汗出微喘若大小便不利者是陰氣未脫而陽之根猶在也下之雖大小便利若額上無汗不喘是陽氣不越而陰之根猶在也則非離火可以隨其虛實而救之至於下利不止雖無頭汗喘逆陽氣上脫之候亦死又有下利不止小便反秘而額上汗出者謂之關經云關格不通頭無汗者可治有汗者死問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也風濕相搏法當汗出而解合用桂枝加朮使微微蒸發表裡氣和風濕俱去正如濕家身煩痛可與麻黃加朮湯同義病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也日晡所劇者陽明之氣旺於申酉也金匱云可與麻黃杏仁薏苡甘草湯蓋麻黃加朮湯是主寒濕防己黃耆湯是主風濕此則寒濕風濕合病也所以此條之後金匱則繼之以風濕脈浮身重汗出惡風防己黃耆湯主之一條蓋風濕皆從陽受其病在外故脈浮汗出身重由是以黃耆實衛甘草佐之防己去濕白朮佐之然治風濕二邪獨無去風之藥以汗多知風已不留表虛任風出入乎其間因之惡風惟客其衛正氣旺則風自退也至服後當如蟲行皮中腰下如水後坐被上又以一被繞腰下溫令微汗瘥等語皆有精義不可忽也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈濕家必脈沉細飲食減小今脈大能食但頭痛鼻塞正內經所謂因於濕首如裹是也與瓜蒂散內鼻中取下黃水則愈以上中濕例太陽中熱者暍是也其人汗出惡寒身熱而渴也成注謂汗出惡風身熱不渴者中風也汗出惡寒而渴者中暍也然未明其至理蓋此證為時火之氣爍其肺金肺傷則衛氣虛由是汗出身熱惡寒即內經所謂膈消皆相火傷肺之所致金匱主以白虎加人參湯救肺為主也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆合小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚發熱惡寒身重而疼太陽中暍表證也表證脈當浮今不能浮而反弦細芤遲者明系元氣不足不能鼓動其脈於外蓋弦細者陽虛也芤遲者陰虛也陰陽俱虛故不勝勞小便已灑然毛聳者太陽經火氣內伏也手足逆冷太陰氣弱不勝時火也口開前板齒燥者陽明中暍之本證亦津液內傷之確微所以發汗復虛其衛則惡寒甚溫針復損其營則發熱甚下之復傷其胃則淋甚以夏月陰氣在內故也靈機所謂陰陽俱不足補陽則陰竭補陰則陽亡惟宜甘藥補正以解其熱東垣制清暑益氣湯深得其旨然仲景俱言太陽而不言脾肺者以熱邪熾甚則寒水必致受困耳太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也成注謂脈虛身熱得之傷暑然脈微者暍也身體疼重者水也夏月暑熱以水灌洗而致病一物瓜蒂湯主之觀仲景論暍惟出三證豈偶然哉舉其端將為後世準繩一者明其暍中表熱一者言其表裡俱虛此則外邪郁時火而成中暍若是邪郁時火比類而推其因殆有不可勝言如取涼風者感霧露者食生冷者素有積熱者陰血素虛不勝大熱者宿邪感動者處陰濕地者凡是之類皆足以郁其時火為中暍之病或輕或重或表或里或虛或實隨證發見若論其治邪退熱較量權衡豈一言而盡哉按仲景論暍三條首言動而得之之病謂中暍屬外因次言靜而得之之病雖曰中暍實暑病也屬內因未言因熱傷冷之病乃中暍之變證屬不內外因不得以三者混稱也以上中暍例病加桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸中有寒也當吐之宜瓜蒂散諸亡血虛家不可與瓜蒂散痰飲內動身必有汗加以發熱惡寒全似中風但頭不痛項不強此非外入之風邪乃內蘊之寒痰窒塞胸間宜用瓜蒂散之苦寒合小豆之利水香豉之散邪以快湧膈上之實痰內經所謂其高者因而越之也諸失血虛家禁用者亡血而復用吐則氣亦虛虛家而復用吐則損其陰所以為禁也病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散手足厥冷與厥陰之厥深熱深相似其脈乍緊則有時不緊殊不似矣可見痰結在胸中隨氣上下故脈時緊時緩而煩滿不能食也此條舊在厥陰而辨不可吐下復有一條云病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之與此無異但此云脈乍緊彼云脈乍結緊則寒飲結聚結則痰飲伏匿之脈皆屬瓜蒂散證不必兩存也然此手足厥逆亦屬寒飲宿病與厥陰病證何預哉病胸上諸實胸中鬱郁而痛不能食欲傳人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之利則止痛不得食按之反有涎唾者知有寒痰在胸中也下利脈遲寸口微滑者為膈上實故吐之則利自止也合三條但見痰證可吐不可汗合食積虛煩腳氣四證論之勿指為類傷寒但指為不可發汗則其理甚精蓋食積已是胸中陽氣不布更發汗則陽外越不團陰氣用事愈成危候虛煩則胃中津液已竭更發汗則津液盡耗矣腳氣即地氣之濕邪從足先受正濕家不可發汗之義耳以上痰證例問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯寸口即氣口靈樞經脈對代人迎而言也氣口脈浮取之大而按之反澀尺中亦微而澀此以胃中營氣受傷所以氣口脈雖浮大而不能滑實重按反澀也尺中亦微而澀以其腐穢已歸大腸肺與大腸為表裡故其脈自應澀也所謂亦微而澀亦字從上貫下言浮大而按之略澀非澀弱無力之謂見浮大中按之略澀方可用大承氣下之設純又當從枳實理中助胃消導之藥矣豈復為大承氣證乎此條下金匱有脈數而滑者實也此有宿食下之愈宜大承氣湯數為在腑滑則流利如珠此為實也蓋宿食在腑有諸中形之外也下利不欲食者以有宿食故也當下之與大承氣湯不欲食非不能食乃傷食惡食之明徵也下利脈反滑當有所去下之乃愈宜大承氣湯下利恐為陰寒及腸胃虛冷滑脫不止今脈見滑實知為熱邪內結當有所去不可止遏宜與大承氣攻其實熱腐穢去而利自止耳下利三部脈皆平按之心下硬者急下之宜大承氣湯下利三部脈皆平其人元氣本強也且按之心下硬者為食滯中宮無疑下利脈遲而滑者內實也利未欲止當下之宜大承氣湯脈遲為陽明結滯之候遲而不滑為結未定硬不可攻也今遲而滑實雖自利亦須下之下后里氣得通則脈自不滑亦不遲耳病腹中滿痛者此為實也當下之宜大承氣湯腹中痛而不滿者為陰寒滿平不痛者為虛氣此既滿且痛為實結無疑急須下之宿食在上脘者當吐之宿食本不當吐以其人素多痰飲載宿食於上脘故宜用吐法其高者固宜越之也此條金匱多宜瓜蒂散四字其後人有脈緊如轉索無常者有宿食也脈緊頭痛有風寒腹中有宿食不化也二條者但言宿食而不言下之者以其兼見外因之脈證則當從外因例治矣下利瘥後至其年月日復發者以病不盡也當下之此條世本尚有宜大承氣湯五字衍文也故去之詳未盡之邪可以留伏經年而發必系寒邪寒邪惟可備急丸溫下不應大承築寒下也設屬熱邪必無經年久伏之理以上宿食例動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣者築築然氣動也在右者氣動於臍之右也發汗則動肺氣氣虛則不能護衛其血故妄行而為衄衄則亡津胃燥故渴而心中苦煩若更飲水傷其肺胃故飲即吐水也動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤發汗汗不止亡陽外虛故頭眩筋惕肉瞤也動氣在上不可發汗發汗則氣上衝正在心端發汗亡陽則愈損心氣腎乘心虛欲上凌心故氣上衝正在心端也動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐谷不得前發汗則無汗者腎水不足也心中大煩者腎虛不能制心火也骨節疼目運惡寒皆為腎病王太僕云食入反出是無火也當補腎臟真陽為主動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也下之傷胃動肺咽燥鼻乾者津液內竭而喜引飲也頭眩心悸者水飲傷肺心主不寧而煩悸眩暈也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷腹內拘急食不下動氣更劇下之損脾而肝氣復行於脾也雖有身熱臥則欲蜷者表熱裡寒也動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌下之掌握熱煩言掌中雖熱而握固不伸也身上浮冷熱汗自泄欲得水自灌表寒裡熱也動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也腹滿頭眩下清穀心下痞以下之傷脾腎氣則動腎邪凌心也按動氣本因脾土衰弱不能約制腎水水飲凝結而成雖水乘上位之微邪而仲景汗下俱禁者以汗下必先動脾之津液故東垣每以驗脾之盛衰凡按之牢若痛者即動氣也動氣本屬脾疾四臟中某臟之虛即乘其部而見之所以誤汗則傷陽陽傷則邪並於氣故吐衄嘔逆眩暈氣逆上奔誤下則傷陰陰傷則虛陽無制故雖發熱而蜷臥當握不伸皆胃氣虛寒困憊之候至於病人素有積聚連在臍旁亦曰動氣汗下尤不可犯通宜理中去朮加桂苓為主以茯苓利水桂泄奔豚故宜加用白朮滯氣故去之然久病脾氣衰極而無客邪者生術以附子制用亦無妨礙更須參以所見之證為主蓋不必拘活人書等方藥也以上動氣例問曰病有霍亂者何答曰嘔吐而利名霍亂霍亂者三焦混亂清濁相干陰陽乖隔寒熱偏勝以致吐逆泄利甚則轉筋厥逆而為揮霍撩亂也問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐已又利止復更發熱也病發熱頭痛身疼惡寒本為外感風寒內傷生冷故吐利霍亂今吐已利止又復發熱知內邪得泄而外感未除也即當微清便自調後身疼痛急當救表例治之霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之霍亂頭痛發熱身疼外感也加以欲飲水熱邪入里故用五苓兩解表裡若不用水者知里有寒邪故用乾薑之辛以溫中散邪參朮甘草之甘以扶陽益氣甘得辛而不滯辛得甘而不燥辛甘合用以理中氣之虛滯蓋吐利並作當以里證為急也若臍上策者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒甚者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被臍築吐逆腹滿三者俱屬氣病以術性壅滯不利於氣故去之然下多雖有築嘔不妨從權用術以助中上約制腎邪為要且下多氣已滯甚縱有築嘔在所不計也而悸者但加茯苓仍不去朮以悸為停水與氣無預況術得參同有利水生津之績故不去也其渴欲得水之加朮寒加乾薑嘔加生薑臍上築加桂悸加茯苓皆人所易明若夫腹滿加附腹痛加參非講明有素不知也蓋人身背為陽腹為陰所以陽邪內陷則結胸陰邪內結則腹滿非籍附子雄悍之力何以破其陰邪之固結乎而腹中痛者尤為陰邪無疑其在太陽本邪凌上則用小建中湯和其陰分之陽邪況在陰經者不溫補其陽和之氣何以勝任其除邪之沖激耶霍亂為胃逆禁犯穀氣犯之則胃逆不復此言服湯後如食頃飲熱粥一升許是言服理中湯大法非指霍亂為言也吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止而身痛不休外邪未解也當消息和解其外言當辨外邪之微甚制湯劑之大小也蓋吐下驟虛雖夏月不妨桂枝湯以和其營吐利發汗脈平小煩者以身虛不勝穀氣實也霍亂吐利晬時內不可便與飲食以胃氣逆反故即愈後脈平小煩者尤當節慎飲食以倉廩未固不可便置米穀耳以上霍亂例大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚勞復乃起居作勞復生餘熱之病方注作女勞復大謬女勞復者自犯傷寒後御女之大戒多死少生豈有反用瀉泄之理太陽下篇下後身熱或汗吐下後虛煩無奈用本湯之苦以吐撒其邪此非用吐法也乃加枳實於梔子豉中以發其微汗而祛胸中虛熱至內經火淫所勝以苦發之之義若有宿食留結急加大黃下奪之不可稍延則熱持不去真陰益困矣觀方中用清漿水七升空煮至四升然後入藥同煮全是欲其水之熟而趨下不至上湧耳所以又云覆令微似汗精義入神傷寒瘥已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之瘥已後更發熱乃餘熱在內以熱召熱也然餘熱要當辨其何在不可泛然施治以虛其虛如在半表半裡則仍用小柴胡湯和解之法如在表則仍用汗法如在裡則仍用下法即互上條汗用枳實梔子豉微汗之下用枳實梔子豉加大黃微下之大病瘥後從腰以下有水氣者牡蠣澤瀉散主之腰以下有水氣者水漬為腫也金匱曰腰以下腫當利小便此定法矣乃大病後脾土告困不能攝水以致水氣泛溢用牡蠣澤瀉散峻攻何反不顧其虛耶正因水分未犯身半以上急驅其水所全甚大設用輕劑則陰水必襲入陽界驅之無及矣大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸身中津液因胃中寒氣凝結而成濁唾久而不清其人必消瘦索澤故不用湯藥盪滌而用丸藥緩圖也理中丸乃驅分陰陽溫補脾胃之善藥然仲景瘥後外邪已盡才用其方在太陽邪熾之日不得已合桂枝用之即更其名曰桂枝人參湯金匱於胸痹證則名之曰人參湯於此見其立方命名之義矣傷寒瘥後體虛每有遺熱故禁溫補即問有素稟虛寒於中氣寒者止宜理中丸調理未嘗輕用桂附也傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之身中津液為熱邪所耗餘熱不清必致虛羸少氣難於康靜若更氣逆欲吐是餘熱復挾津液滋擾故用竹葉石膏湯以益氣清熱散逆氣也按此湯即人參白虎去知母而益半夏麥冬竹葉也病後虛煩少氣為餘熱未盡故加麥冬竹葉於人參甘草之溫中益氣藥中以清熱生津加半夏者痰飲上逆欲嘔故也病後餘熱與伏氣發溫不同故不用知母以伐少陰也病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈病後食谷微煩謂之食鬱減食自愈以胃氣新虛不能勝谷也即有餘熱未盡當靜養以俟津回不治而治也即不獲已用藥須平淡處方不使藥力勝氣則可即如草木凋瘁必須時時微澗助其生髮若恣意壅灌則立槁矣至於虛而有邪者又須峻利急攻稍不盡邪乘虛內入不救矣傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘學熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之陰陽易之病注家不明言乃致後人指為女勞復大謬若然則婦人病新瘥與男子交為男勞復乎蓋病傷寒之人熱毒藏於氣血中者漸從表裡解散惟熱毒藏於精髓之中者無由發泄故瘥後與不病之體交接男病傳不病之女女病傳不病之男所以名為陰陽易即交易之義也其證眼中生花身重拘急少腹痛引陰筋暴受陰毒又非桂附辛熱所能驅故燒裩襠為散以其人平昔所出之敗濁同氣相求服之小便得利陰頭微腫陰毒仍從陰竅出耳以上瘥後諸復陰陽易脈法篇問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死按弦為少陽脈此以弦為陰脈者兼見沉澀微弱而言陰病見陽脈者生陽氣內復陰邪外出欲汗而解也如厥陰中風脈浮為欲愈不浮為未愈是也陽病見陰脈者死外顯陽證內伏陰邪正衰邪勝也如譫言妄語脈沉細者死是也又按微為厥陰脈而傳經熱邪亦尺寸俱微豈熱邪至極而脈反微耶殊不知傷寒之邪傳至厥陰正氣雖已大傷而邪氣亦以向衰所以不數實而反微也問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇浮數陽脈也陽病不大便當不能食今反能食是陽氣結而陰不得和也至十七日傳少陰水水不勝火故當劇沉遲陰脈也陰病當下利今反大便硬是陰氣結而陽不得和也至十四日傳陽明土土不勝水故當劇問曰病有灑淅惡寒而後發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也灑淅惡寒而復發熱脈寸微尺弱者陽虛陰往從之也少頃發熱則脈必數盛矣此勝復之常內傷虛損多此陽脈浮陰脈弱者則血虛血虛則筋急也言寸口浮大而尺內遲弱也與太陽中風陽浮陰弱同脈異證彼言風邪傷衛營弱衛強此言營血本虛故其證自區別然尺中遲弱者汗下俱禁究竟本虛也其脈沉者營氣微也其脈浮而汗出如流珠者衛氣衰也脈靄靄如車蓋者名曰陽結也脈累累如循長竿者名曰陰結也脈瞥瞥如羹上肥者陽氣微也脈縈縈如蜘蛛絲者陽氣衰也脈綿綿如瀉漆之絕者亡其血也陽結靄靄如車蓋形容浮大而虛陰結累累如循長竿體貼指下弦而強直陽微瞥瞥如羹上肥彷彿虛濡無力陽衰縈縈如蜘蛛絲譬擬沉細欲絕亡血綿綿如瀉漆之絕描寫前大後細之狀皆歷歷如繪此陽結陰結是言脈法與前論病證不同不可牽合脈來緩時一止復來者名曰結脈來數時一止復來者名曰促脈陽盛則促陰盛則結此皆病脈脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治結促是有留滯於中故脈見止歇力能自還代脈是陽氣衰微不能自還雜病見之必死惟傷寒有心悸脈代者寒飲停蓄故也問曰翕奄沉名曰滑何謂也師曰沉為純陰翕為正陽陰陽和合故令脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也沉為陰實其人必股內汗出陰下濕也翕浮也奄忽也言忽焉而浮忽焉而沉故為滑也滑本陽實陰部見陽脈為陽邪乘陰故股內汗出陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也按脈之動者皆緣陰陽不和故不能貫通三部而虛者受邪則動所以動於寸口為陽動陽動則汗出動於尺內為陰動陰動則發熱如不汗出發熱而反形冷惡寒此三焦真火受傷也蓋動脈雖多見於關上然尺寸亦常見之本文又言若數脈見於關上若字甚活是舉一隅為例耳今世以尺寸之動強飾為滑殊不知動脈是陰陽相搏虛者則動故單見一部滑脈是邪實有餘多兼見二三部或兩手俱滑以此辨之則動滑之虛實判然矣陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也脈雖浮大而軟按之仍不絕者為緩若按之即無是虛脈非緩脈也脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也浮緊而弦者少陽脈也若沉緊而弦即是裡寒陰脈矣脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也脈浮而數為虛風發熱之候證雖發熱而本屬虛寒是以仍灑淅惡寒故言數為虛虛為寒明所以當用溫順散邪不可竟行表散也脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出不解者此為難治浮滑為表實當汗出而解今汗出不解皆緣衛氣熱極較常度行之過疾所以脈反數疾不解況既汗出傷陰則營亦受病是知邪已入腑表裡俱熱故難治也脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者瘥遲遲為無陽不能作汗其身必癢也脈浮而遲為營氣不能外行於衛分衛中陽虛不能作汗而瘥遲致汗濕留於肌表而身癢作瘡也師持脈病人欠者無病也脈之呻者病也言遲者風也搖頭言者里痛也行遲者表強也坐而伏者短氣也坐而下一腳者腰痛也裡實護腹如懷卵物者心痛也師曰呼吸者脈之頭也初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也初持脈來疾去遲言自尺內至於寸口為心肺盛而肝腎虛此出疾入遲言自筋骨出於皮膚以脈盛於表故曰內虛外實初持脈來遲去疾言自寸口下於尺內為心肺虛而肝腎旺此出遲入疾言自皮膚入於筋骨以脈盛於內故曰內實外虛假令脈來微去大病在裡也脈來頭小本大病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死脈來微去大者言浮取則微沉取則大為病在裡也脈來頭小本大者言脈初來小取之漸漸大為病在表也上微頭小者言浮取之微而前小後大為表氣不固而自汗也下微本大者言沉取之微而按久益大為里邪拒閟而關格不通頭無汗者乃邪入膀胱陽氣未脫猶可治也蓋傷寒暴病非雜證津液久虛之比假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治三部俱伏而尺中時見小滑一二至此為陰中伏陽也若寸口略見短小一二至尺中絕不至者為損脈見之必難治也問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈緊也緊脈皆為寒寒邪在表則浮緊在裡則沉緊此言吐下後脈緊為肺胃受傷若更兼咳及利又為水飲內伏之候當以辛溫散水為務也寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也此以浮沉遲數定表裡臟腑而全重於遲為在臟句故重申以明之設脈見浮遲雖有表證只宜小建中和之終非麻黃青龍所宜以臟氣本虛故也凡言寸口統三部而言針經以寸口人迎分別臟腑也問曰何以知乘腑何以知乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也寸口脈弱而遲弱者衛氣微遲者營中寒營為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也寸口脈弱為真陽氣微則腎中陰火挾痰飲而聚於膈上故心懸懸若飢狀而虛痛不能食也至於寸口遲為營中寒營為血之本血寒而反發熱其義何居蓋寸口脈遲其陽必陷於陰分尺中緊盛更小待言所以為發熱也寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也噫而吞酸是胃中虛火挾痰飲上逆非墜痰降逆之藥不足以鎮之此言暴病與老人之胃虛痰逆噫氣不同寸口脈微而澀微者衛氣不行澀者營氣不足營衛不能相將三焦無所仰身體痹不仁營氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溺酢醋同三焦因營衛不行無所依仰故氣不歸其部上焦不歸則物不能傳化故噫而酢吞中焦不歸則不能腐熟水穀下焦不歸則不能約制溲便也寸口脈微而澀微者衛氣衰澀者營氣不足衛氣衰面色黃營氣不足面色青營為根衛為葉營衛俱微則根葉枯槁而寒慄咳逆唾腥吐涎沫也咳逆而唾腥吐涎沫陰虛火炎可知也加以寒慄則衛虛不能外護又可知矣以脈見寸口故其證悉在上部耳少陰脈弱而澀弱者微煩澀者厥逆氣虛則脈弱而煩血虛則脈澀而厥趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也趺陽脈浮澀為脾胃不足故當下利此易明也至少陰脈弦而浮稱為調和如經之脈此必有說焉蓋傷寒熱傳少陰仍得弦浮陽脈為輕若見沉遲則為少陰病脈矣夫所謂弦者少陽生髮之氣也浮者太陽表證之脈也雖證見少陰而少陰病脈不見不失經常之度故為調脈若見滑數則為邪熱內盛必挾熱便膿血也凡言趺陽皆當推之氣口少陰皆當驗於尺部若必候諸於足在婦人殊為未傾謂手不及足之譏所不辭也趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫誤下之所為也營衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時而生惡瘡也趺陽胃脈以遲緩為經當不當浮數若見浮數知醫誤下而傷胃動脾也營衛環轉之氣以誤下而內陷其數脈必先改為微而脾氣不治大便硬氣噫而除此皆邪客於脾所致邪熱獨留心下雖飢復不殺穀抑或潮熱發渴未有愈期必數脈之先微者仍遲緩如其經常始飢而消穀也若數脈從前不改則邪熱未陷於脾但鬱於營衛主生惡瘡而已諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也脈浮數而惡寒知表邪不散而為熱今飲食如常為里邪已去若有焮腫為熱壅經絡若無腫處必邪留臟腑隨內外而發癰膿也脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩脈浮大為邪氣在表表邪本當即解今相持不散必是汗出泄風之故當發癮疹身癢而生瘡疥也趺陽脈浮而芤浮者衛氣衰芤者營氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絕身體瘦削宗氣衰微胃氣虛寒不能榮養四末可知加以肌肉結硬皮膚皴駁故為甲錯必內有蓄積將發癰膿之兆也趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也此言胃受有形而實脾為熱盛而強臟腑相併為患而痛故言以實擊強治當量其虛實虛則消導實則攻下可也趺陰脈大而緊者當即下利為難治趺陽脈緊為寒邪傷胃故必下利下利脈大為利盛故難治也趺陽脈沉而數沉為實數消穀緊者病難治沉數者熱伏於內故易已沉緊為寒伏於內故難治也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣胃中虛寒則陽氣鬱伏不伸故短氣趺陽脈緊而浮浮為虛緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉則氣動膈氣乃下少陰脈下出其陰腫大而虛也膈中之水氣因火擊動所以腸鳴轉而下泄則脾胃虛寒可知若少陰脈不至則下焦虛寒不能運行水氣必致留結陰分而為陰腫虛大也趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也脈滑為噦者胃虛不能散水水結中焦逼虛火上逆故為噦也脈浮必衄者浮為表邪不散邪郁上焦必迫血上行而為衄也胃氣素虛之人誤施辛溫發散則虛陽將欲外亡所以脈浮鼻燥皆緣責虛取實之故也此與誤發少陰汗者同科而減等少陰少血動其血則下厥上竭而難治陽明多血但釀患未已耳寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令大汗出水得寒氣冷必相揀其人則䭇寸口脈浮為表邪而反下之為逆矣以其人陽氣下陷故不為痞結而但腸鳴即當將差就錯內和其氣而反與之水寒其胃致水氣相搏且夾帶濁飲上干清氣故令䭇也胡其章曰大則為寒寒字當作邪字看寸口脈微而緩微者衛氣疏疏則其膚空緩者胃氣實實則谷消而水化也谷入於胃脈道乃行水入於經其血乃成營盛則其膚必疏三焦絕經名曰血崩此言衛虛營盛氣衰血熱三焦之火失其常度並熱於守經之血而妄行故為崩下不止耳寸口諸微亡陽諸澀亡血諸弱發熱諸緊為寒諸乘寒者則為厥郁胃不仁以胃無穀氣脾澀不通口急不能言戰而慄也口急不能言是脾藏血少不能上通於心氣也寸口脈微尺脈緊其人虛損多汗知陰常在絕不見陽也陽微陰勝加之多汗陽氣愈虛也少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為屍厥當刺期門巨闕腎中真陽之氣不能統於周身則陰氣上迫於陽位所以宗氣鬱聚血結心下陽氣因而不伸陷入至陰之地周身有陰無陽遂至不仁而厥也治當刺期門以下結血刺巨闕以行宗氣宗氣布而陽氣自復厥自退矣寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格上條以脈之虛大倍常為關格見於尺部為關見於寸口為格故知凡言寸口皆統三部而言也下條以關部伏澀異常為關格蓋伏則氣滯澀則血寒也上條乃正衰邪實不治之證下條是寒邪悶拒可治之證不可不察趺陽脈不出脾不上下身冷膚硬身冷者胃氣不溫膚硬者營血不濡以營衛氣衰故趺陽脈不出脾不上下竟成臟厥之證也寸脈下不至關為陽絕尺脈上不至關為陰絕此皆不治關為陰陽之交界關上脈絕則陰陽離決故不治寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦陰中於邪必內慄也表氣微虛里氣不守故使邪中於陰也陽中於邪必發熱頭痛項強脛攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為慄足膝逆冷便溺妄出表氣微虛里氣微急三焦相溷內外不通上焦怫鬱臟氣相熏口爛食齗也中焦不治胃氣上衝脾氣不轉胃中為濁營衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全齗音銀嗢音鶻此下五條俱論陰陽錯雜之邪所謂三焦相溷內外不通為時行疫癘之總訣而傷寒壞證溫熱夾陰亦往往有內外合邪者此條言寸口脈陰陽俱緊者邪氣乘虛初犯中焦內外受傷未變為實也寸脈浮而緊者清陽霧露之氣傷於陽故曰清邪中於上焦尺脈沉而緊者濁陰寒濕之邪傷於陰故曰濁邪中於下焦清邪中上則發熱頭痛項強脛攣等證皆是外感表證濁邪中下則陰氣為慄言身不戰而但心惕惕然內慄足膝逆冷等證皆邪客陰經之證今表氣徵虛則陽氣內入裡氣徵急則陰邪上逆由是三焦溷亂內外不通矣鬱於上焦則齦傷不能齧物中焦不治則不能運行水穀營衛不通而血凝不流若陽氣前通膀胱之邪欲散故小便赤黃邪熱遊溢經絡則為癰膿也設陰氣前通者則陽氣厥微不能衛外寒氣內客於肺嚏而出之以寒氣客於肺故聲嗢咽塞言聲塞不能出也寒者外邪也厥者內邪也內外之邪合併相逐為熱所擁則血凝自下也陰陽俱厥者言脾胃之氣不相順接胃中陽氣不行不能敷布中外故四肢逆冷脾中陰氣孤弱不能約制下焦故五液注下圊便類數下重而難也臍為生氣之源臍築湫痛則生氣欲絕蓋邪氣傷犯中焦清濁相溷三焦俱病汗下兩難治稍失時則變證百出矣脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解若到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也此脈此證表裡陰陽混淆未的疑似之間慎勿妄投藥餌徐而俟之若七日之外當解之候微熱手足溫則為邪氣解而自愈矣若致八日以上當解不解反大發熱此為逆證不可治也然仲景止言難治非直不治也故下文言設寸脈浮緊惡寒者必嘔清陽霧露之邪溢上焦也尺脈沉緊而腹痛者必利濁陰寒濕之邪走下焦也邪氣既得上下消散即可從其勢而治之矣脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解脈陰陽俱緊內外皆邪至吐利後邪氣已泄脈緊當去也若吐利後緊獨不解反不欲食皆為脾胃氣虛水飲停蓄為晚發變證也若到七日脈緊漸退人安能食方為欲解傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其候也惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則身發黃若熨之則咽燥若小便利者可救之小便難者為危殆脈來厥者如厥逆之寒熱交勝也初來大者為邪氣鼓動漸漸小為正氣受傷更來漸漸大為邪氣復進也蓋緣其人正氣本虛不能主持隨邪氣進退故其脈亦隨邪氣進退是以忽大忽小經云不大不小雖困可治其有大小者為難治是也惡寒甚者則發熱翕翕汗出喉中痛以少陰之脈循喉嚨故也熱多者太陽多也目赤脈多睛不慧以太陽之脈起於目故也發汗攻陽則少陰之熱因發而上行故咽中傷若復下之則太陽之邪因虛而內陷故兩目閉陰邪下行為寒多必便清穀陽邪下行為熱多必便膿血熏之則火熱傷表身必發黃熨之則火邪內逼必為咽燥小便利者津液未竭猶可救之小便難者津液已絕為危殆也傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則兩目閉貪水者下之其脈必厥其聲嚶咽喉塞若發汗則戰慄陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出若發汗則口中傷舌上白苔煩燥脈數實不大便六七日後必便血若發汗則小便自利也發熱口中勃勃氣出邪氣變熱衝於膈上也頭痛目黃衄不可制者熱鬱於經也貪水者為無陰邪氣並於上焦故必嘔惡水者為無陽邪氣並於中焦故厥逆也若下之裡虛熱結必咽痛厥逆假令手足不厥則熱邪不行而協熱利也若頭痛目黃者為邪在太陽下之熱氣內伏則目閉也貪水者熱在上焦下之傷陰必脈厥聲嚶咽喉閉塞汗之傷陽則陰陽俱虛而戰慄惡水者為陽虛下之則里冷不食完穀不化汗之虛陽上乘口傷舌上白苔煩燥若目黃漱水不大便者六七日後必便血若發其汗則小便當不利今反自利者太陽之瘀熱結於膀胱而小便偏滲也瘀血為陰邪雖有如任實證而不能消耗津液故小便自利耳下之其三字從玉雨經增入脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒慄不能自還咳者則劇數吐涎沫咽中必干小便不利必中飢煩晬時而發其形似瘧有寒無熱虛而寒慄刻而發汗蜷而苦滿腹中復堅脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也微則為咳咳則吐涎下之則咳止而利困不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不能前此二條言尺中微弱者不可汗下也觀其意欲得溫一語可以灼見病情上條言寸口微見弦脈而咳劇吐涎等證知為胃氣本虛而挾寒飲速宜溫養中上誤發汗則胃中陽氣愈傷客邪固結愈甚或因刻而復汗之遂至蜷而苦滿腹中復堅皆陰邪水飲痞塞之象也下條言寸口微見弦脈而咳吐涎沫等證仍為胃氣本虛亦宜培理中土若誤吐之下利不止胃中空虛而反暴食為除中少陰虛寒而反冷汗為外脫及口雖欲言舌萎不能前等死證歘起較上條證更劇以下更甚於汗也脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞硬此二條言尺中脈澀者不可汗下也陽微陰澀氣血兩虧而關上脈復弱胃土亦衰所以汗下俱禁也陽微復用陽藥發汗則陽氣轉傷必躁不得眠陽微而用陰藥攻下則陽氣內陷必心下痞硬也脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為衄血浮為虛數為熱浮為虛自汗出而惡寒數為痛伏寒而慄微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅悵寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心不為痞小便淋瀝小腹甚硬小便則尿血也寸口浮濡而關弱尺數者以其人陽氣本虛虛陽陷於陰分也若誤下傷血必致狂走痞滿尿血耳脈濡而緊濡則陽氣微緊則營中寒陽微衛中風發熱而惡寒營堅胃氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚悵快不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷溧慄而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還此見脈濡而緊者為陽氣微營中寒陽微衛中風外則發熱惡寒營緊胃中冷內則微嘔心煩醫不知其外熱內冷以為大熱而從汗解之則表裡俱虛客熱淺在皮膚緊寒深在關元猶汲水灌其客熱致寒證四出不可復救也脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射營竭血盡干煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死脈浮而大氣實血虛雖偏之為害亦人所當有也若此者陰部當見不足今反小便利大汗出外示有餘殊非細故設衛氣之實者因得汗利而脈轉微弱藉是與營無忤庶可安全若陽分之脈較前更加堅實則陽強於外陰必消亡於內所謂小便利大汗出者乃津液四射之徵勢必營竭血盡干煩不眠血薄肉消而成暴液下注之證此際安其胃固其液調和強陽收拾殘陰岌岌不及況復以毒藥攻其胃轉增奔迫之勢而蹈重虛之戒令客陽亦去下血如汙泥而死哉師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休也時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微利天下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知亡血也王肯堂曰大發其汗傷陽也宜其脈微而惡寒又數大下之傷陰也宜其脈澀而發熱陰陽兩傷則氣血俱損而首末獨言亡血者何也曰下之亡陰不必言汗亦血類故也內虛之人夏月陽氣在表則內無陽也故不勝其寒冬月陽氣在裡里陰既虛不能當邪氣之灼爍故不勝其熱然諸脈弦細而澀按之無力者往往惡寒苦振慄不止或時發躁蒸蒸而熱如坐甑中必得去衣居寒處或飲寒水則便如故其振寒復至非必遇夏乃寒遇冬乃熱也此但言其例論其理耳立夏得洪大脈是其本位其人病身體苦疼重者鬚髮其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此立夏得洪大脈是溫病之本脈若其人苦疼重乃熱鬱肌表未得發越之故須以辛涼苦寒藥泄其鬱熱乃伏氣發汗之正法也若明日身不疼重則營衛自和濈然汗出自解無藉於藥矣脈盛身寒得之傷寒脈虛身熱得之傷暑寒傷形故脈盛身寒而後周身發熱暑傷氣故脈虛身熱而獨背微惡寒問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必欲食也脈微而解者必大汗出也上言脈微故不戰汗出而解此言脈微而解者必大汗出二說相左何耶然上以曾經吐下亡血邪正俱衰不能作汗而解此以未經汗下血氣未傷邪正俱盛故必大戰作汗而解不相左也東垣云戰而汗出解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也若先曾汗下必不爾矣問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也手足三部脈皆至言三部大小同等也今人但知六七日欲作戰汗脈伏不知三部脈皆實而煩躁口噤亦是作汗之兆故仲景重申此義以明之若脈和其人大煩目重臉內際黃者此為欲解也大煩目重臉內際黃而脈和者中央之色見於正位濕熱得以外散也病人若發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今脈反沉遲故知愈也本發熱身疼今熱退靜臥而脈沉遲故知邪散病不傳也設表證誤服下藥而脈變沉遲又為結胸入里之候也假令病人云腹內卒痛病人自坐師到脈之浮而大者知其瘥也何以知之若里有病者脈當沉而細今反浮大故知愈也腹中有寒故痛所以脈當沉細今脈變浮大知陰退陽復故為愈也設卒痛便見浮大又為脈不應證矣師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈熱退身涼而安靜雖脈不和為邪退未久故尚末平復不當以脈病人安例之問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也問曰脈有災怪何謂也師曰假令人病脈得大陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絕也又未知何臟先受其災若汗出發潤喘不休者此為肺先絕也陽反獨留形體如煙燻直視搖頭者此心絕也唇吻反青四肢漐習者此為肝絕也環口黧黑柔汗發黃者此脾絕也溲便遺失狂言目反直視者此為腎絕也陽反獨留孤陽亢極陰氣先竭也四肢漐習振掉不寧也柔汗冷汗也按五臟絕證有因賊邪勝克而死者有木臟之邪亢極而死者有子氣過逆母氣告竭而死者有本臟之氣衰絕而死者有臟腑俱絕而死者不可一概論又未知本臟陰陽前絕若陽氣前絕陰氣後竭者其人死身色必青陰氣前絕陽氣後竭者其人死身色必赤腋下溫心下熱也傷寒咳逆上氣其脈散者死謂其形損故也脈陰陽俱盛大汗出不解者死脈陰陽俱虛熱不止者死脈至乍疏乍數者死脈至如轉索者其日死譫言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣傷寒咳逆上氣肺病也脈毛甚則散肺絕之脈也陰陽俱盛大汗出不解陰陽交也陰陽俱虛熱不止津液竭也乍疏乍數者死其有大小者為難治也脈至如轉索者其目死純是邪脈正氣不能為王也譫妄身微熱而手足溫證脈相應故主生譫妄身大熱而手足冷證脈相反故主死也傷寒例陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為最者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為熱病熱病者熱極重於溫也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也寒毒藏於肌膚至春變為溫病藏於骨髓至夏變為熱病不言藏於骨髓者脫簡也內經云冬傷於寒春必溫病又云逆冬氣則少陰不藏腎氣獨沉言冬時寒暖不均和暖之際人之腠理不固忽然嚴寒驟至鬱閉其不正之氣於內當是之時少陰之經脈流行於外是不能退藏於密勢不得不受其邪然腎藏之真陽沉伏於內自不受邪所受邪者少陰之經耳故真陽充滿之人邪氣不能為害即使受邪氣行則已惟是不藏精之人先逆冬月蟄藏之令故邪氣行以襲入經脈骨髓乃至春夏溫熱之氣內動而發為溫熱也李明之曰冬傷於寒冬行春令也當冬而溫火勝而水虧矣水既已虧則所勝妄行土有餘也火土合德故為溫病所以不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房室之勞傷辛苦之人陽氣泄於處腎水虧於內木當發生陽已處泄孰為鼓舞腎水內竭孰為滋養此兩者同病生化之源既絕木何成以生乎身之所存者熱也時強木長故為溫病凡時行者春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也傷寒是感天時肅殺之氣以寒犯寒必先寒冰時行是感濕土鬱蒸之氣以濕犯濕必先濕土陽明為營衛之原始病則營衛俱病經絡無分三焦相溷內外不通所以其病即發而暴非比傷寒以次傳經而入也蓋地為汙穢濁惡之總歸平時無所不受適當天時不正之極則平時所受濁惡之氣亦必乘時迅發或冬時過暖肅殺之令不行至春反大寒冷或盛夏濕熱汙穢之氣交蒸忽然熱極生風而入汗孔閉拒毒邪不得發泄而為病病則老幼無分此即時行之氣也從霜降以後至春分以前凡有觸冒霜露體虛中寒即病者謂之傷寒也言非體虛即有風寒莫之能害其冬有非節之暖名曰冬溫冬溫之毒與傷寒大異亦有輕重為治不同冬溫者時當大寒而反大溫東風時至則肌腠疏豁忽然大寒而衣袂單薄寒鬱其邪其病即發者為冬溫以其所感非時溫氣故言與傷寒大異若不即發藏於皮膚則入傷血脈至春發為溫病藏於經絡則入傷骨髓至夏發為熱病矣從立冬節候其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病春時陽氣發於冬時未至而至也伏寒變為溫病言非時不正之溫氣又為外寒所伏至春而發為溫病也從春分以後至秋分節前天有暴寒者皆為時行寒疫也其病與溫及熱病相似但治有殊耳此言非時暴寒之證雖與溫熱相似而源委迥殊以伏氣自內發外必用苦寒內奪暴寒從外感冒合用辛甘外解故治有不同耳凡傷於寒則為病熱熱雖盛不死若兩感於寒而病者必死尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強尺寸俱長者陽明受病也嘗二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三經受病未入於腑者可汗而散尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三經受病已入於腑者可下而已傷寒經絡傳變原不可以日數而測此六經受病不過設以為例粗工不察病機每以三四日當汗六七日當下誤人多矣設伏氣發溫之三四日可汗之乎病傳厥陰之六七日可下之乎若此可不辨哉凡云尺寸則關在其中可不言而喻若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則營衛不行臟腑不通而死矣其得病陰陽兩證俱見其傳經證陰陽兩經俱傳則邪氣彌滿充斥法當三日主死然必水漿不入不知人者方為營衛不行臟腑不通更越三日而陽明之經始絕也其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也更不傳經不加異氣則邪氣傳盡正氣將復愈日可期然亦立法大意不可拘執也至若更加異氣乃病中之病莫可限於時日矣若過十三日以上不間尺寸陷者大危言尺寸之脈沉陷為正氣衰微莫能載邪外出過經其病不間誠為危候也若更感異氣變為他病者當依壞證例治之若脈陰陽俱盛重感於寒變為溫瘧陽脈浮滑陰脈濡弱更遇於風變為風溫陽脈洪數陰脈實大更感溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊更遇溫氣變為溫疫此以冬傷於寒發為溫病脈之變證方治如說言脈證皆變為熱不得復用辛溫發表所謂方治如說也凡傷寒之病多從風寒得之始表中風寒入里則不消矣未有溫覆當而不消散者不在證治擬欲攻之猶當先解表乃可下之若表已解而內不消非大滿猶生寒熱則病不除大滿大實堅有燥屎自可除下之雖四五日不能為禍也言非大滿大實而下之則猶生寒熱變證必待大滿大實堅有燥屎者方可下之雖遲至四五日不能為害也若不宜下而便攻之內虛熱入協熱遂利煩燥諸變不可勝數輕者困篤重者必死矣夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死陽乘陰位則為陽盛陰虛故可下而不可汗陰乘陽位則為陽虛陰盛故可汗而不可下即表病里和里病表和之謂也蓋表實裡虛而邪入腑汗之則死下之則愈裡實表虛而邪鬱於經下之則死汗之則愈夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛則斃承氣入胃陰盛以亡死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞歿自謂其分至仁者鑑此豈不痛歟桂枝下咽陽盛則斃承氣入胃陰盛以亡以概言汗下關係非細不過藉此為例非誤用二湯必致不救也凡兩感病俱作治有先後發表攻裡本是不同而熱迷妄意者乃云神丹甘遂合而飲之且解其表又除其裡言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉兩感皆是熱邪然治有先後發表攻裡本是不同持說甚正亦甚明何奉議誤認為救里耶凡發汗溫服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以胃中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也若飲而腹滿小便不利若喘若噦不可與之忽然大汗出是為自愈也凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自愈小渴者乃強與飲之因成其禍不可復救上四條皆是春夏溫熱之邪故言時氣病乃可與水非冬月正傷寒可比例也凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也厥脈動數猶言其脈動數不可連上句讀
